<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Article Gallery</title>

  <link rel="stylesheet" href="style.css">
  <script src="assets/Scripts/site-components.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Prevent any child from causing horizontal overflow ── */
    html, body {
      overflow-x: hidden;
      max-width: 100%;
    }

    :root {
      --gold-50:  #fffdf0;
      --gold-100: #fef9d7;
      --gold-200: #fdf0a0;
      --gold-300: #fbe46a;
      --gold-400: #f5cc30;
      --gold-500: #e8b800;
      --gold-600: #c99a00;
      --gold-700: #a07800;
      --gold-800: #7a5c00;

      --bg-page:       #fffef7;
      --bg-card:       #fffdf0;
      --border-gold:   #e8c84a;
      --border-deep:   #c99a00;
      --border-accent: #a07800;

      /* Rich multi-colour text */
      --title-color:   #5c3a00;
      --author-color:  #1a6b3c;
      --date-color:    #7b3fa0;
      --read-color:    #b5390a;
      --cat-color:     #005a8e;
      --excerpt-color: #4a3800;

      --tag-bg:          #fdf0a0;
      --tag-border:      #e8c84a;
      --tag-text:        #7a5c00;
      --tag-active-bg:   #c99a00;
      --tag-active-text: #fffdf0;

      --card-shadow:       0 4px 18px rgba(200,152,0,0.13),0 1px 4px rgba(200,152,0,0.08);
      --card-hover-shadow: 0 14px 40px rgba(200,130,0,0.22),0 4px 12px rgba(200,130,0,0.12);
    }

    body {
      background: var(--bg-page);
      background-image:
        radial-gradient(ellipse at 8% 18%, rgba(251,228,106,0.22) 0%, transparent 50%),
        radial-gradient(ellipse at 92% 82%, rgba(248,210,50,0.16) 0%, transparent 50%);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      color: var(--excerpt-color);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── MASTHEAD ──────────────────────────────────── */
    .blogs-masthead {
      /* Clamp width to viewport — fixes the horizontal scroll root cause */
      width: 100%;
      max-width: 100%;
      overflow: hidden;

      background: linear-gradient(160deg, #fff8d0 0%, #ffeea0 45%, #ffd84a 100%);
      border-bottom: 3px solid var(--border-deep);
      padding: 4rem 2rem 3.2rem;
      text-align: center;
      position: relative;
    }

    .blogs-masthead::before {
      content: '';
      position: absolute;
      /* Use inset to keep the pseudo-element exactly inside the parent */
      inset: 0;
      width: 100%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 28px,
        rgba(200,152,0,0.05) 28px,
        rgba(200,152,0,0.05) 30px
      );
      pointer-events: none;
    }

    .masthead-label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold-700);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
    }

    .masthead-label .line {
      display: inline-block;
      width: 44px;
      height: 2px;
      background: var(--border-deep);
      border-radius: 2px;
    }

    .blogs-masthead h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 700;
      color: var(--title-color);
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.8rem;
      text-shadow: 0 2px 10px rgba(200,130,0,0.18);
    }

    .blogs-masthead .subtitle {
      font-size: 1rem;
      color: var(--gold-700);
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    /* ── LAYOUT ─────────────────────────────────── */
    .blogs-section {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2.2rem 2rem 5rem;
    }

    /* ── TOOLBAR ──────────────────────────────────── */
    .toolbar {
      background: var(--bg-card);
      border: 2px solid var(--border-gold);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.4rem;
      box-shadow: var(--card-shadow);
    }

    .search-box { flex: 1; min-width: 200px; max-width: 320px; position: relative; }

    .search-box i {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%); color: var(--gold-600); font-size: 0.82rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.4rem;
      border: 1.5px solid var(--border-gold);
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      color: var(--title-color);
      background: #fffef7;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--border-deep);
      box-shadow: 0 0 0 3px rgba(232,184,0,0.2);
    }

    .search-box input::placeholder { color: var(--gold-600); }

    .category-filter { position: relative; }

    .category-filter select {
      appearance: none;
      padding: 0.65rem 2.2rem 0.65rem 1rem;
      border: 1.5px solid var(--border-gold);
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      color: var(--cat-color);
      font-weight: 700;
      background: #fffef7;
      cursor: pointer;
    }

    .category-filter select:focus { outline: none; border-color: var(--border-deep); }

    .category-filter i {
      position: absolute; right: 0.75rem; top: 50%;
      transform: translateY(-50%); font-size: 0.72rem;
      color: var(--gold-600); pointer-events: none;
    }

    .sort-controls {
      display: flex;
      flex-wrap: wrap; /* allows wrapping on very small screens */
      border: 1.5px solid var(--border-gold);
      border-radius: 8px;
      overflow: hidden;
      margin-left: auto;
    }

    .sort-btn {
      padding: 0.62rem 1.1rem;
      border: none;
      border-left: 1.5px solid var(--border-gold);
      background: #fffef7;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--gold-700);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .sort-btn:first-child { border-left: none; }
    .sort-btn:hover { background: var(--gold-100); color: var(--title-color); }
    .sort-btn.active { background: var(--gold-400); color: var(--title-color); font-weight: 800; }

    /* ── TAGS ──────────────────────────────────────── */
    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 1rem 1.4rem;
      background: var(--bg-card);
      border: 2px solid var(--border-gold);
      border-radius: 12px;
      margin-bottom: 1.6rem;
      box-shadow: var(--card-shadow);
    }

    .tag {
      padding: 0.34rem 0.9rem;
      background: var(--tag-bg);
      border: 1.5px solid var(--tag-border);
      border-radius: 30px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--tag-text);
      cursor: pointer;
      transition: all 0.18s;
    }

    .tag:hover { background: var(--gold-300); border-color: var(--border-deep); transform: translateY(-2px); }

    .tag.active {
      background: var(--tag-active-bg);
      border-color: var(--border-accent);
      color: var(--tag-active-text);
      box-shadow: 0 3px 10px rgba(160,120,0,0.25);
    }

    .tag i { margin-right: 0.3rem; font-size: 0.65rem; }

    /* ── RESULTS META ─────────────────────────────── */
    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      font-size: 0.83rem;
      color: var(--gold-700);
      font-weight: 700;
    }

    .clear-filters {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--read-color);
      font-weight: 800;
      cursor: pointer;
      padding: 0.32rem 0.9rem;
      border: 1.5px solid #e88070;
      border-radius: 30px;
      background: #fff5f3;
      transition: all 0.18s;
    }

    .clear-filters:hover { background: #ffe0da; }

    /* ── BLOG GRID ─────────────────────────────────── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.6rem;
      margin-bottom: 3rem;
    }

    /* ── BLOG CARD ─────────────────────────────────── */
    .blog-card {
      background: var(--bg-card);
      border: 2.5px solid var(--border-gold);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.2s;
      box-shadow: var(--card-shadow);
      animation: riseUp 0.45s ease both;
      position: relative;
    }

    /* Coloured top stripe cycles through 3 colours */
    .blog-card::before {
      content: '';
      display: block;
      height: 5px;
      width: 100%;
      position: absolute;
      top: 0; left: 0;
      border-radius: 18px 18px 0 0;
    }

    .blog-card:nth-child(3n+1)::before { background: linear-gradient(90deg,#e05c1a,#f5a623); }
    .blog-card:nth-child(3n+2)::before { background: linear-gradient(90deg,#1a6b8a,#30bcd4); }
    .blog-card:nth-child(3n+3)::before { background: linear-gradient(90deg,#6b3fa0,#c06ed4); }

    .blog-card:hover {
      transform: translateY(-9px) scale(1.013);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--border-deep);
    }

    /* Stagger */
    .blog-card:nth-child(1){animation-delay:.03s}
    .blog-card:nth-child(2){animation-delay:.08s}
    .blog-card:nth-child(3){animation-delay:.13s}
    .blog-card:nth-child(4){animation-delay:.18s}
    .blog-card:nth-child(5){animation-delay:.23s}
    .blog-card:nth-child(6){animation-delay:.28s}
    .blog-card:nth-child(7){animation-delay:.33s}
    .blog-card:nth-child(8){animation-delay:.38s}
    .blog-card:nth-child(9){animation-delay:.43s}

    /* ── CARD IMAGE ─────────────────────────────────── */
    .blog-image {
      height: 136px;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 2px solid var(--border-gold);
      background: linear-gradient(135deg,#fef9d7 0%,#fdf0a0 60%,#fbe46a 100%);
    }

    .blog-image[data-cat="technology"] { background: linear-gradient(135deg,#e8f4fd,#c5e3f7,#a8d4f0); }
    .blog-image[data-cat="legal"]      { background: linear-gradient(135deg,#f0ebff,#ddd0f8,#c8b8f0); }
    .blog-image[data-cat="science"]    { background: linear-gradient(135deg,#e8fdf0,#c0f0d0,#9de0b8); }
    .blog-image[data-cat="business"]   { background: linear-gradient(135deg,#fff3e0,#ffe0b0,#ffc870); }
    .blog-image[data-cat="health"]     { background: linear-gradient(135deg,#fde8e8,#f8c0c0,#f09898); }
    .blog-image[data-cat="design"]     { background: linear-gradient(135deg,#fef0ff,#f0c8f8,#e0a0f0); }

    .icon-wrap {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: rgba(255,255,255,0.78);
      border: 2.5px solid var(--border-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--gold-700);
      box-shadow: 0 4px 14px rgba(200,152,0,0.2);
    }

    .blog-category-badge {
      position: absolute;
      top: 0.75rem; right: 0.75rem;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cat-color);
      background: rgba(255,255,255,0.92);
      border: 1.5px solid #a8d0f0;
      padding: 0.22rem 0.7rem;
      border-radius: 30px;
    }

    /* ── CARD BODY ──────────────────────────────────── */
    .blog-content {
      padding: 1.3rem 1.4rem 1.2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .blog-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.42;
      color: var(--title-color);
      margin-bottom: 0.65rem;
    }

    .blog-excerpt {
      font-size: 0.855rem;
      color: var(--excerpt-color);
      line-height: 1.7;
      flex-grow: 1;
      margin-bottom: 1rem;
      font-weight: 400;
    }

    .blog-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 1.1rem;
      font-size: 0.76rem;
      padding: 0.72rem 0;
      border-top: 1.5px dashed var(--border-gold);
      border-bottom: 1.5px dashed var(--border-gold);
      margin-bottom: 0.9rem;
    }

    .meta-item { display: flex; align-items: center; gap: 0.35rem; }
    .meta-author { color: var(--author-color); font-weight: 800; }
    .meta-date   { color: var(--date-color);   font-weight: 700; }
    .meta-time   { color: #636363;             font-weight: 600; }

    .blog-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.9rem; }

    .blog-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.65rem;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 20px;
      color: var(--tag-text);
      font-weight: 700;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--read-color);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s, gap 0.2s;
      width: fit-content;
    }

    .read-more i { font-size: 0.7rem; transition: transform 0.22s; }
    .blog-card:hover .read-more { border-bottom-color: var(--read-color); }
    .blog-card:hover .read-more i { transform: translateX(5px); }

    /* ── LOADING / NO-RESULTS ──────────────────────── */
    .loading, .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--gold-700);
      background: var(--bg-card);
      border: 2px dashed var(--border-gold);
      border-radius: 18px;
    }

    .loading i { font-size: 2rem; margin-bottom: 0.8rem; animation: spin 1s linear infinite; color: var(--gold-500); display: block; }
    .no-results i { font-size: 3rem; margin-bottom: 1rem; color: var(--gold-300); display: block; }
    .no-results h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--title-color); margin-bottom: 0.5rem; }
    .no-results p { font-size: 0.9rem; color: var(--gold-600); }

    /* ── PAGINATION ──────────────────────────────────── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
      margin: 1.5rem 0 1rem;
      flex-wrap: wrap; /* prevents pagination from overflowing on small screens */
    }

    .page-btn {
      min-width: 38px; height: 38px;
      padding: 0 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border-gold);
      border-radius: 8px;
      background: var(--bg-card);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold-700);
      cursor: pointer;
      transition: all 0.18s;
      gap: 0.3rem;
    }

    .page-btn:hover:not(:disabled):not(.active) {
      background: var(--gold-200);
      border-color: var(--border-deep);
      color: var(--title-color);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(200,152,0,0.18);
    }

    .page-btn.active {
      background: var(--gold-400);
      border-color: var(--border-deep);
      color: var(--title-color);
      font-weight: 800;
      box-shadow: 0 3px 12px rgba(200,152,0,0.3);
    }

    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-dots { color: var(--gold-500); font-size: 1rem; padding: 0 0.2rem; }

    /* ── KEYFRAMES ───────────────────────────────────── */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 960px) {
      .blog-grid { grid-template-columns: repeat(2,1fr); }
    }

    @media (max-width: 620px) {
      .blog-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .sort-controls { margin-left: 0; width: 100%; }
      .sort-btn { flex: 1; justify-content: center; }
      .blogs-section { padding: 1.5rem 1rem 4rem; }
      .blogs-masthead { padding: 2.5rem 1rem 2rem; }
      .masthead-label .line { width: 28px; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <div class="blogs-masthead">
    <div class="masthead-label">
      <span class="line"></span> Publication <span class="line"></span>
    </div>
    <h1>✦ Blog Gallery ✦</h1>
    <p class="subtitle">Discover inspiring articles, stories &amp; golden insights</p>
  </div>

  <section class="blogs-section">

    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search articles…">
      </div>
      <div class="category-filter">
        <select id="categorySelect"><option value="all">All Categories</option></select>
        <i class="fas fa-chevron-down"></i>
      </div>
      <div class="sort-controls">
        <button class="sort-btn active" data-sort="latest"><i class="fas fa-clock"></i> Latest</button>
        <button class="sort-btn" data-sort="oldest"><i class="fas fa-calendar"></i> Oldest</button>
        <button class="sort-btn" data-sort="popular"><i class="fas fa-fire"></i> Popular</button>
      </div>
    </div>

    <div class="tags-cloud" id="tagsCloud">
      <span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>
    </div>

    <div class="results-info">
      <span id="resultsCount">Loading articles…</span>
      <span class="clear-filters" id="clearFilters"><i class="fas fa-times"></i> Clear filters</span>
    </div>

    <div class="blog-grid" id="blogGrid">
      <div class="loading"><i class="fas fa-spinner"></i><p>Loading golden articles…</p></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </section>

  <footer id="site-footer"></footer>
  <script src="assets/Scripts/gototop.js"></script>

<script>
(function () {
  const POSTS_PER_PAGE = 12;
  const POSTS_DIRECTORY = 'Posts/';

  let allPosts = [], filteredPosts = [];
  let currentPage = 1, currentSort = 'latest',
      currentCategory = 'all', currentTag = 'all', searchQuery = '';

  const blogGrid         = document.getElementById('blogGrid');
  const paginationDiv    = document.getElementById('pagination');
  const searchInput      = document.getElementById('searchInput');
  const categorySelect   = document.getElementById('categorySelect');
  const sortBtns         = document.querySelectorAll('.sort-btn');
  const tagsCloud        = document.getElementById('tagsCloud');
  const resultsCountSpan = document.getElementById('resultsCount');
  const clearFiltersBtn  = document.getElementById('clearFilters');

  async function loadAllPosts() {
    try {
      const res = await fetch('posts-manifest.json');
      if (!res.ok) throw new Error('Manifest not found');
      const manifest = await res.json();
      if (!Array.isArray(manifest) || !manifest.length) return [];
      const posts = await Promise.all(manifest.map(fetchPostMetadata));
      return posts.filter(Boolean);
    } catch (e) { console.error(e); return []; }
  }

  async function fetchPostMetadata(filename) {
    try {
      const res = await fetch(POSTS_DIRECTORY + filename);
      if (!res.ok) return null;
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const getMeta = n => { const m = doc.querySelector(`meta[name="${n}"]`); return m ? m.getAttribute('content') : null; };
      const extractExcerpt = () => {
        const ex = getMeta('blog:excerpt'); if (ex) return ex;
        const p = doc.querySelector('p');
        return p ? p.textContent.substring(0, 150) + '…' : 'Read this interesting article…';
      };
      const iconMap = { technology:'fa-microchip',lifestyle:'fa-heart',travel:'fa-plane',food:'fa-utensils',health:'fa-heartbeat',business:'fa-briefcase',design:'fa-pencil-ruler',science:'fa-flask',art:'fa-palette',legal:'fa-gavel',technical:'fa-gear',uncategorized:'fa-newspaper' };
      const category = getMeta('blog:category') || 'uncategorized';
      return {
        id: filename, filename, url: POSTS_DIRECTORY + filename,
        title:    getMeta('blog:title') || filename.replace('.html','').replace(/%20/g,' '),
        excerpt:  extractExcerpt(), category,
        tags:     getMeta('blog:tags') ? getMeta('blog:tags').split(',').map(t=>t.trim()) : [],
        author:   getMeta('blog:author') || 'Unknown',
        date:     getMeta('blog:date') || new Date().toISOString().split('T')[0],
        readTime: parseInt(getMeta('blog:readTime')) || Math.floor(Math.random()*10)+3,
        views:    parseInt(getMeta('blog:views')) || Math.floor(Math.random()*5000)+500,
        icon:     getMeta('blog:icon') || iconMap[category] || 'fa-newspaper'
      };
    } catch (e) { return null; }
  }

  function getTagIcon(tag) {
    const icons = { 'ec act':'fa-gavel','confiscation':'fa-box','seizure':'fa-handcuffs','legal':'fa-scale-balanced','smart-meter':'fa-microchip','electricity':'fa-bolt','energy':'fa-solar-panel','technology':'fa-code','jute':'fa-leaf','textiles':'fa-shirt','foodgrains':'fa-wheat-awn','is standard':'fa-certificate' };
    const tl = tag.toLowerCase();
    for (const [k,v] of Object.entries(icons)) if (tl.includes(k)) return v;
    return 'fa-tag';
  }

  function updateFiltersFromPosts(posts) {
    const categories = ['all', ...new Set(posts.map(p=>p.category))];
    categorySelect.innerHTML = categories.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');
    const tagsToRemove = ['detention','commodities','section 6a','section-6a','innovation','sustainability','packaging','LDL','VLDL','CoQ10','excel-tips','excel-formulas','petroleum','density','productivity'];
    const tagCount = new Map();
    posts.forEach(p => p.tags.forEach(t => {
      if (!tagsToRemove.some(r=>t.toLowerCase()===r.toLowerCase()||t.toLowerCase().includes(r.toLowerCase()))) tagCount.set(t,(tagCount.get(t)||0)+1);
    }));
    const sorted = Array.from(tagCount.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15);
    tagsCloud.innerHTML = `<span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>`
      + sorted.map(([t,c])=>`<span class="tag" data-tag="${t}"><i class="fas ${getTagIcon(t)}"></i> ${t} (${c})</span>`).join('');
    document.querySelectorAll('.tag').forEach(tag=>{
      tag.addEventListener('click',()=>{ document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active')); tag.classList.add('active'); currentTag=tag.dataset.tag; currentPage=1; renderPosts(); });
    });
  }

  function filterPosts() {
    let f = [...allPosts];
    if (currentCategory !== 'all') f = f.filter(p=>p.category===currentCategory);
    if (currentTag !== 'all') f = f.filter(p=>p.tags.includes(currentTag));
    if (searchQuery) { const q=searchQuery.toLowerCase(); f=f.filter(p=>p.title.toLowerCase().includes(q)||p.excerpt.toLowerCase().includes(q)||p.author.toLowerCase().includes(q)); }
    f.sort((a,b)=>{ if(currentSort==='latest') return new Date(b.date)-new Date(a.date); if(currentSort==='oldest') return new Date(a.date)-new Date(b.date); return b.views-a.views; });
    return f;
  }

  function formatDate(d) { return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }

  function renderPosts() {
    filteredPosts = filterPosts();
    const total = filteredPosts.length;
    const totalPages = Math.ceil(total/POSTS_PER_PAGE);
    if (currentPage > totalPages) currentPage = totalPages||1;
    const start=(currentPage-1)*POSTS_PER_PAGE, end=start+POSTS_PER_PAGE;
    const show=filteredPosts.slice(start,end);
    resultsCountSpan.textContent = total===0 ? 'No articles found' : `Showing ${start+1}–${Math.min(end,total)} of ${total} articles`;
    if (!show.length) {
      blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-search"></i><h3>No articles found</h3><p>Try adjusting your filters or search query</p></div>`;
    } else {
      blogGrid.innerHTML = show.map(post=>`
        <div class="blog-card" onclick="window.location.href='${post.url}'">
          <div class="blog-image" data-cat="${post.category}">
            <div class="icon-wrap"><i class="fas ${post.icon}"></i></div>
            <span class="blog-category-badge">${post.category}</span>
          </div>
          <div class="blog-content">
            <h3 class="blog-title">${post.title}</h3>
            <p class="blog-excerpt">${post.excerpt}</p>
            <div class="blog-meta">
              <span class="meta-item meta-author"><i class="fas fa-user"></i>${post.author}</span>
              <span class="meta-item meta-date"><i class="fas fa-calendar-days"></i>${formatDate(post.date)}</span>
              <span class="meta-item meta-time"><i class="fas fa-clock"></i>${post.readTime} min read</span>
            </div>
            <div class="blog-tags">${post.tags.slice(0,3).map(t=>`<span class="blog-tag">${t}</span>`).join('')}</div>
            <div class="read-more">Read article <i class="fas fa-arrow-right"></i></div>
          </div>
        </div>
      `).join('');
    }
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    if (totalPages<=1) { paginationDiv.innerHTML=''; return; }
    let html=`<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}"><i class="fas fa-chevron-left"></i> Prev</button>`;
    for (let i=1;i<=totalPages;i++) {
      if(i===1||i===totalPages||(i>=currentPage-2&&i<=currentPage+2)) html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      else if(i===currentPage-3||i===currentPage+3) html+=`<span class="page-dots">…</span>`;
    }
    html+=`<button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">Next <i class="fas fa-chevron-right"></i></button>`;
    paginationDiv.innerHTML=html;
    paginationDiv.querySelectorAll('.page-btn[data-page]').forEach(btn=>{
      btn.addEventListener('click',()=>{ if(!btn.disabled){currentPage=parseInt(btn.dataset.page);renderPosts();window.scrollTo({top:0,behavior:'smooth'});} });
    });
  }

  searchInput.addEventListener('input', e=>{searchQuery=e.target.value;currentPage=1;renderPosts();});
  categorySelect.addEventListener('change', e=>{currentCategory=e.target.value;currentPage=1;renderPosts();});
  sortBtns.forEach(btn=>btn.addEventListener('click',()=>{sortBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=btn.dataset.sort;currentPage=1;renderPosts();}));
  clearFiltersBtn.addEventListener('click',()=>{ searchInput.value='';categorySelect.value='all'; document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active')); document.querySelector('.tag[data-tag="all"]').classList.add('active'); searchQuery='';currentCategory='all';currentTag='all';currentPage=1;renderPosts(); });

  async function init() {
    try {
      blogGrid.innerHTML='<div class="loading"><i class="fas fa-spinner"></i><p>Loading golden articles…</p></div>';
      allPosts = await loadAllPosts();
      if (!allPosts.length) {
        blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-file-alt"></i><h3>No posts found</h3><p>Add HTML files to the Posts/ folder and run the GitHub Action.</p></div>`;
        resultsCountSpan.textContent='0 articles'; return;
      }
      updateFiltersFromPosts(allPosts);
      renderPosts();
    } catch(e) {
      console.error(e);
      blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-exclamation-triangle"></i><h3>Error loading posts</h3><p>Please refresh or try again later.</p></div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
