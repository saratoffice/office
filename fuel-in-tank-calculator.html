<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dip-to-Volume of fuel Calculation · Tank stock INDIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- Common CSS (menu, footer, global styles) -->
  <link rel="stylesheet" href="/style.css">
  <!-- ✅ IMPORTANT: site components for header/footer etc. -->
  <script src="/assets/Scripts/site-components.js" defer></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: linear-gradient(165deg, #eef2f9 0%, #dee7f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }

    .tank-card {
      max-width: 860px;
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      background: #ffffff;
      border-radius: 42px;
      box-shadow: 0 24px 48px -20px #102a4e, 0 8px 20px -8px rgba(0,32,64,0.2);
      padding: 2rem 2.2rem 2.4rem;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .tank-card h2 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: #0b2b4f;
      margin: 0 0 0.1rem 0;
      border-bottom: 3px solid #b7cde0;
      padding-bottom: 0.8rem;
    }

    .tank-card h2 span {
      background: #003057;
      color: white;
      font-size: 1rem;
      padding: 5px 20px;
      border-radius: 60px;
      margin-left: auto;
      font-weight: 500;
      white-space: nowrap;
    }

    .meta-note {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #e3ecf9;
      padding: 0.75rem 1.5rem;
      border-radius: 60px;
      margin: 1.2rem 0 2rem 0;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1d3f6e;
    }

    .meta-note .badge {
      background: #16437e;
      color: white;
      padding: 4px 18px;
      border-radius: 40px;
    }

    .fuel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem 1.8rem;
    }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
    }

    .input-field label {
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1d3f6e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-field label i {
      font-style: normal;
      background: #d2e0f5;
      width: 28px;
      height: 28px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .input-field select,
    .input-field input {
      background: white;
      border: 1.5px solid #cbd6e8;
      border-radius: 30px;
      padding: 14px 22px;
      font-size: 1.05rem;
      font-weight: 500;
      color: #0a1e38;
      transition: 0.2s;
      outline: none;
      width: 100%;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%231f3c88" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 18px;
    }

    .input-field input {
      background-image: none;
    }

    .input-field select:hover,
    .input-field input:hover {
      border-color: #6e8fc3;
    }

    .input-field select:focus,
    .input-field input:focus {
      border-color: #003c8b;
      box-shadow: 0 0 0 4px rgba(0,60,139,0.15);
    }

    .full-row {
      grid-column: span 2;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin: 28px 0 18px;
    }

    .calculate-btn {
      background: #003057;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 16px 48px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 16px 24px -10px #0f2f54;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #26518b;
    }

    .calculate-btn:hover {
      background: #001f3f;
      transform: scale(1.01);
      box-shadow: 0 20px 28px -10px #06203e;
    }

    .water-indicator {
      background: #deeafc;
      border-radius: 60px;
      padding: 6px 30px;
      font-weight: 600;
      color: #003471;
    }

    .result-panel {
      background: #ecf2fc;
      border-radius: 40px;
      padding: 1.8rem 2rem;
      margin-top: 16px;
      border: 1px solid white;
    }

    .stock-values {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 15px;
      text-align: center;
    }

    .stock-item {
      flex: 1;
      background: white;
      border-radius: 48px;
      padding: 1.2rem 0.5rem;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      min-width: 140px;
    }

    .stock-item .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #456f9c;
    }

    .stock-item .value {
      font-size: 2.3rem;
      font-weight: 800;
      color: #02213c;
      line-height: 1.2;
    }

    .stock-item .unit {
      font-size: 0.9rem;
      color: #61799e;
    }

    .detail-line {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 1rem;
      font-weight: 500;
      color: #1c3f62;
      padding: 0 10px;
    }

    hr {
      border: 1px solid #c7d8f0;
      margin: 1.2rem 0 1rem;
    }

    @media (max-width: 700px) {
      .tank-card { padding: 1.5rem; }
      .fuel-grid { grid-template-columns: 1fr; }
      .full-row { grid-column: span 1; }
      .stock-values { flex-direction: column; }
      .calculate-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- COMMON HEADER -->
    <div id="site-header"></div>
<div class="tank-card">
  <h2>
    ⛽ Dip-to-Volume of fuel Calculation
    <span>INDIA</span>
  </h2>
  <div class="meta-note">
    <span>🏭 All India tank types · MS/HSD · Horizontal cylinder</span>
    <span class="badge">IS 10987 / OISD 225</span>
  </div>

  <!-- main form -->
  <div class="fuel-grid">
    <div class="input-field">
      <label><i>⛽</i> Commodity</label>
      <select id="commodity">
        <option value="MS" selected>Motor Spirit (MS) · Petrol</option>
        <option value="HSD">High Speed Diesel (HSD)</option>
      </select>
    </div>

    <div class="input-field">
      <label><i>🏗️</i> Tank capacity (kL)</label>
      <select id="tankCap">
        <!-- Standard tanks used by Indian OMCs (IOCL/BPCL/HPCL) -->
        <option value="5">5 kL (Small retail)</option>
        <option value="10">10 kL (Rural outlet)</option>
        <option value="15">15 kL (Common)</option>
        <option value="18">18 kL (IOCL type)</option>
        <option value="20" selected>20 kL (Standard)</option>
        <option value="22">22 kL (BPCL spec)</option>
        <option value="25">25 kL (HPCL)</option>
        <option value="28">28 kL (OISD 118)</option>
        <option value="30">30 kL (Depot)</option>
        <option value="35">35 kL (Terminal)</option>
        <option value="40">40 kL (Large)</option>
        <option value="45">45 kL (Bulk)</option>
        <option value="50">50 kL (Storage)</option>
        <option value="60">60 kL (Major depot)</option>
      </select>
    </div>

    <div class="input-field">
      <label><i>📏</i> Fuel dip (mm)</label>
      <input type="number" id="dip" placeholder="e.g., 1540 mm" value="1200" step="any" min="0">
    </div>

    <div class="input-field">
      <label><i>💧</i> Water dip (mm)</label>
      <input type="number" id="waterDip" placeholder="0 if none" value="0" step="any" min="0">
    </div>

    <div class="input-field full-row">
      <label><i>📐</i> Tank dimensions (diameter × length) — auto as per OMC data</label>
      <input type="text" id="diameterDisplay" readonly value="2.30 m dia × 4.82 m L (20 kL)" style="background:#f0f5fd; font-weight:500;">
    </div>
  </div>

  <div class="action-row">
    <button class="calculate-btn" onclick="calculateStock()">
      <span>🔢</span> COMPUTE STOCK
    </button>
    <div class="water-indicator" id="waterInfo">Water dip: 0 mm</div>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="resultPanel">
    <div class="stock-values">
      <div class="stock-item">
        <div class="label">GROSS VOLUME</div>
        <div class="value" id="grossVal">—</div>
        <span class="unit">litres</span>
      </div>
      <div class="stock-item">
        <div class="label">WATER VOLUME</div>
        <div class="value" id="waterVal">—</div>
        <span class="unit">litres</span>
      </div>
      <div class="stock-item">
        <div class="label">NET STOCK</div>
        <div class="value" id="netVal">—</div>
        <span class="unit">litres</span>
      </div>
    </div>
    <hr>
    <div class="detail-line">
      <span>⏱️ dip: <span id="displayDip">1200 mm</span></span>
      <span>📦 tank: <span id="displayTank">20 kL</span></span>
      <span>⛽ <span id="displayCommodity">MS</span></span>
    </div>
    <div style="font-size:0.85rem; color:#456f9c; text-align:right; margin-top:8px;">
      *cylindrical horizontal tank · formula as per OISD-ST-118
    </div>
  </div>
</div>

<script>
(function() {
  // ---------- TANK LIBRARY (extensive) ----------
  // Based on typical Indian oil company specs (IOCL, BPCL, HPCL, OISD)
  // Diameter and length in metres. Proportions vary slightly by capacity.
  // All values are realistic for horizontal cylindrical tanks.
  const tankLibrary = {
    //  kL:   diam (m), length (m)
    5:   { diam: 1.60, length: 2.50 },  //   5.03 m³
    10:  { diam: 2.00, length: 3.20 },  //  10.05 m³
    15:  { diam: 2.05, length: 4.55 },  //  15.02 m³
    18:  { diam: 2.30, length: 4.35 },  //  18.07 m³ (IOCL type)
    20:  { diam: 2.30, length: 4.82 },  //  20.02 m³
    22:  { diam: 2.40, length: 4.86 },  //  22.00 m³
    25:  { diam: 2.50, length: 5.10 },  //  25.04 m³
    28:  { diam: 2.60, length: 5.28 },  //  28.03 m³
    30:  { diam: 2.70, length: 5.25 },  //  30.07 m³
    35:  { diam: 2.80, length: 5.70 },  //  35.09 m³
    40:  { diam: 3.00, length: 5.66 },  //  40.01 m³
    45:  { diam: 3.10, length: 5.96 },  //  44.98 m³
    50:  { diam: 3.20, length: 6.22 },  //  50.03 m³
    60:  { diam: 3.40, length: 6.62 }   //  60.11 m³
  };

  // DOM elements
  const commoditySel = document.getElementById('commodity');
  const tankCapSel = document.getElementById('tankCap');
  const dipInput = document.getElementById('dip');
  const waterInput = document.getElementById('waterDip');
  const diamDisplay = document.getElementById('diameterDisplay');
  const waterInfoSpan = document.getElementById('waterInfo');

  const grossSpan = document.getElementById('grossVal');
  const waterSpan = document.getElementById('waterVal');
  const netSpan = document.getElementById('netVal');
  const displayDip = document.getElementById('displayDip');
  const displayTank = document.getElementById('displayTank');
  const displayCommodity = document.getElementById('displayCommodity');

  // ---- update diameter readout when tank changes ----
  function updateDiameterDisplay() {
    const capKey = tankCapSel.value;  // string "5","10"... "60"
    const tank = tankLibrary[capKey];
    if (tank) {
      diamDisplay.value = `${tank.diam.toFixed(2)} m dia × ${tank.length.toFixed(2)} m L  (${capKey} kL)`;
    } else {
      diamDisplay.value = '— select tank —';
    }
    displayTank.innerText = capKey + ' kL';
  }

  // ---- core math: volume of liquid in horizontal cylinder ----
  function horizontalCylinderVolume(diamM, lengthM, depthMm) {
    const depthM = depthMm / 1000;            // convert mm to metres
    if (depthM <= 0) return 0;
    const radius = diamM / 2;
    if (depthM >= diamM) return Math.PI * radius * radius * lengthM; // full tank

    // clamp ratio to avoid numerical issues
    const ratio = (radius - depthM) / radius;
    const clampedRatio = Math.min(1, Math.max(-1, ratio));
    const theta = 2 * Math.acos(clampedRatio);

    // segment area = (r²/2) * (θ - sin θ)
    const area = (radius * radius / 2) * (theta - Math.sin(theta));
    return area * lengthM;                   // volume in m³ (= kilolitres)
  }

  // convert m³ → litres
  function cumToLitres(cum) {
    return cum * 1000;
  }

  // ---- main calculation ----
  window.calculateStock = function() {
    const commodity = commoditySel.value;       // 'MS' or 'HSD'
    const capKey = tankCapSel.value;            // e.g., '15','20'...'60'
    let dipMm = parseFloat(dipInput.value) || 0;
    let waterMm = parseFloat(waterInput.value) || 0;

    // Sanity: dip can't exceed tank diameter*1000 (but we don't hard limit, formula will treat as full)
    // Water dip can't exceed total dip (if water > dip, adjust)
    if (waterMm > dipMm) waterMm = dipMm;   // practical: water cannot be above fuel interface

    waterInfoSpan.innerText = `💧 Water dip: ${waterMm} mm`;

    // fetch tank dimensions
    const tank = tankLibrary[capKey];
    if (!tank) {
      grossSpan.innerText = 'ERR';
      waterSpan.innerText = 'ERR';
      netSpan.innerText = 'ERR';
      return;
    }

    const diam = tank.diam;
    const length = tank.length;

    // 1. gross fuel volume (total dip)
    let grossM3 = horizontalCylinderVolume(diam, length, dipMm);
    let grossLitres = cumToLitres(grossM3);

    // 2. water volume (if any)
    let waterLitres = 0;
    if (waterMm > 0) {
      const waterM3 = horizontalCylinderVolume(diam, length, waterMm);
      waterLitres = cumToLitres(waterM3);
    }

    // 3. net stock = gross fuel - water (since water sits at bottom)
    let netLitres = grossLitres - waterLitres;
    if (netLitres < 0) netLitres = 0;   // safety

    // round to 1 decimal
    grossLitres = Math.round(grossLitres * 10) / 10;
    waterLitres = Math.round(waterLitres * 10) / 10;
    netLitres = Math.round(netLitres * 10) / 10;

    // update result fields
    grossSpan.innerText = grossLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    waterSpan.innerText = waterLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    netSpan.innerText = netLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});

    // display dip & commodity
    displayDip.innerText = dipMm + ' mm';
    displayCommodity.innerText = commodity;

    // tank display already updated in onchange, but keep consistent
    displayTank.innerText = capKey + ' kL';
  };

  // ---- event listeners to refresh diameter and recalc ----
  tankCapSel.addEventListener('change', function() {
    updateDiameterDisplay();
    calculateStock();
  });

  commoditySel.addEventListener('change', function() {
    displayCommodity.innerText = commoditySel.value;
    calculateStock();   // optional recalc (no effect on volume but updates commodity label)
  });

  dipInput.addEventListener('input', calculateStock);
  waterInput.addEventListener('input', calculateStock);

  // initial update
  updateDiameterDisplay();
  calculateStock();
})();
</script>
<!-- FOOTER -->
<div id="site-footer"></div>
  <!-- Go to Top -->
  <script src="/assets/Scripts/gototop.js"></script>
</body>
</html>
