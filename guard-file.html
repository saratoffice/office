<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guard File</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Common CSS (menu, footer, global styles) -->
  <link rel="stylesheet" href="style.css">
  <!-- ✅ IMPORTANT: site components for header/footer etc. -->
  <script src="assets/Scripts/site-components.js" defer></script>
  
  <style>
/* ================================
   GUARD FILE – HERO SECTION
   ================================ */

.guard-hero {
  /* Gradient background */
  background: linear-gradient(
    135deg,
    #243b55 0%,
    #29485a 50%,
    #1f3a4a 100%
  );
  padding: 50px 20px;
  text-align: center;
  color: #ffffff;
  overflow: hidden;
}

.guard-hero-inner {
  max-width: 1100px;
  margin: auto;
}

/* Title */
.guard-title {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #fff176;
  margin-bottom: 20px;
  text-transform: uppercase;
}

/* Subtitle */
.guard-subtitle {
  font-size: 26px;
  color: #9adfff;
  margin-bottom: 40px;
  font-weight: 500;
}

/* Buttons */
.guard-actions {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.guard-btn {
  padding: 14px 34px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 600;
  text-decoration: none;
  color: #ffffff;
  background: transparent;
  border: 2px solid #ffffff;
  transition: all 0.3s ease;
}

.guard-btn:hover {
  background: #ffffff;
  color: #1f3a4a;
  transform: translateY(-3px);
}

/* Secondary button */
.guard-btn.outline {
  border-color: #9adfff;
  color: #9adfff;
}

.guard-btn.outline:hover {
  background: #9adfff;
  color: #1f2937;
}

/* ================================
   SCROLL ANIMATION
   ================================ */

.animate-on-scroll {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}

.animate-on-scroll.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ================================
   RESPONSIVE
   ================================ */

@media (max-width: 768px) {
  .guard-title {
    font-size: 38px;
  }

  .guard-subtitle {
    font-size: 20px;
  }

  .guard-btn {
    font-size: 16px;
    padding: 12px 26px;
  }
}

  </style>
</head>

<body>

<div id="site-header"></div>


<!-- CONTENT -->  
<section class="guard-hero">

  <div class="guard-hero-inner animate-on-scroll">

    <h1 class="guard-title">GUARD FILE</h1>

    <p class="guard-subtitle">
      Government Letters and Guidelines Archive
    </p>

    <div class="guard-actions">
      <a href="policy.html" class="guard-btn">Policy</a>
     
    </div>

  </div>

</section>

  <!-- ✅ DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css" />
  
  <!-- ✅  Load CSS from GitHub CDN to Style CSV Table -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/saratoffice/Hosting@main/guard-file/guidelines.css">


<!-- ✅ Table Container -->
<div class="sara-table-container-v2">
  <table id="saraCsvTableV2" class="display nowrap">
    <thead>
      <tr>
        <th>Index</th>
        <th>Letter No.</th>
        <th>Date</th>
        <th>Subject</th>
        <th>Download</th>
        <th>Size</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
  <script> 
    $(document).ready(function () {
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTagonyub0K84Tg9xZVxeLhQ8rfb417bTqKwSP3xzhkQ5mbnZY6mOFFdB6kK8Hl0EZtYY7t3e8qd-kO/pub?gid=51131841&single=true&output=csv';

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    complete: function (results) {
      let data = results.data;

      // First process all data and add SortDate
      data = data.map((row, index) => {
        row["Subject"] = (row["Subject"] || "").replace(/_/g, " ").replace(/\.pdf$/i, "").trim();
       const rawDate = (row["Date"] || "").trim();
       const parts = rawDate.split("/");
        if (parts.length === 3) {
          let [dd, mm, yyyy] = parts;
          dd = dd.padStart(2, '0');
          mm = mm.padStart(2, '0');
          if (yyyy.length === 4) {
            row["SortDate"] = `${yyyy}-${mm}-${dd}`;
            row["Date"] = `${dd}-${mm}-${yyyy}`;
          } else {
            row["SortDate"] = null;
          }
        } else {
          row["SortDate"] = null;
        }

        return row;
      });

      // Sort by date first
      data.sort((a, b) => {
        if (!a.SortDate && !b.SortDate) return 0;
        if (!a.SortDate) return 1;
        if (!b.SortDate) return -1;
        return new Date(b.SortDate) - new Date(a.SortDate);
      });

      // Now add sequential S.N. after sorting
      data.forEach((row, index) => {
        row["S.N."] = index + 1;
      });

      const tbody = $('#saraCsvTableV2 tbody');
      tbody.empty();

      data.forEach(row => {
        const tableRow = `
          <tr>
            <td data-label="S.N.">${row["S.N."]}</td>
            <td data-label="Letter No.">${row["Letter No."] || ""}</td>
            <td data-label="Date" data-sort="${row["SortDate"] || ''}">${row["Date"] || ""}</td>
            <td data-label="Subject">${row["Subject"] || ""}</td>
            <td data-label="Download">${row["Button"] || ""}</td>
            <td data-label="File Size">${row["File Size (MB)"] || "—"}</td>
          </tr>`;
        tbody.append(tableRow);
      });

      $('#saraCsvTableV2').DataTable({
        responsive: true,
        pageLength: 10,
        lengthMenu: [[5, 10, 25, 50, 100, -1], [5, 10, 25, 50, 100, "All"]],
        autoWidth: false,
        order: [[2, 'desc']], // Keep default sorting by date
        columnDefs: [
          {
            targets: 0, // S.N. column
            orderable: false // Disable sorting on this column
          }
        ],
        language: {
          search: "Search:",
          lengthMenu: "Show _MENU_ entries",
          info: "Showing _START_ to _END_ of _TOTAL_ entries",
          infoEmpty: "No records available",
          infoFiltered: "(filtered from _MAX_ total entries)",
          paginate: {
            first: "First",
            last: "Last",
            next: "Next",
            previous: "Previous"
          }
        },
        drawCallback: function(settings) {
          // Re-number the S.N. column after each draw (sort/filter/page)
          const api = this.api();
          api.column(0, {page: 'current'}).nodes().each(function(cell, i) {
            cell.innerHTML = i + 1 + (api.page() * api.page.len());
          });
        }
      });
    },
    error: function (err) {
      console.error('CSV Load Error:', err);
      alert('Failed to load data. Please try again later.');
    }
  });
});
  </script>
<script src="assets/Scripts/Guardfile-animations.js"></script>
<!-- ✅ jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>


  <!-- FOOTER -->
<div id="site-footer"></div>

 <!-- Go to Top -->
  <script src="/assets/Scripts/gototop.js"></script>
</body>
</html>
