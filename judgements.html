<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>High Court · Judgements</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Common CSS (header/footer/global) — do not modify -->
  <link rel="stylesheet" href="style.css">
  <!-- site components (header/footer loader) -->
  <script src="assets/Scripts/site-components.js" defer></script>
  <style>
    /* ---------- global reset & flex sticky footer ---------- */
    body {
      background: #f4f7fb;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #site-header, #site-footer { flex-shrink: 0; }

    /* main container: two columns, zigzag placement */
    .zigzag-grid {
      max-width: 1300px;
      width: 100%;
      margin: 150px auto 60px auto;
      padding: 20px 30px;
      flex: 1 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;   /* two columns */
      gap: 30px 40px;                   /* horizontal gap increased for visual separation */
      background: transparent;
    }

    /* ---------- full slide card (zigzag aware) ---------- */
    .slide-card {
      background-color: transparent;
      width: 100%;
      aspect-ratio: 5 / 3;
      position: relative;
      border-radius: 32px 16px 16px 32px;
      box-shadow: 0 16px 32px -12px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease;
      cursor: default;
      overflow: visible;        /* allow sliding outside */
      z-index: 1;               /* base z-index for all cards */
    }

    /* hovered card goes on top of all others */
    .slide-card:hover {
      z-index: 10;
      box-shadow: 0 28px 50px -16px rgba(120, 50, 30, 0.5);
    }

    /* left column cards (odd) - card itself aligned to left side of its grid cell */
    .slide-card.left-card {
      margin-right: 0;          /* stick to left */
      margin-left: 0;
    }

    /* right column cards (even) - card aligned to right side of its cell */
    .slide-card.right-card {
      margin-left: auto;         /* stick to right */
      margin-right: 0;
    }

    /* both layers absolutely positioned */
    .slide-front, .slide-back {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px;
      background: white;
      box-sizing: border-box;
      overflow-y: auto;
      pointer-events: none;
      will-change: transform;
    }

    .slide-front {
      background: #ffffff;
      z-index: 2;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .slide-back {
      background: linear-gradient(165deg, #f7f2ec 0%, #ffffff 100%);
      z-index: 1;
      border-left: 4px solid #9e2b1f;
    }

    /* LEFT CARD (odd): front starts at left, back behind. Hover: front slides FULLY RIGHT (100%) */
    .slide-card.left-card .slide-front {
      left: 0;
      transform: translateX(0);
    }
    .slide-card.left-card .slide-back {
      left: 0;
      transform: translateX(0);
    }
    .slide-card.left-card:hover .slide-front {
      transform: translateX(100%);  /* full slide to right, entire back visible */
    }
    .slide-card.left-card:hover .slide-back {
      transform: translateX(0);
      transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) 0.05s;
    }

    /* RIGHT CARD (even): front starts at right, back behind. Hover: front slides FULLY LEFT (-100%) */
    .slide-card.right-card .slide-front {
      right: 0;
      transform: translateX(0);
    }
    .slide-card.right-card .slide-back {
      right: 0;
      transform: translateX(0);
    }
    .slide-card.right-card:hover .slide-front {
      transform: translateX(-100%);  /* full slide to left, entire back visible */
    }
    .slide-card.right-card:hover .slide-back {
      transform: translateX(0);
      transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) 0.05s;
    }

    /* ----- front content (judgment styling) ----- */
    .slide-front {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }

    .slide-front .number {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 10vw, 120px);
      line-height: 1;
      min-width: 120px;
      text-align: center;
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      background-size: cover;
      background-position: center 30%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .front-info {
      flex: 1;
    }

    .front-info .court-badge {
      display: inline-block;
      background: #f0e7e0;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      color: #7b3f2c;
      margin-bottom: 8px;
      border: 1px solid #d9c5b8;
    }

    .front-info h3 {
      margin: 0 0 10px 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      padding-left: 20px;
      color: #1e2b3c;
      text-transform: uppercase;
      position: relative;
      line-height: 1.3;
    }

    .front-info h3::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      bottom: 6px;
      width: 6px;
      background: linear-gradient(135deg, #9e2b1f, #c14f3a);
      border-radius: 12px;
    }

    .front-info .case-ref {
      font-size: 0.85rem;
      font-weight: 500;
      color: #6f5b4c;
      margin: 8px 0 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .front-info .case-ref i {
      font-size: 0.75rem;
      color: #9e2b1f;
    }

    .front-info p {
      margin: 8px 0 4px 0;
      line-height: 1.6;
      font-size: 0.95rem;
      opacity: 0.85;
      text-align: justify;
      color: #2c3e4e;
      font-weight: 400;
    }

    /* ----- back content (judgment actions) ----- */
    .slide-back {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 20px;
      pointer-events: none;
    }

    .back-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: #2d3748;
      margin-bottom: 4px;
      border-bottom: 3px solid #9e2b1f;
      display: inline-block;
      padding-bottom: 8px;
      line-height: 1.4;
      max-width: 90%;
    }

    .back-citation {
      font-size: 0.85rem;
      background: #e9ddd3;
      padding: 4px 16px;
      border-radius: 40px;
      color: #4d3a2e;
      font-weight: 500;
      display: inline-block;
    }

    .back-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      position: relative;
      z-index: 10;
      margin-top: 10px;
    }

    .back-btn {
      background: white;
      border: 2px solid #9e2b1f;
      color: #7b2c1d;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 150px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 12px -6px rgba(150, 50, 20, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      pointer-events: auto;
      gap: 8px;
    }

    .back-btn i {
      font-size: 1rem;
    }

    .back-btn:hover {
      background: #9e2b1f;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 14px 24px -10px #9e2b1f;
      border-color: transparent;
    }

    /* number background image */
    .number[style*="background-image"] {
      background-size: cover;
      background-position: center;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* responsiveness */
    @media (max-width: 900px) {
      .zigzag-grid {
        grid-template-columns: 1fr;
        max-width: 700px;
      }
      .slide-card {
        aspect-ratio: 6 / 4;
        margin-left: 0 !important;
        margin-right: 0 !important;
      }
      .slide-card.left-card .slide-front,
      .slide-card.right-card .slide-front {
        left: 0;
        right: auto;
      }
      .slide-card.left-card:hover .slide-front,
      .slide-card.right-card:hover .slide-front {
        transform: translateX(100%);
      }
    }

    @media (max-width: 600px) {
      .slide-front {
        flex-direction: column;
        text-align: center;
        padding: 16px;
      }
      .front-info h3 {
        padding-left: 0;
      }
      .front-info h3::before {
        display: none;
      }
      .front-info p {
        text-align: center;
      }
      .slide-card {
        aspect-ratio: auto;
        min-height: 380px;
      }
      .back-btn {
        min-width: 130px;
        padding: 10px 14px;
        font-size: 0.95rem;
      }
      .slide-card.left-card:hover .slide-front,
      .slide-card.right-card:hover .slide-front {
        transform: translateX(100%);
      }
    }
  </style>
</head>

      // main slide-card container with alternating placement: even index = left, odd = right

      card.className = `slide-card ${index % 2 === 0 ? 'left-card' : 'right-card'}`;

      infoDiv.appendChild(titleEl);
      infoDiv.appendChild(caseRefEl);
      infoDiv.appendChild(descEl);

      const backHeading = document.createElement("div");
      backHeading.className = "back-title";
      backHeading.textContent = item.title.length > 50 ? item.title.substring(0, 50) + "…" : item.title;

      const backCitation = document.createElement("div");
      backCitation.className = "back-citation";
      backCitation.textContent = `${item.court} · ${item.caseRef}`;

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "back-actions";

      actionsDiv.appendChild(btn2);
      backDiv.appendChild(backHeading);
      backDiv.appendChild(backCitation);
      backDiv.appendChild(actionsDiv);

      // assemble card
      card.appendChild(frontDiv);
      card.appendChild(backDiv);
      container.appendChild(card);

      frontDiv.addEventListener("click", (e) => {
        window.open(item.frontLink, '_blank', 'noopener,noreferrer');
      });

      // back side click (if on container or heading/citation) opens same judgment
      backDiv.addEventListener("click", (e) => {
        if (e.target === backDiv || e.target.classList.contains('back-title') || e.target === backHeading || e.target.classList.contains('back-citation') || e.target === backCitation) {
          window.open(item.backAction1.link, '_blank', 'noopener,noreferrer');

</script>
