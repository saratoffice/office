<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sarat Office | Flip‑card index (two‑column)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts (consistent with original) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <!-- Common CSS (header/footer/global) — do not modify -->
  <link rel="stylesheet" href="style.css">
  <!-- site components (header/footer loader) -->
  <script src="assets/Scripts/site-components.js" defer></script>
  <!-- styles: two‑column grid, horizontal flip cards, both sides clickable -->
  <style>
    /* ---------- global reset & flex sticky footer ---------- */
    body {
      background: #f4f7fb;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #site-header, #site-footer { flex-shrink: 0; }

    /* main container: two columns, each cell is a perspective container */
    .flip-grid {
      max-width: 1300px;
      width: 100%;
      margin: 40px auto 60px auto;
      padding: 20px 30px;
      flex: 1 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;   /* two columns */
      gap: 30px;
      background: transparent;
    }

    /* ---------- flip card container (perspective) ---------- */
    .flip-card {
      background-color: transparent;
      width: 100%;
      aspect-ratio: 5 / 3;               /* nice rectangular card, fits content */
      perspective: 2000px;                /* gives depth to the flip */
      cursor: pointer;                    /* whole card looks clickable */
    }

    /* inner wrapper – holds front and back, applies 3D and transition */
    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      border-radius: 40px 20px 20px 40px; /* keep original asymmetric feel */
      box-shadow: 0 12px 28px -10px rgba(0,0,0,0.2);
    }

    /* hover: horizontal flip (180deg around Y axis) */
    .flip-card:hover .flip-inner {
      transform: rotateY(180deg);
    }

    /* front & back share positioning and backface-visibility */
    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;        /* hide the reverse side when not facing viewer */
      border-radius: inherit;              /* same rounded corners */
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px;
      background: white;
      box-shadow: 0 8px 18px -6px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.02) inset;
      transition: box-shadow 0.2s;
      box-sizing: border-box;
      overflow-y: auto;                    /* in case content overflows (rare) */
    }

    /* back side is rotated 180deg initially */
    .flip-back {
      transform: rotateY(180deg);
      background: #ffffff;
      /* subtle different background to distinguish back */
      background: linear-gradient(145deg, #ffffff 0%, #f9fafc 100%);
    }

    /* ----- front content ----- */
    .flip-front {
      display: flex;
      flex-direction: row;          /* align number and text side by side */
      align-items: center;
      gap: 16px;
    }

    .flip-front .number {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 10vw, 120px);
      line-height: 1;
      min-width: 120px;
      text-align: center;
      padding: 6px 0;
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      background-size: cover;
      background-position: center 30%;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .front-info {
      flex: 1;
    }

    .front-info h3 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      position: relative;
      padding-left: 20px;
      color: #111827;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      display: inline-block;
    }

    .front-info h3::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      bottom: 6px;
      width: 6px;
      background: linear-gradient(135deg, #e11d48, #b91c1c);
      border-radius: 12px;
      transition: 0.2s;
    }

    .flip-card:hover .front-info h3::before {
      width: 10px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    .front-info p {
      margin: 8px 0 4px 0;
      line-height: 1.7;
      font-size: 0.98rem;
      opacity: 0.8;
      text-align: justify;
      text-indent: 2em;
      color: #1f2937;
    }

    /* ----- back content (two clickable options) ----- */
    .flip-back {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 24px;
    }

    .back-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      border-bottom: 3px solid #2563eb;
      display: inline-block;
      padding-bottom: 6px;
    }

    .back-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }

    .back-btn {
      background: rgba(37, 99, 235, 0.08);
      border: 2px solid #2563eb;
      color: #1e40af;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 60px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 160px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.03);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #2563eb;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 12px 24px -12px #2563eb;
      border-color: transparent;
    }

    /* both sides need to be clickable: we attach JS, but we keep inner elements clickable too */
    .flip-back, .flip-front {
      pointer-events: auto;
    }

    /* extra: even items keep same front shape */
    .flip-card:nth-of-type(even) .flip-front {
      border-radius: 40px 20px 20px 40px;
    }

    /* responsiveness: two columns to one */
    @media (max-width: 900px) {
      .flip-grid {
        grid-template-columns: 1fr;
        max-width: 700px;
      }
      .flip-card {
        aspect-ratio: 6 / 4;
      }
    }

    @media (max-width: 600px) {
      .flip-front {
        flex-direction: column;
        text-align: center;
        padding: 16px;
      }
      .front-info h3 {
        padding-left: 0;
      }
      .front-info h3::before {
        display: none;
      }
      .front-info p {
        text-indent: 0;
        text-align: center;
      }
      .flip-card {
        aspect-ratio: auto; /* let height be content driven */
        min-height: 300px;
      }
      .back-btn {
        min-width: 130px;
        padding: 12px 16px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div id="site-header"></div>

<!-- MAIN TWO-COLUMN FLIP GRID -->
<div class="flip-grid"></div>

<script>
  (function() {
    // Data with exactly the original front links.
    // For the back side, both buttons now use the SAME url as the front link (per your request).
    const listItems = [
      {
        title: "Gunny Specifications",
        description: "Official specifications for jute gunny bags including dimensions, weight tolerance, stitching standards, and tensile strength. Used for packaging food grains, these BIS guidelines ensure uniform quality.",
        imageUrl: "/assets/images/AI-Images/AI.webp",
        frontLink: "Posts/Specification%20of%20Gunny%20Bags.html",
        backAction1: { text: "📄 View Specification", link: "Posts/Specification%20of%20Gunny%20Bags.html" },
        backAction2: { text: "🔍 Check Details", link: "Posts/Specification%20of%20Gunny%20Bags.html" }
      },
      {
        title: "ASTM D 1250",
        description: "ASTM D1250 is the standard guide for petroleum measurement tables, providing volume correction factors for crude oil and refined products. It defines procedures to adjust volumes to standard temperatures.",
        imageUrl: "/assets/images/AI-Images/Machine.webp",
        frontLink: "/Posts/astm-d1250-petroleum-measurement-guide.html",
        backAction1: { text: "📊 Volume Tables", link: "/Posts/astm-d1250-petroleum-measurement-complete-guide.html" },
        backAction2: { text: "⚙️ Calculator", link: "/Posts/astm-d1250-petroleum-measurement-complete-guide.html" }
      },
      {
        title: "Work Locations",
        description: "Geotagged map of operational sites including paddy purchase centers, fair price shops, and storage warehouses. Each marker contains address, contact person, and a direct Google Maps link.",
        imageUrl: "/assets/images/AI-Images/Mother-Board.webp",
        frontLink: "/locations.html",
        backAction1: { text: "🗺️ Open Map View", link: "/locations.html" },
        backAction2: { text: "📋 Location List", link: "/locations.html" }
      },
      {
        title: "Web Links",
        description: "Handpicked directory of useful websites: government portals (eUpkar, Food Corporation), commodity price trackers, technical standards libraries (BIS, ISO), and internal dashboards.",
        imageUrl: "/assets/images/AI-Images/ShareMarket.webp",
        frontLink: "/weblinks.html",
        backAction1: { text: "🔖 All Links", link: "/weblinks.html" },
        backAction2: { text: "➕ Suggest Link", link: "/weblinks.html" }
      },
      {
        title: "Guard File",
        description: "Govt published guidelines, important letters, SOPs, gazettes, and circulars — all archived here for quick reference and compliance.",
        imageUrl: "/assets/images/AI-Images/5g.webp",
        frontLink: "/guard-file.html",
        backAction1: { text: "📜 Gazette Archive", link: "/guard-file.html" },
        backAction2: { text: "⚖️ SOPs", link: "/guard-file.html" }
      },
      {
        title: "Policy",
        description: "Collection of internal office policies: leave application procedure, travel allowance rules, procurement delegation, and IT usage guidelines. All staff must adhere to the latest versions linked here.",
        imageUrl: "/assets/images/AI-Images/intelligent-energy.webp",
        frontLink: "/policy.html",
        backAction1: { text: "📘 Employee Handbook", link: "/policy.html" },
        backAction2: { text: "🖨️ Forms", link: "/policy.html" }
      },
      {
        title: "Color Palettes",
        description: "Sole popular colors displayed as palettes — click any color code to copy it instantly for use in your designs. Create the perfect palette or get inspired by thousands of beautiful color schemes.",
        imageUrl: "/assets/images/AI-Images/kpmg.webp",
        frontLink: "/color-palettes.html",
        backAction1: { text: "🎨 Copy Palette", link: "/color-palettes.html" },
        backAction2: { text: "📱 WCAG contrast", link: "/color-palettes.html" }
      },
      {
        title: "List of Fonts",
        description: "Some popular font styles are displayed here for use — browse and see previews to choose the perfect typeface. Click any card to explore the font on www.coolors.co/fonts",
        imageUrl: "/assets/images/AI-Images/intelligent.webp",
        frontLink: "/fonts.html",
        backAction1: { text: "🔤 Preview", link: "/fonts.html" },
        backAction2: { text: "⬇️ Download pack", link: "/fonts.html" }
      }
    ];

    const container = document.querySelector(".flip-grid");
    if (!container) return;
    container.innerHTML = "";

    listItems.forEach((item, index) => {
      const number = (index + 1).toString().padStart(2, "0");

      // main flip-card container
      const card = document.createElement("div");
      card.className = "flip-card";

      // inner wrapper
      const inner = document.createElement("div");
      inner.className = "flip-inner";

      // ---------- FRONT SIDE ----------
      const frontDiv = document.createElement("div");
      frontDiv.className = "flip-front";

      const numberSpan = document.createElement("div");
      numberSpan.className = "number";
      numberSpan.style.backgroundImage = `url('${item.imageUrl}')`;
      numberSpan.textContent = number;

      const infoDiv = document.createElement("div");
      infoDiv.className = "front-info";

      const titleEl = document.createElement("h3");
      titleEl.textContent = item.title;

      const descEl = document.createElement("p");
      descEl.textContent = item.description;

      infoDiv.appendChild(titleEl);
      infoDiv.appendChild(descEl);
      frontDiv.appendChild(numberSpan);
      frontDiv.appendChild(infoDiv);

      // make front side clickable -> frontLink
      frontDiv.addEventListener("click", (e) => {
        e.stopPropagation(); 
        window.open(item.frontLink, '_blank', 'noopener,noreferrer');
      });

      // ---------- BACK SIDE ----------
      const backDiv = document.createElement("div");
      backDiv.className = "flip-back";

      const backHeading = document.createElement("div");
      backHeading.className = "back-title";
      backHeading.textContent = item.title + " • more";

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "back-actions";

      // button 1 – now uses same link as frontLink (as specified)
      const btn1 = document.createElement("a");
      btn1.className = "back-btn";
      btn1.textContent = item.backAction1.text;
      btn1.href = item.backAction1.link;   // same as frontLink
      btn1.setAttribute("target", "_blank");
      btn1.setAttribute("rel", "noopener noreferrer");
      btn1.addEventListener("click", (e) => e.stopPropagation());

      // button 2 – also uses same link
      const btn2 = document.createElement("a");
      btn2.className = "back-btn";
      btn2.textContent = item.backAction2.text;
      btn2.href = item.backAction2.link;   // same as frontLink
      btn2.setAttribute("target", "_blank");
      btn2.setAttribute("rel", "noopener noreferrer");
      btn2.addEventListener("click", (e) => e.stopPropagation());

      actionsDiv.appendChild(btn1);
      actionsDiv.appendChild(btn2);
      backDiv.appendChild(backHeading);
      backDiv.appendChild(actionsDiv);

      // back side click (if user clicks outside buttons) we open the first back action (which is same as front)
      backDiv.addEventListener("click", (e) => {
        if (e.target === backDiv || e.target.classList.contains('back-title')) {
          window.open(item.backAction1.link, '_blank', 'noopener,noreferrer');
        }
      });

      inner.appendChild(frontDiv);
      inner.appendChild(backDiv);
      card.appendChild(inner);
      container.appendChild(card);
    });
  })();
</script>

<!-- FOOTER -->
<div id="site-footer"></div>

<!-- Go to Top (existing) -->
<script src="/assets/Scripts/gototop.js"></script>

</body>
</html>
