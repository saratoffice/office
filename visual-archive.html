<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery · Office & Field Operations</title>
    <link rel="stylesheet" href="style.css">
    <script src="assets/Scripts/site-components.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- base & reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f8fafd; font-family: 'Inter', sans-serif; }
        .gallery-module {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            color: #111827;
        }
        /* heading (unchanged, compact) */
        .gallery-heading { margin-bottom: 3rem; position: relative; }
        .heading-content { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 1.5rem; }
        .heading-top { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; justify-content: space-between; }
        .heading-title-group { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
        .heading-icon { background: linear-gradient(145deg,#1e3c5c,#2b5b8b); width:70px;height:70px;border-radius:24px;display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;box-shadow:0 15px 30px -10px rgba(30,60,92,0.4);transform:rotate(3deg);transition:.2s;}
        .heading-text h1 { font-family:'Outfit',sans-serif; font-size:clamp(2.5rem,7vw,4rem); font-weight:800; letter-spacing:-0.03em; background:linear-gradient(135deg,#1e293b,#1e3c5c,#2563eb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .heading-text .subtitle { font-size:1.2rem; color:#475569; display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }
        .live-indicator { background:#dcfce7; color:#166534; padding:0.25rem 1rem; border-radius:60px; font-weight:600; display:inline-flex; align-items:center; gap:0.4rem; }
        .stats-pills { display:flex; gap:0.8rem; flex-wrap:wrap; }
        .stat-pill { background:white; border:1px solid #e2e8f0; padding:0.5rem 1.2rem; border-radius:60px; font-size:0.9rem; font-weight:500; display:flex; align-items:center; gap:0.6rem; transition:.2s; }
        .heading-bottom { background:rgba(255,255,255,0.8); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.8); border-radius:60px; padding:0.75rem 1.5rem; display:inline-flex; flex-wrap:wrap; align-items:center; gap:2rem; }

        /* filter bar - primary tabs: ALL / PHOTOS / VIDEOS */
        .gallery-filterbar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0 2rem;
        }
        .primary-tabs {
            display: flex;
            gap: 0.5rem;
            background: white;
            padding: 0.5rem;
            border-radius: 60px;
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1);
            border: 1px solid #edf2f7;
            width: fit-content;
            flex-wrap: wrap;
        }
        .primary-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            white-space: nowrap;
        }
        .primary-btn.active {
            background: #1e3c5c;
            border-color: #1e3c5c;
            color: white;
            box-shadow: 0 8px 16px -6px #1e3c5c;
        }
        .secondary-filterbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 80px;
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1);
            border: 1px solid #edf2f7;
            gap: 1rem;
        }
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .filter-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }
        .filter-btn i { color: #64748b; }
        .filter-btn.active {
            background: #1e3c5c;
            border-color: #1e3c5c;
            color: white;
        }
        .filter-btn.active i { color: white; }

        /* modern view-options as soft pill */
        .view-options-modern {
            display: flex;
            gap: 0.25rem;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 48px;
            border: 1px solid #e0eaf2;
        }
        .view-btn-modern {
            width: 44px; height: 44px; border-radius: 44px; border: none; background: transparent; color: #475569; cursor: pointer; transition: 0.2s; font-size: 1.2rem; display: inline-flex; align-items: center; justify-content: center;
        }
        .view-btn-modern.active {
            background: #2563eb; color: white; box-shadow: 0 6px 12px -8px #1e3c5c;
        }

        /* gallery grid */
        .gallery-grid {
            display: grid;
            gap: 1.8rem;
            transition: 0.3s;
            margin-bottom: 3rem;
        }
        .gallery-grid.masonry-view { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); grid-auto-rows: 280px; }
        .gallery-grid.grid-view { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .gallery-grid.list-view { grid-template-columns: 1fr; }

        /* cards */
        .media-card {
            background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 15px 35px -12px rgba(0,30,60,0.15); transition: 0.3s; border: 1px solid rgba(255,255,255,0.6); cursor: pointer; display: flex; flex-direction: column;
        }
        .media-card:hover { transform: translateY(-6px); box-shadow: 0 28px 45px -14px rgba(20,60,120,0.3); border-color: rgba(37,99,235,0.3); }
        .card-media { position: relative; overflow: hidden; background: #eef3f9; flex-shrink: 0; }
        .gallery-grid.masonry-view .card-media { height: 100%; }
        .gallery-grid.grid-view .card-media { aspect-ratio: 4/3; }
        .gallery-grid.list-view .media-card { flex-direction: row; max-height: 200px; }
        .gallery-grid.list-view .card-media { aspect-ratio: 4/3; max-width: 240px; width: 100%; }
        .card-media img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .media-card:hover .card-media img { transform: scale(1.05); }
        .video-play-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .media-card:hover .video-play-overlay { opacity: 1; }
        .video-play-overlay i { background: rgba(255,255,255,0.9); color: #1e3c5c; border-radius: 60px; padding: 1rem 1.5rem; font-size: 1.5rem; }
        .media-badge {
            position: absolute; top:12px; right:12px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); color: white; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; z-index:2;
        }
        .card-content { padding: 1.4rem; background: white; flex:1; }
        .card-title { font-weight:700; font-size:1.15rem; margin-bottom:0.4rem; display:flex; align-items:center; justify-content:space-between; color:#0f2b40; }
        .card-title .date-tag { background:#e3edf7; padding:0.2rem 0.9rem; border-radius:40px; font-size:0.7rem; font-weight:600; color:#1e4a76; }
        .card-location { display:flex; align-items:center; gap:0.5rem; font-size:0.85rem; color:#5f6b7a; margin-bottom:0.6rem; }
        .card-desc { color:#36454F; font-size:0.9rem; line-height:1.5; margin-bottom:1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .card-tags { display:flex; flex-wrap:wrap; gap:0.5rem; }
        .tag { background:#f0f4fa; padding:0.25rem 1rem; border-radius:40px; font-size:0.7rem; font-weight:500; color:#365277; }

        /* lightbox */
        .photo-lightbox {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); z-index:10000; align-items:center; justify-content:center; padding:2rem;
        }
        .photo-lightbox.active { display: flex; }
        .lightbox-content { max-width: 1200px; max-height: 90vh; position: relative; }
        .lightbox-content img {
    width: auto;           /* ← change from 100% to auto */
    max-width: 100%;       /* keep to prevent overflow */
    max-height: 95vh;      /* ← increase from 85vh to 95vh */
    height: auto;          /* maintain aspect ratio */
    object-fit: contain;   /* already good */
    border-radius: 24px;
    border: 2px solid #2d3748;
}
        .lightbox-close { position: absolute; top:-40px; right:0; background:none; border:none; color:white; font-size:3rem; cursor:pointer; }

        /* video modal */
        .video-modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px); z-index:10000; align-items:center; justify-content:center; padding:2rem;
        }
        .video-modal.active { display: flex; }
        .modal-content { max-width:1000px; width:100%; background:#0b0f16; border-radius:36px; overflow:hidden; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.8rem; background:#111827; color:white; border-bottom:1px solid #2a374a; }
        .modal-close { background:none; border:none; color:#cbd5e0; font-size:1.8rem; cursor:pointer; }
        .video-wrapper { position:relative; padding-bottom:56.25%; height:0; background:black; }
        .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:0; }
        .video-wrapper video { position:absolute; top:0; left:0; width:100%; height:100%; background:black; }

        .gallery-footer { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1.5rem; margin-top:3rem; padding-top:2rem; border-top:2px solid #dee8f2; }
        .stats-group { display:flex; gap:2rem; flex-wrap:wrap; }
        .stat { display:flex; align-items:center; gap:0.6rem; color:#2c3e50; font-weight:600; }
        .load-btn { background:linear-gradient(135deg,#1e3c5c,#2563eb); border:none; color:white; padding:0.9rem 2.5rem; border-radius:60px; font-weight:600; display:flex; align-items:center; gap:1rem; cursor:pointer; transition:.3s; }

        /* responsive */
        @media (max-width: 640px) {
            .gallery-filterbar { gap: 0.8rem; }
            .primary-tabs { width: 100%; justify-content: center; }
            .primary-btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
            .secondary-filterbar { border-radius: 30px; padding: 1rem; flex-direction: column; align-items: stretch; }
            .filter-tabs { justify-content: center; }
            .view-options-modern { align-self: center; }
            .gallery-grid.list-view .media-card { flex-direction: column; max-height: none; }
            .gallery-grid.list-view .card-media { max-width: 100%; aspect-ratio: 4/3; }
            .heading-bottom { border-radius: 30px; padding: 1rem; }
        }
        @media (max-width: 480px) {
            .gallery-module { padding: 1rem 1rem 2rem; }
            .primary-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div id="site-header"></div>

<div class="gallery-module">
    <!-- heading (condensed) -->
    <div class="gallery-heading">
        <div class="heading-content">
            <div class="heading-top">
                <div class="heading-title-group">
                    <div class="heading-icon"><i class="fas fa-camera-retro"></i></div>
                    <div class="heading-text">
                        <h1>Visual Archive</h1>
                        <div class="subtitle"><span>Field documentation</span><span class="live-indicator"><i class="fas fa-circle"></i> LIVE</span></div>
                    </div>
                </div>
                <div class="stats-pills">
                    <div class="stat-pill"><i class="fas fa-camera"></i> 96 photos</div>
                    <div class="stat-pill"><i class="fas fa-video"></i> 48 videos</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PRIMARY TABS: ALL / PHOTOS / VIDEOS (ALL added) -->
    <div class="gallery-filterbar">
        <div class="primary-tabs">
            <button class="primary-btn active" id="tabAll"><i class="fas fa-th"></i> All</button>
            <button class="primary-btn" id="tabPhotos"><i class="fas fa-camera"></i> Photos</button>
            <button class="primary-btn" id="tabVideos"><i class="fas fa-video"></i> Videos</button>
        </div>

        <!-- secondary filters (always visible) -->
        <div class="secondary-filterbar">
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> All</button>
                <button class="filter-btn" data-filter="meeting"><i class="fas fa-users"></i> Meetings</button>
                <button class="filter-btn" data-filter="inspection"><i class="fas fa-clipboard-check"></i> Inspections</button>
                <button class="filter-btn" data-filter="office"><i class="fas fa-building"></i> Office</button>
                <button class="filter-btn" data-filter="field"><i class="fas fa-hard-hat"></i> Field ops</button>
                <button class="filter-btn" data-filter="training"><i class="fas fa-chalkboard-user"></i> Training</button>
            </div>
            <!-- modern view options -->
            <div class="view-options-modern">
                <button class="view-btn-modern active" data-view="masonry" title="Masonry view (dynamic heights)"><i class="fas fa-th"></i></button>
                <button class="view-btn-modern" data-view="grid" title="Grid view (equal cards)"><i class="fas fa-th-large"></i></button>
                <button class="view-btn-modern" data-view="list" title="List view (horizontal)"><i class="fas fa-list"></i></button>
            </div>
        </div>
    </div>

    <!-- GALLERY GRID -->
    <div class="gallery-grid masonry-view" id="galleryGrid">
        <!-- ========== 96 PHOTO ITEMS ========== (we generate with JS for brevity, but include static + dynamic) -->
        <!-- We'll dynamically generate 96 photos & 48 videos using JS, but also include a few static for structure. 
             For actual display, script will populate. -->
    </div>

    <div class="gallery-footer">
        <div class="stats-group"><div class="stat"><i class="fas fa-camera"></i> 96 photos</div><div class="stat"><i class="fas fa-video"></i> 48 videos</div></div>
        <div class="load-btn" id="loadMoreBtn"><i class="fas fa-plus"></i> Load more</div>
    </div>
</div>

<!-- Lightboxes -->
<div class="photo-lightbox" id="photoLightbox">
    <div class="lightbox-content">
        <button class="lightbox-close" id="closePhotoBtn">&times;</button>
        <img src="" alt="" id="lightboxImg">
    </div>
</div>
<div class="video-modal" id="videoModal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="modalVideoTitle">Video</h3><button class="modal-close" id="closeModalBtn">&times;</button></div>
        <div class="video-wrapper" id="videoWrapper"></div>
    </div>
</div>

<div id="site-footer"></div>
<script src="/assets/Scripts/gototop.js"></script>

<script>
(function() {
    // ----- generate 96 photos and 48 videos with categories -----
    const galleryGrid = document.getElementById('galleryGrid');
    const categories = ['meeting', 'inspection', 'office', 'field', 'training'];
    const photoUrls = [
        'https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg',
        'https://images.pexels.com/photos/2774556/pexels-photo-2774556.jpeg',
        'https://images.pexels.com/photos/257775/pexels-photo-257775.jpeg',
        'https://images.pexels.com/photos/5980766/pexels-photo-5980766.jpeg',
        'https://cdn.pixabay.com/photo/2013/10/14/10/37/froet-gas-195389_1280.jpg',
        'https://images.pexels.com/photos/1486785/pexels-photo-1486785.jpeg',
        'https://images.pexels.com/photos/380768/pexels-photo-380768.jpeg',
        'https://images.pexels.com/photos/2566581/pexels-photo-2566581.jpeg',
        'https://images.pexels.com/photos/1937687/pexels-photo-1937687.jpeg',
        'https://images.pexels.com/photos/2563197/pexels-photo-2563197.jpeg',
        'https://images.pexels.com/photos/236598/pexels-photo-236598.jpeg',
        'https://images.pexels.com/photos/7529036/pexels-photo-7529036.jpeg',
        'https://images.pexels.com/photos/7529020/pexels-photo-7529020.jpeg'
    ];
    const videoUrls = [
        { type: 'youtube', id: 'dQw4w9WgXcQ' },
        { type: 'mp4', url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
        { type: 'youtube', id: 'jNQXAC9IVRw' },
        { type: 'mp4', url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4' },
        { type: 'youtube', id: '0Bmhjf0rKe8' },
        { type: 'mp4', url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' },
        { type: 'youtube', id: 'ScMzIvxBSi4' },
        { type: 'mp4', url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4' },
        { type: 'mp4', url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4' }
    ];

    let htmlStr = '';

    // 96 photos
    for (let i = 0; i < 96; i++) {
        const cat = categories[i % categories.length];
        const imgUrl = photoUrls[i % photoUrls.length] + `?auto=compress&cs=tinysrgb&w=600&v=${i}`; // unique
        htmlStr += `<div class="media-card photo-item" data-category="${cat}">
            <div class="card-media"><img src="${imgUrl}" alt="photo"><div class="media-badge"><i class="fas fa-camera"></i> PHOTO</div></div>
            <div class="card-content">
                <div class="card-title">${cat} snapshot <span class="date-tag">2026</span></div>
                <div class="card-location"><i class="fas fa-map-pin"></i> Field location</div>
                <div class="card-desc">Operational photo #${i+1}</div>
                <div class="card-tags"><span class="tag">${cat}</span></div>
            </div>
        </div>`;
    }

    // 48 videos
    for (let i = 0; i < 48; i++) {
        const cat = categories[i % categories.length];
        const vid = videoUrls[i % videoUrls.length];
        let videoIdAttr = '', videoTypeAttr = '';
        if (vid.type === 'youtube') {
            videoTypeAttr = 'youtube';
            videoIdAttr = vid.id;
        } else {
            videoTypeAttr = 'mp4';
            videoIdAttr = vid.url;
        }
        const imgUrl = photoUrls[i % photoUrls.length] + `?auto=compress&cs=tinysrgb&w=600&v=v${i}`;
        htmlStr += `<div class="media-card video-item" data-category="${cat}" data-video-type="${videoTypeAttr}" data-video-id="${videoIdAttr}" data-video-title="Video ${i+1}">
            <div class="card-media"><img src="${imgUrl}" alt="video"><div class="video-play-overlay"><i class="fas fa-play"></i></div><div class="media-badge"><i class="fas fa-video"></i> ${vid.type === 'youtube' ? 'YT' : 'MP4'}</div></div>
            <div class="card-content">
                <div class="card-title">${cat} recording <span class="date-tag">2026</span></div>
                <div class="card-location"><i class="fas fa-map-pin"></i> Ops area</div>
                <div class="card-desc">Video documentation #${i+1}</div>
                <div class="card-tags"><span class="tag">${cat}</span></div>
            </div>
        </div>`;
    }

    galleryGrid.innerHTML = htmlStr;

    // ----- get references after generation -----
    const allCards = document.querySelectorAll('.media-card');
    const photoItems = document.querySelectorAll('.photo-item');
    const videoItems = document.querySelectorAll('.video-item');

    // primary tabs
    const tabAll = document.getElementById('tabAll');
    const tabPhotos = document.getElementById('tabPhotos');
    const tabVideos = document.getElementById('tabVideos');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const viewBtns = document.querySelectorAll('.view-btn-modern');
    const gallery = document.getElementById('galleryGrid');
    const loadMore = document.getElementById('loadMoreBtn');

    let activePrimary = 'all'; // 'all', 'photos', 'videos'
    let activeSecondaryFilter = 'all';

    // ---- primary tab switch ----
    function setPrimaryTab(type) {
        activePrimary = type;
        tabAll.classList.remove('active');
        tabPhotos.classList.remove('active');
        tabVideos.classList.remove('active');
        if (type === 'all') {
            tabAll.classList.add('active');
            photoItems.forEach(c => c.style.display = 'flex');
            videoItems.forEach(c => c.style.display = 'flex');
        } else if (type === 'photos') {
            tabPhotos.classList.add('active');
            photoItems.forEach(c => c.style.display = 'flex');
            videoItems.forEach(c => c.style.display = 'none');
        } else {
            tabVideos.classList.add('active');
            photoItems.forEach(c => c.style.display = 'none');
            videoItems.forEach(c => c.style.display = 'flex');
        }
        applySecondaryFilter();
    }

    tabAll.addEventListener('click', () => setPrimaryTab('all'));
    tabPhotos.addEventListener('click', () => setPrimaryTab('photos'));
    tabVideos.addEventListener('click', () => setPrimaryTab('videos'));

    // ---- secondary filter ----
    filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            activeSecondaryFilter = this.dataset.filter;
            applySecondaryFilter();
        });
    });

    function applySecondaryFilter() {
        let itemsToFilter = [];
        if (activePrimary === 'all') {
            itemsToFilter = allCards;
        } else if (activePrimary === 'photos') {
            itemsToFilter = photoItems;
        } else {
            itemsToFilter = videoItems;
        }
        itemsToFilter.forEach(card => {
            const cardCat = card.dataset.category;
            if (activeSecondaryFilter === 'all' || cardCat === activeSecondaryFilter) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }

    // ---- view toggle ----
    viewBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            viewBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const view = this.dataset.view;
            gallery.classList.remove('masonry-view', 'grid-view', 'list-view');
            gallery.classList.add(`${view}-view`);
        });
    });

    // ---- photo lightbox ----
    const photoLightbox = document.getElementById('photoLightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closePhotoBtn = document.getElementById('closePhotoBtn');
    photoItems.forEach(card => {
        card.addEventListener('click', function(e) {
            const img = this.querySelector('.card-media img');
            if (img) { lightboxImg.src = img.src; photoLightbox.classList.add('active'); }
        });
    });
    closePhotoBtn.addEventListener('click', () => photoLightbox.classList.remove('active'));
    photoLightbox.addEventListener('click', (e) => { if (e.target === photoLightbox) photoLightbox.classList.remove('active'); });

    // ---- video modal ----
    const videoModal = document.getElementById('videoModal');
    const modalTitle = document.getElementById('modalVideoTitle');
    const videoWrapper = document.getElementById('videoWrapper');
    const closeModalBtn = document.getElementById('closeModalBtn');
    videoItems.forEach(card => {
        card.addEventListener('click', function(e) {
            const videoType = this.dataset.videoType;
            const videoId = this.dataset.videoId;
            const title = this.dataset.videoTitle || this.querySelector('.card-title')?.innerText || 'Video';
            if (!videoId) return;
            let embedHtml = '';
            if (videoType === 'youtube') {
                embedHtml = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
            } else {
                embedHtml = `<video controls autoplay><source src="${videoId}" type="video/mp4"></video>`;
            }
            videoWrapper.innerHTML = embedHtml;
            modalTitle.innerText = title;
            videoModal.classList.add('active');
        });
    });
    closeModalBtn.addEventListener('click', () => { videoModal.classList.remove('active'); videoWrapper.innerHTML = ''; });
    videoModal.addEventListener('click', (e) => { if (e.target === videoModal) { videoModal.classList.remove('active'); videoWrapper.innerHTML = ''; } });

    // load more simulation
    loadMore.addEventListener('click', () => alert('📁 Archive extension - would load more items.'));

    // initial: all active, secondary all active
    setPrimaryTab('all');
    // ensure "All" filter is active (already)
})();
</script>
</body>
</html>
