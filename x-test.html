<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FPS Inspection Report · NFSA 2013 / TPDS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   /* ===== Main Container ===== */
./* ===== Main Container ===== */
.fuel-calculator {
  max-width: 650px;
  margin: 40px auto;
  padding: 25px;
  background: #ffffff;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  font-family: "Segoe UI", Roboto, sans-serif;
}

/* ===== Heading ===== */
.fuel-calculator h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #1f3c88;
  font-weight: 600;
}

/* ===== Form Group ===== */
.fuel-group {
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
}

/* ===== Labels ===== */
.fuel-group label {
  margin-bottom: 6px;
  font-weight: 500;
  color: #333;
}

/* ===== Inputs & Select ===== */
.fuel-group select,
.fuel-group input {
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
  transition: all 0.3s ease;
}

/* Focus Effect */
.fuel-group select:focus,
.fuel-group input:focus {
  border-color: #1f3c88;
  outline: none;
  box-shadow: 0 0 5px rgba(31,60,136,0.3);
}

/* ===== Button ===== */
.fuel-btn {
  width: 100%;
  padding: 12px;
  background: #1f3c88;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
}

.fuel-btn:hover {
  background: #16306b;
}

/* ===== Result Box ===== */
.fuel-result {
  margin-top: 20px;
  padding: 15px;
  background: #f4f7ff;
  border-left: 5px solid #1f3c88;
  border-radius: 6px;
  font-weight: 500;
  color: #1f3c88;
}

/* ===== Responsive Design ===== */
@media (max-width: 600px) {
  .fuel-calculator {
    margin: 20px;
    padding: 18px;
  }
}
  </style>
</head>
<body>

<div>
  <label>Commodity:</label>
  <select id="commodity">
    <option value="MS">Motor Spirit (MS)</option>
    <option value="HSD">High Speed Diesel (HSD)</option>
  </select>

  <label>Tank:</label>
  <select id="tank">
    <option value="tank1">Tank 1</option>
    <option value="tank2">Tank 2</option>
  </select>

  <label>Fuel Dip (mm):</label>
  <input type="number" id="dip">

  <label>Water Dip (mm):</label>
  <input type="number" id="waterDip" value="0">

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>
</div>

<script>
const dipCharts = {
  MS: {
    tank1: {100:1150,200:2320,300:3480,400:4650,500:5820,600:6990,700:8160,800:9330,900:10500,1000:11670},
    tank2: {100:1200,200:2400,300:3600,400:4800,500:6000,600:7200,700:8400,800:9600,900:10800,1000:12000}
  },
  HSD: {
    tank1: {100:1100,200:2200,300:3300,400:4400,500:5500,600:6600,700:7700,800:8800,900:9900,1000:11000},
    tank2: {100:1300,200:2600,300:3900,400:5200,500:6500,600:7800,700:9100,800:10400,900:11700,1000:13000}
  }
};

function interpolate(chart, dip) {
  const keys = Object.keys(chart).map(Number).sort((a,b)=>a-b);

  let lower = keys[0];
  let upper = keys[keys.length-1];

  for(let i=0;i<keys.length;i++){
    if(dip === keys[i]) return chart[dip];
    if(dip > keys[i]) lower = keys[i];
    if(dip < keys[i]) {
      upper = keys[i];
      break;
    }
  }

  let V1 = chart[lower];
  let V2 = chart[upper];

  return V1 + ((dip - lower) / (upper - lower)) * (V2 - V1);
}

function calculate(){
  let commodity = document.getElementById("commodity").value;
  let tank = document.getElementById("tank").value;
  let dip = parseFloat(document.getElementById("dip").value);
  let waterDip = parseFloat(document.getElementById("waterDip").value);

  let chart = dipCharts[commodity][tank];

  if(!chart){
    document.getElementById("result").innerText = "Chart not found.";
    return;
  }

  let fuelVolume = interpolate(chart, dip);
  let waterVolume = waterDip ? interpolate(chart, waterDip) : 0;

  let netStock = fuelVolume - waterVolume;

  document.getElementById("result").innerText =
    "Gross Volume: " + fuelVolume.toFixed(2) + " L | Water: " +
    waterVolume.toFixed(2) + " L | Net Stock: " +
    netStock.toFixed(2) + " L";
}
</script>
<!-- stub for gototop (doesn't interfere) -->
<script src="/assets/Scripts/gototop.js"></script>
</body>
</html>
