<!DOCTYPE html>
<html>
<head>
    <title>License Renewal Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #fff;
        }
        .report-container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid #ddd;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 18px;
            margin: 5px 0;
        }
        .header h2 {
            color: #666;
            font-size: 16px;
            margin: 5px 0;
        }
        .section {
            margin: 20px 0;
            border: 1px solid #ccc;
        }
        .section-title {
            background: #f0f0f0;
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
        }
        .section-content {
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table td, table th {
            border: 1px solid #ddd;
            padding: 8px;
            vertical-align: top;
        }
        .label {
            font-weight: bold;
            width: 30%;
        }
        .value {
            width: 70%;
        }
        .signature {
            margin-top: 50px;
            text-align: right;
        }
        .discrepancy-error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="report-container" id="report">
        <!-- Dynamic content will be inserted here -->
    </div>

    <script>
        // Your published Google Sheet CSV URL
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7ik39OFKwscZJiFMgl2CNzRltAxK2sG6fIn-WniMGJ2rvQX1mFnzoerLz0lZOAsUMGeyFtyp0II4o/pub?gid=0&single=true&output=csv';
        
        fetch(sheetURL)
            .then(response => response.text())
            .then(csvData => {
                const data = parseCSV(csvData);
                const formattedData = formatData(data);
                renderReport(formattedData);
            })
            .catch(error => console.error('Error loading data:', error));

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',');
            const data = {};
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                if (values.length >= 3) {
                    const section = values[0].replace(/"/g, '');
                    const key = values[1].replace(/"/g, '');
                    const value = values[2] ? values[2].replace(/"/g, '') : '';
                    data[`${section}.${key}`] = value;
                }
            }
            return data;
        }

        function formatData(rawData) {
            return {
                proprietor: {
                    name: rawData['particulars.Proprietor Name'] || 'Debaraj Meher (Proprietorship)',
                    address: rawData['particulars.Proprietor Address'] || 'At: Naikensira, Po/PS/Block: Deogaon, Pin: 767029',
                    email: rawData['particulars.Email'] || 'tejaswini.fuelstn@gmail.com',
                    mobile: rawData['particulars.Mobile'] || '8895965811',
                    aadhaar: rawData['particulars.Aadhaar'] || '205842503291',
                    pan: rawData['particulars.PAN'] || 'AOAPM5635D',
                    gst: rawData['particulars.GST'] || '21AOAPM5635D3ZF'
                },
                verification: {
                    officer: 'Sarat Kumar Rout, ACSO',
                    date: '21/02/2025',
                    time: '11.30 AM'
                },
                // Add more formatted sections...
            };
        }

        function renderReport(data) {
            const reportHTML = `
                <div class="header">
                    <h1>RECOMMENDATION FOR RENEWAL OF HSD /LUBRICANT LICENSE</h1>
                    <h2>Tejaswini Filling Station, Naikensira, Deogaon Block</h2>
                </div>

                <table>
                    <tr>
                        <td class="label">1. Name and designation of Verifying Officer:</td>
                        <td class="value">Sri ${data.verification.officer}</td>
                    </tr>
                    <tr>
                        <td class="label">2. Date and time of verification</td>
                        <td class="value">Dt. ${data.verification.date} At ${data.verification.time}</td>
                    </tr>
                    <tr>
                        <td class="label">3. Name and style of Petrol Pump</td>
                        <td class="value">Tejaswini Filling Station, Naikensira, Deogaon Block</td>
                    </tr>
                    <tr>
                        <td class="label">4. Name & address of the Proprietor</td>
                        <td class="value">${data.proprietor.name}<br>${data.proprietor.address}</td>
                    </tr>
                    <tr>
                        <td class="label">5. EMail ID</td>
                        <td class="value">${data.proprietor.email}</td>
                    </tr>
                    <tr>
                        <td class="label">6. Mobile Number</td>
                        <td class="value">${data.proprietor.mobile}</td>
                    </tr>
                    <!-- Continue with all other fields -->
                </table>
            `;
            
            document.getElementById('report').innerHTML = reportHTML;
        }
    </script>
</body>
</html>
