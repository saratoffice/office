<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>High Court · Reports (seamless grid)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #0b0e14;
      --ink-light: #1e2537;
      --vellum: #f2ecdf;
      --parchment: #e8ddcc;
      --gold: #b4945c;
      --gold-light: #e1cc9e;
      --rubric: #9e2d1c;
      --rubric-dark: #712218;
      --lead: #cad2db;
      --lead-muted: #a1aeba;
      --border-subtle: rgba(180, 148, 92, 0.25);
      --text-main: #ece7dd;
    }

    body {
      background-color: var(--ink);
      background-image: 
        linear-gradient(165deg, rgba(24, 30, 45, 0.9) 0%, rgba(10, 14, 22, 0.98) 100%),
        repeating-linear-gradient(45deg, rgba(180, 148, 92, 0.02) 0px, rgba(180, 148, 92, 0.02) 20px, rgba(0, 0, 0, 0.1) 20px, rgba(0, 0, 0, 0.1) 40px);
      font-family: 'IM Fell English', serif;
      color: var(--text-main);
      line-height: 1.5;
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    .courier {
      font-family: 'Courier Prime', monospace;
      letter-spacing: 0.03em;
    }

    /* main layout */
    .wrapper {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }

    /* ----- header (refined) ----- */
    .header-reports {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 1.8rem;
      margin-bottom: 1.8rem;
      position: relative;
    }

    .header-reports::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 120px;
      height: 2px;
      background: var(--gold);
    }

    .title-block h1 {
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--vellum);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }

    .title-block h1 span {
      color: var(--gold);
      font-style: italic;
      font-weight: 700;
      display: inline-block;
      margin-left: 0.2rem;
    }

    .title-meta {
      font-family: 'Courier Prime', monospace;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: var(--lead-muted);
      margin-top: 0.5rem;
      letter-spacing: 4px;
      display: flex;
      gap: 1.5rem;
    }

    .title-meta i {
      color: var(--gold);
      margin-right: 0.3rem;
    }

    .stamp-archive {
      border: 2px solid var(--rubric);
      color: var(--rubric);
      padding: 0.6rem 1.2rem;
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 3px;
      background: rgba(30, 37, 55, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(180,148,92,0.2);
      text-transform: uppercase;
      transform: rotate(-1deg);
    }

    /* filter bar (improved) */
    .filter-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.8rem;
      margin-bottom: 2.5rem;
      padding: 1rem 0 0.8rem;
      border-bottom: 1px solid var(--border-subtle);
      font-family: 'Courier Prime', monospace;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
    }

    .filter-item {
      color: var(--lead-muted);
      cursor: default;
      transition: color 0.2s;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
    }

    .filter-item.active {
      color: var(--gold-light);
      border-bottom-color: var(--gold);
      font-weight: 700;
    }

    .filter-item i {
      margin-right: 0.4rem;
      font-size: 0.6rem;
      color: var(--gold);
    }

    .filter-item:not(.filter-label):hover {
      color: var(--vellum);
      border-bottom-color: var(--rubric);
      cursor: pointer;
    }

    .filter-label {
      color: var(--lead);
      letter-spacing: 3px;
      font-weight: 700;
      opacity: 0.8;
    }

    /* ──────────── SEAMLESS GRID – NO GAPS ──────────── */
    .judgment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;                     /* ← absolutely no gaps */
      background: transparent;     /* let cards define borders */
      border: 1px solid var(--border-subtle);
      margin-bottom: 2.5rem;
    }

    .grid-card {
      background: var(--ink-light);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-subtle);
      margin: 0;                  /* no margins */
      outline: none;
      z-index: 1;
    }

    /* featured first card (spans two rows) – still gapless */
    .grid-card.featured {
      grid-row: span 2;
      min-height: 680px;          /* 2×340 = 680px, keeps alignment */
    }

    .grid-card.wide {
      grid-column: span 2;
    }

    /* hover effect lifts card above neighbours, but does not create gap */
    .grid-card:hover {
      background: #1f2842;
      border-color: var(--gold);
      z-index: 10;
      transform: scale(1.00);      /* no scaling that would break alignment */
      box-shadow: 0 0 0 1px var(--gold); /* inner glow instead of gap */
    }

    .card-content {
      padding: 2rem 1.8rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    /* ornamental numerals – consistent positioning */
    .card-numeral {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      font-weight: 900;
      line-height: 0.7;
      position: absolute;
      bottom: 0.1rem;
      right: 0.3rem;
      color: rgba(180, 148, 92, 0.08);
      font-style: italic;
      pointer-events: none;
      z-index: 0;
    }

    .featured .card-numeral {
      font-size: 12rem;
      bottom: -0.2rem;
      right: 0.5rem;
    }

    .court-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--gold);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .court-badge::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--gold);
      display: inline-block;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.8rem;
      color: var(--vellum);
      font-family: 'Playfair Display', serif;
    }

    .featured .card-title {
      font-size: 1.8rem;
    }

    .ref-line {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--rubric);
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .ref-line i {
      font-size: 0.5rem;
      color: var(--gold);
    }

    .desc-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--lead);
      margin-bottom: 1.5rem;
      flex: 1;
    }

    .featured .desc-text {
      font-size: 1rem;
    }

    .card-footer-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(180, 148, 92, 0.15);
      padding-top: 1rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      color: var(--lead-muted);
      text-transform: uppercase;
      margin-top: auto;
    }

    .footer-seal {
      color: var(--gold);
      font-size: 0.5rem;
    }

    /* Hover overlay – refined, absolutely positioned inside card */
    .hover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(11,14,20,0.98) 0%, rgba(28,35,58,0.98) 100%);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.25s ease-in-out;
      border: 1px solid var(--gold);
      z-index: 20;
      pointer-events: none;
      text-align: center;
    }

    .grid-card:hover .hover-overlay {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-icon {
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.7;
    }

    .overlay-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--vellum);
      max-width: 280px;
    }

    .overlay-ref {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 0.3rem 1rem;
      background: rgba(0,0,0,0.2);
    }

    .overlay-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .btn-overlay {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      border: 1px solid;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border-color: rgba(180,148,92,0.5);
      color: var(--gold-light);
    }

    .btn-overlay.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }

    .btn-overlay.primary:hover {
      background: #d0b174;
    }

    .btn-overlay.secondary:hover {
      background: rgba(180,148,92,0.2);
      border-color: var(--gold);
    }

    /* footer */
    .reports-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0 1.5rem;
      border-top: 1px solid var(--border-subtle);
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: var(--lead-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .footer-logo {
      color: var(--gold);
    }

    .footer-logo i {
      margin-right: 0.5rem;
    }

    /* responsive – maintain gapless */
    @media (max-width: 1024px) {
      .judgment-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid-card.featured {
        grid-row: span 1;
        min-height: 340px;
      }
      .grid-card.wide {
        grid-column: span 2;
      }
      .wrapper {
        padding: 1.5rem 1.5rem 0;
      }
    }

    @media (max-width: 700px) {
      .judgment-grid {
        grid-template-columns: 1fr;
      }
      .grid-card.wide {
        grid-column: span 1;
      }
      .grid-card.featured {
        min-height: 340px;
      }
      .header-reports {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <!-- HEADER -->
  <div class="header-reports">
    <div class="title-block">
      <h1>HIGH COURT <span>· REPORTS</span></h1>
      <div class="title-meta">
        <span><i class="fas fa-gavel"></i> 2024 · ALL INDIA SERIES</span>
        <span><i class="fas fa-book-open"></i> VOLUME CXXIV</span>
      </div>
    </div>
    <div class="stamp-archive">
      <i class="fas fa-certificate" style="margin-right: 8px;"></i>ARCHIVE · VERIFIED
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-panel">
    <span class="filter-label"><i class="fas fa-filter"></i> COURT</span>
    <span class="filter-item active">ALL</span>
    <span class="filter-item">ORISSA</span>
    <span class="filter-item">CALCUTTA</span>
    <span class="filter-item">BOMBAY</span>
    <span class="filter-item">DELHI</span>
    <span class="filter-item">P&H</span>
    <span class="filter-item">ALLAHABAD</span>
    <span class="filter-label" style="margin-left: auto;"><i class="fas fa-tag"></i> SUBJECT</span>
    <span class="filter-item">ART.22(5)</span>
    <span class="filter-item">EC ACT</span>
    <span class="filter-item">PDS</span>
    <span class="filter-item">VEHICLE RELEASE</span>
  </div>

  <!-- SEAMLESS GRID (no gaps) -->
  <div class="judgment-grid" id="judgmentGrid"></div>

  <!-- FOOTER -->
  <div class="reports-footer">
    <span class="footer-logo"><i class="fas fa-scale-balanced"></i> LEX REPORTA · HIGH COURT SERIES</span>
    <span>12 JUDGEMENTS · HILARY TERM 2024</span>
    <span><i class="fas fa-chevron-circle-right" style="color: var(--gold);"></i> OPEN ACCESS</span>
  </div>
</div>

<script>
(function() {
  const judgments = [
    {
      title: "Preventive Detention & Art. 22(5) – Right to Representation",
      description: "Landmark full text examining delay in considering representation, non‑supply of documents, and constitutional safeguards. Detailed analysis of Art. 22(5).",
      court: "Orissa HC",
      caseRef: "2024 · CRLMC 245/2024",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
    },
    {
      title: "Rabi Kumar Nanda v. State: Vehicle Seizure under EC Act",
      description: "Interim release of vehicle seized for alleged PDS violation. Conditions, bank guarantee and magisterial powers.",
      court: "Orissa HC",
      caseRef: "2023 · W.P.(C) 892/2023",
      btn1: { text: "Full Text", link: "#" }, btn2: { text: "Seizure Notes", link: "#" }
    },
    {
      title: "Storage Agents vs. Transport Contractors – PDS Reforms",
      description: "Landmark distinction: liability for damaged foodgrains, allocation between agent and transporter.",
      court: "Orissa HC",
      caseRef: "2024 · ARBA 78/2024",
      btn1: { text: "Judgment", link: "#" }, btn2: { text: "Analysis", link: "#" }
    },
    {
      title: "Sk. Salim v. State: Non‑supply of Documents – Detention void",
      description: "Art.22(5) – non‑supply of relied upon documents renders detention unconstitutional. Detailed examination.",
      court: "Calcutta HC",
      caseRef: "2022 · WP 1145/2022",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Case Analysis", link: "#" }
    },
    {
      title: "Jagmal Singh v. State: Release of Vehicle – EC Act",
      description: "Principles governing interim release of vehicle under Essential Commodities Act. Security bond & valuation.",
      court: "Punjab & Haryana HC",
      caseRef: "2023 · CRM-M 2398/2023",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Notes", link: "#" }
    },
    {
      title: "Transport Contractor Liability – Foodgrain Shortage (PDS)",
      description: "Transport contractor cannot be treated as storage agent for recovery; vital distinction for liability.",
      court: "Allahabad HC",
      caseRef: "2024 · Writ C 4081/2024",
      btn1: { text: "Judgment", link: "#" }, btn2: { text: "Analysis", link: "#" }
    },
    {
      title: "Grounds in Detainee's Language – Art.22(5)",
      description: "Detention set aside for non‑translation into language understood by detenu; linguistic access is a right.",
      court: "Delhi HC",
      caseRef: "2023 · CRL.A. 789/2023",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
    },
    {
      title: "Shivlal v. State: Supurtnama – EC Act vehicle release",
      description: "Magistrate's power to release seized vehicle; procedure for interim custody and supurtnama.",
      court: "Madhya Pradesh HC",
      caseRef: "2022 · MCRC 56782/2022",
      btn1: { text: "Judgment", link: "#" }, btn2: { text: "Custody order", link: "#" }
    },
    {
      title: "Storage Agent not liable for Transit Loss – PDS",
      description: "Agent responsible only for storage, not for contractor's negligence in transit. Important clarification.",
      court: "Gujarat HC",
      caseRef: "2023 · SCA 10234/2023",
      btn1: { text: "Full Text", link: "#" }, btn2: { text: "Storage Duty", link: "#" }
    },
    {
      title: "Delay in Representation – Art.22(5) Violation",
      description: "Unreasonable delay by advisory board renders detention invalid; speedy consideration mandated.",
      court: "Bombay HC",
      caseRef: "2024 · CRLWP 2047/2024",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
    },
    {
      title: "Mahendra Kumar v. State: Bank Guarantee instead of Custody",
      description: "Conditional release of vehicle under EC Act; alternatives to physical custody.",
      court: "Rajasthan HC",
      caseRef: "2023 · SBWP 6543/2023",
      btn1: { text: "Judgment", link: "#" }, btn2: { text: "Bank Guarantee", link: "#" }
    },
    {
      title: "FCI v. Storage Agent: Demurrage & Handling – PDS",
      description: "Storage agent cannot be penalised for transport contractor's delay; demurrage charges clarified.",
      court: "Karnataka HC",
      caseRef: "2024 · W.P. 11077/2024",
      btn1: { text: "Read", link: "#" }, btn2: { text: "Case Analysis", link: "#" }
    }
  ];

  const grid = document.getElementById('judgmentGrid');
  if (!grid) return;

  judgments.forEach((j, idx) => {
    const card = document.createElement('div');
    card.className = 'grid-card';
    // first card featured (taller)
    if (idx === 0) card.classList.add('featured');
    // cards at index 4 and 9 get wide class (spans two columns)
    if (idx === 4 || idx === 9) card.classList.add('wide');

    const numeral = (idx + 1).toString().padStart(2,'0');

    card.innerHTML = `
      <div class="card-content">
        <div class="card-numeral">${numeral}</div>
        <div class="court-badge">${j.court}</div>
        <h2 class="card-title">${j.title}</h2>
        <div class="ref-line"><i class="fas fa-gavel"></i> ${j.caseRef}</div>
        <p class="desc-text">${j.description}</p>
        <div class="card-footer-meta">
          <span><i class="fas fa-balance-scale-right"></i> High Court of India</span>
          <span class="footer-seal"><i class="fas fa-circle"></i> Reported</span>
        </div>
      </div>
      <!-- hover overlay -->
      <div class="hover-overlay">
        <div class="overlay-icon"><i class="fas fa-gavel"></i></div>
        <div class="overlay-quote">${j.title}</div>
        <div class="overlay-ref">${j.court} · ${j.caseRef}</div>
        <div class="overlay-buttons">
          <a href="${j.btn1.link}" class="btn-overlay primary"><i class="fas fa-file-lines"></i> ${j.btn1.text}</a>
          <a href="${j.btn2.link}" class="btn-overlay secondary"><i class="fas fa-scale-balanced"></i> ${j.btn2.text}</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // filter simulation (active class toggle)
  document.querySelectorAll('.filter-item:not(.filter-label)').forEach(item => {
    item.addEventListener('click', function(e) {
      document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
      this.classList.add('active');
    });
  });
})();
</script>

<!-- all links are placeholders (#) for demonstration -->
</body>
</html>
