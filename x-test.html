  .modal-overlay {

    background: rgba(26, 18, 8, 0.75);

    bottom: 30px;

    color: var(--parchment);
    font-family: 'Fira Mono', monospace;

    letter-spacing: 0.06em;

    .judgements-grid { grid-template-columns: 1fr; padding: 0 16px 60px; }
    .modal-body, .modal-footer { padding: 20px; }
    .modal-header { padding: 18px 50px 16px 18px; }
    .filter-tabs { gap: 5px; }

  }
</style>

/* ──── Card builder ──── */
function buildCard(j) {
  const tags = j.tags.map(t => '<span class="card-tag">' + t + '</span>').join('');
  return '<div class="j-card" data-id="' + j.id + '" data-category="' + j.category + '">'
    + '<div class="card-band"><span class="card-court">' + j.court + '</span><span class="card-year">' + j.year + '</span></div>'
    + '<div class="card-body">'
    + '<p class="card-case-no">' + j.caseNo + '</p>'
    + '<h3 class="card-title">' + j.title + '</h3>'
    + '<div class="card-tags">' + tags + '</div>'
    + '<p class="card-excerpt">' + j.excerpt + '</p>'
    + '</div>'
    + '<div class="card-footer">'
    + '<button class="btn btn-read-more" onclick="openModal(' + j.id + ')">'
    + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="0" y="4.5" width="8" height="1" fill="currentColor"/><path d="M5.5 1.5L9 5L5.5 8.5" stroke="currentColor" stroke-width="1" fill="none"/></svg>Read More</button>'
    + '<div class="share-wrapper">'
    + '<button class="btn btn-share" onclick="toggleShare(event,' + j.id + ',\'card\')">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="9" cy="2" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="2" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="9" cy="9" r="1.5" stroke="currentColor" stroke-width="1"/><line x1="3.3" y1="4.7" x2="7.8" y2="2.8" stroke="currentColor" stroke-width="1"/><line x1="3.3" y1="6.3" x2="7.8" y2="8.2" stroke="currentColor" stroke-width="1"/></svg>Share</button>'
    + '<div class="share-dropdown" id="share-card-' + j.id + '">' + shareOptionsHTML(j, 'card') + '</div>'
    + '</div></div></div>';
}

function renderCards() {
  document.getElementById('judgementsGrid').innerHTML = judgements.map(buildCard).join('');
}

/* ──── Filter ──── */
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-tab')) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    const filter = e.target.dataset.filter;
    let visible = 0;
    document.querySelectorAll('.j-card').forEach(function(card) {
      const match = filter === 'all' || card.dataset.category === filter;
      card.dataset.hidden = match ? 'false' : 'true';
      if (match) visible++;
    });
    document.getElementById('resultsCount').textContent = 'Showing ' + visible + ' judgement' + (visible !== 1 ? 's' : '');
  }
});

/* ──── Modal ──── */
function openModal(id) {
  const j = judgements.find(function(x) { return x.id === id; });
  if (!j) return;
  document.getElementById('mCourt').textContent = j.court;
  document.getElementById('mYear').textContent = j.year;
  document.getElementById('mTitle').textContent = j.title;
  document.getElementById('mCaseNo').textContent = j.caseNo;

  const tags = j.tags.map(function(t) { return '<span class="modal-tag">' + t + '</span>'; }).join('');
  document.getElementById('mBody').innerHTML =
    '<p class="modal-section-title">Facts of the Case</p><p class="modal-text">' + j.facts + '</p>'
    + '<p class="modal-section-title">Issue Before the Court</p><p class="modal-text">' + j.issue + '</p>'
    + '<p class="modal-section-title">Holding &amp; Ruling</p><div class="modal-ruling">' + j.ruling + '</div>'
    + '<p class="modal-section-title">Significance</p><p class="modal-text">' + j.significance + '</p>'
    + '<p class="modal-section-title">Key Points of Law</p><div class="modal-tags">' + tags + '</div>';

  const postUrl = 'https://saratoffice.in/judgements/' + j.postSlug + '/';
  document.getElementById('mFooter').innerHTML =
    '<a class="btn btn-full-judgment" href="' + postUrl + '" target="_blank" rel="noopener">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 10L10 1M10 1H4M10 1V7" stroke="currentColor" stroke-width="1.2"/></svg>Read Full Judgment</a>'
    + '<div class="share-wrapper">'
    + '<button class="btn btn-modal-share" onclick="toggleShare(event,' + j.id + ',\'modal\')">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="9" cy="2" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="2" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="9" cy="9" r="1.5" stroke="currentColor" stroke-width="1"/><line x1="3.3" y1="4.7" x2="7.8" y2="2.8" stroke="currentColor" stroke-width="1"/><line x1="3.3" y1="6.3" x2="7.8" y2="8.2" stroke="currentColor" stroke-width="1"/></svg>Share</button>'
    + '<div class="share-dropdown" id="share-modal-' + j.id + '">' + shareOptionsHTML(j, 'modal') + '</div>'
    + '</div>';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  closeAllDropdowns();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

/* ──── Share ──── */
function toggleShare(e, id, ctx) {
  e.stopPropagation();
  const ddId = 'share-' + ctx + '-' + id;
  const dd = document.getElementById(ddId);
  const wasOpen = dd && dd.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen && dd) dd.classList.add('open');
}

function closeAllDropdowns() {
  document.querySelectorAll('.share-dropdown').forEach(function(d) { d.classList.remove('open'); });
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.share-wrapper')) closeAllDropdowns();
});

function shareWA(text, url) { window.open('https://wa.me/?text=' + text + '%20' + url, '_blank'); closeAllDropdowns(); }
function shareTW(text, url) { window.open('https://twitter.com/intent/tweet?text=' + text + '&url=' + url, '_blank'); closeAllDropdowns(); }
function copyLink(url) {
  navigator.clipboard.writeText(url).then(function() { showToast('Link copied to clipboard'); }).catch(function() { showToast('Copy failed — please copy manually'); });
  closeAllDropdowns();
}

/* ──── Toast ──── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

renderCards();
</script>
</body>
</html>
