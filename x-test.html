<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSD Data - Google Sheets View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 10px;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header {
            background: #4CAF50; color: white; padding: 10px 15px;
            border-radius: 4px 4px 0 0; display: flex; justify-content: space-between;
        }
        .controls {
            background: #fff; padding: 10px 15px; display: flex; gap: 10px;
            flex-wrap: wrap; align-items: center; border-bottom: 1px solid #ddd;
        }
        .search-box {
            flex: 1; min-width: 200px; padding: 8px 12px;
            border: 1px solid #ddd; border-radius: 4px; font-size: 14px;
        }
        .btn {
            padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 14px; cursor: pointer; background: #f8f8f8;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: #4CAF50; color: white; border-color: #4CAF50; }
        .btn-primary:hover { background: #45a049; }
        .stats {
            background: #fff; padding: 8px 15px; font-size: 13px;
            color: #666; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between;
        }
        .gsheet-container {
            background: white; overflow: visible;
            border: 1px solid #ddd; min-height: 200px;
        }
        table {
            width: 100%; border-collapse: collapse;
            table-layout: auto; font-size: 13px;
        }
        th {
            background: #f8f9fa; color: #333; font-weight: 600;
            padding: 10px; text-align: left; border-bottom: 2px solid #ddd;
            border-right: 1px solid #ddd; position: sticky; top: 0;
        }
        td {
            padding: 8px 10px; border-bottom: 1px solid #ddd;
            border-right: 1px solid #eee; color: #333;
        }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f0f9ff; }
        
        /* Debug panel */
        .debug-panel {
            background: #1e1e1e; color: #00ff00; padding: 15px;
            font-family: monospace; font-size: 12px; margin-top: 10px;
            border-radius: 4px; max-height: 200px; overflow: auto;
        }
        .error-box {
            background: #ffebee; color: #c62828; padding: 20px;
            border: 1px solid #ffcdd2; border-radius: 4px; margin: 10px 0;
        }
        .loading {
            text-align: center; padding: 40px; color: #666;
        }
        .footer {
            text-align: center; margin-top: 10px; color: #666;
            font-size: 11px; padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 hsd_data - Google Sheets View</h1>
            <div>
                <span id="connectionStatus" style="font-size: 12px; margin-right: 10px;">⚪ Checking...</span>
                <button class="btn" style="background: rgba(255,255,255,0.2);" onclick="window.print()">🖨️</button>
            </div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" 
                   placeholder="🔍 Search in sheet..." disabled>
            <button class="btn btn-primary" onclick="loadData()" id="refreshBtn" disabled>
                🔄 Refresh
            </button>
            <button class="btn" onclick="exportToCSV()" id="exportBtn" disabled>
                📥 Download
            </button>
            <button class="btn" onclick="testConnection()" id="testBtn">
                🔌 Test Connection
            </button>
        </div>

        <div class="stats">
            <span id="statsInfo">Initializing...</span>
            <span id="lastUpdate"></span>
        </div>

        <div class="gsheet-container" id="gsheetContainer">
            <div id="errorDisplay"></div>
            <table id="data-table" style="display: none;">
                <thead id="table-header"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel" id="debugPanel">
            [Debug Console] Ready. Click "Test Connection" to start...
        </div>

        <div class="footer">
            Showing full sheet - no scroll | Data from hsd_data
        </div>
    </div>

    <script>
        // IMPORTANT: Replace with your NEW deployment URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbxp6oV50zBNNc97TrUC1-NtU66UhahQ06CqmT_Z4E__8P0Be-THOkUgOSrYl-4nqJQ1/exec';
        
        let allData = [];
        let headers = [];
        
        function log(message) {
            const panel = document.getElementById('debugPanel');
            panel.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${message}`;
            panel.scrollTop = panel.scrollHeight;
            console.log(message);
        }

        function updateConnectionStatus(status, color) {
            document.getElementById('connectionStatus').innerHTML = status;
            document.getElementById('connectionStatus').style.color = color;
        }

        async function testConnection() {
            log('🧪 Testing connection to API...');
            updateConnectionStatus('⏳ Testing...', 'orange');
            
            try {
                // Test 1: Can we reach the URL?
                log('📍 Attempting to fetch: ' + API_URL);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                
                const response = await fetch(API_URL, {
                    method: 'GET',
                    mode: 'cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                log('✅ Response received! Status: ' + response.status);
                updateConnectionStatus('✅ Connected', '#4CAF50');
                
                // Test 2: Can we parse the response?
                const text = await response.text();
                log('📦 Response length: ' + text.length + ' characters');
                log('📄 First 100 chars: ' + text.substring(0, 100));
                
                try {
                    const data = JSON.parse(text);
                    log('✅ JSON parsed successfully');
                    
                    if (data.error) {
                        log('❌ API returned error: ' + data.message);
                        showError('API Error: ' + data.message);
                    } else {
                        log('✅ API is working! Ready to load data.');
                        enableControls();
                        loadData();
                    }
                    
                } catch (e) {
                    log('❌ Failed to parse JSON: ' + e.message);
                    showError('Invalid JSON response. Check API deployment.');
                }
                
            } catch (error) {
                log('❌ Connection failed: ' + error.message);
                updateConnectionStatus('❌ Failed', '#f44336');
                
                if (error.name === 'AbortError') {
                    showError('Connection timeout - API not responding');
                } else {
                    showError('Failed to connect: ' + error.message);
                }
            }
        }

        function enableControls() {
            document.getElementById('searchInput').disabled = false;
            document.getElementById('refreshBtn').disabled = false;
            document.getElementById('exportBtn').disabled = false;
        }

        function showError(message) {
            document.getElementById('errorDisplay').innerHTML = `
                <div class="error-box">
                    <strong>❌ ${message}</strong><br><br>
                    <button class="btn" onclick="testConnection()">Try Test Connection Again</button>
                    <button class="btn" onclick="window.open('${API_URL}')">Open API in New Tab</button>
                </div>
            `;
            document.getElementById('data-table').style.display = 'none';
        }

        async function loadData() {
            log('📊 Loading data from API...');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                log('✅ Data loaded successfully');
                
                if (result.error) {
                    throw new Error(result.message || result.error);
                }
                
                // Handle response format
                let data = result.data || result;
                
                if (!Array.isArray(data)) {
                    throw new Error('Data is not an array');
                }
                
                allData = data;
                
                if (data.length > 0) {
                    headers = Object.keys(data[0]);
                    log(`📋 Found ${headers.length} columns, ${data.length} rows`);
                    document.getElementById('statsInfo').innerHTML = 
                        `📊 hsd_data: ${data.length} rows × ${headers.length} columns`;
                    
                    document.getElementById('errorDisplay').innerHTML = '';
                    document.getElementById('data-table').style.display = 'table';
                    generateSheetTable(data);
                } else {
                    log('⚠️ No data in sheet');
                    document.getElementById('statsInfo').innerHTML = '📊 No data found';
                }
                
                document.getElementById('lastUpdate').innerHTML = 
                    `Updated: ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                log('❌ Load failed: ' + error.message);
                showError(error.message);
            }
        }

        function generateSheetTable(data) {
            const tableHeader = document.getElementById('table-header');
            const tableBody = document.getElementById('table-body');
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="10" style="padding: 30px; text-align: center;">No data</td></tr>';
                return;
            }
            
            // Headers
            let headerHtml = '<tr>';
            headers.forEach(header => {
                const displayHeader = header.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                headerHtml += `<th>${displayHeader}</th>`;
            });
            headerHtml += '</tr>';
            tableHeader.innerHTML = headerHtml;
            
            // Body
            let bodyHtml = '';
            data.forEach(row => {
                bodyHtml += '<tr>';
                headers.forEach(header => {
                    let value = row[header] !== undefined && row[header] !== null ? row[header] : '';
                    bodyHtml += `<td>${value}</td>`;
                });
                bodyHtml += '</tr>';
            });
            
            tableBody.innerHTML = bodyHtml;
        }

        function exportToCSV() {
            if (allData.length === 0) {
                alert('No data to export');
                return;
            }
            
            let csvContent = headers.join(',') + '\n';
            
            allData.forEach(row => {
                const rowData = headers.map(header => {
                    let value = row[header] || '';
                    value = String(value).replace(/"/g, '""');
                    return `"${value}"`;
                });
                csvContent += rowData.join(',') + '\n';
            });
            
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `hsd_data_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (searchTerm.length < 2 || allData.length === 0) {
                generateSheetTable(allData);
                return;
            }
            
            const filteredData = allData.filter(row => {
                return headers.some(header => {
                    const value = String(row[header] || '').toLowerCase();
                    return value.includes(searchTerm);
                });
            });
            
            generateSheetTable(filteredData);
            document.getElementById('statsInfo').innerHTML = 
                `🔍 Found ${filteredData.length} matches (from ${allData.length} total)`;
        }

        // Auto-run test on page load
        document.addEventListener('DOMContentLoaded', () => {
            log('🔌 Page loaded, testing connection...');
            testConnection();
        });
    </script>
</body>
</html>
