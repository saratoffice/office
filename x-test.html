<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Acts, Rules, Orders | Sarat Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Papaparse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- DataTables & jQuery -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  
  <!-- Common CSS (menu, footer, global styles) -->
  <link rel="stylesheet" href="style.css">
  <!-- site components for header/footer etc. -->
  <script src="assets/Scripts/site-components.js" defer></script>
  
  <style>
    /* ================================
       GUARD FILE – HERO SECTION
       ================================ */
    .guard-hero {
      background: linear-gradient(
          135deg,
          rgba(65, 88, 208, 0.9) 0%,
          rgba(200, 80, 192, 0.9) 46%,
          rgba(255, 204, 112, 0.9) 100%
        );
      padding: 40px 20px;
      text-align: center;
      color: #ffffff;
      overflow: hidden;
    }

    .guard-hero-inner {
      max-width: 1100px;
      margin: auto;
    }

    .guard-title {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #fff176;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .guard-subtitle {
      font-size: 26px;
      color: #9adfff;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .animate-on-scroll {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .guard-title { font-size: 38px; }
      .guard-subtitle { font-size: 20px; }
      .guard-btn { font-size: 16px; padding: 12px 26px; }
    }

    /* ----- GLOBAL RESET ----- */
    body {
      margin: 0;
      background: #f5f9ff;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* ----- NAMESPACED WRAPPER ----- */
    .sarat-docs {
      display: block;
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px 80px;
      box-sizing: border-box;
    }

    /* ---- HORIZONTAL TABS ---- */
    .sarat-docs .tab-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: transparent;
      padding: 25px 0;
      margin: 20px 0 40px 0;
      border-bottom: none;
    }

    .sarat-docs .tab-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 36px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: #1e3a5f;
      background: #ffffff;
      border: 1px solid #c0c0c0;
      border-bottom: none;
      border-radius: 0;
      box-shadow: 
        0 8px 0 #a0a0a0,
        0 10px 15px rgba(0,0,0,0.2),
        inset 0 -2px 0 rgba(0,0,0,0.05);
      transition: all 0.15s ease;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      min-width: 160px;
    }

    .sarat-docs .tab-item:hover {
      transform: translateY(-4px);
      box-shadow: 
        0 10px 0 #7a7a7a,
        0 15px 25px rgba(0,0,0,0.25),
        inset 0 -2px 0 rgba(0,0,0,0.05);
      background: #f0f7ff;
      color: #003366;
    }

    .sarat-docs .tab-item.active {
      background: #0066b3;
      color: white !important;
      box-shadow: 
        0 8px 0 #00407a,
        0 12px 20px rgba(0,102,179,0.35),
        inset 0 -2px 0 rgba(0,0,0,0.15);
      border-color: #005095;
      border-bottom: none;
      transform: translateY(0);
    }

    .sarat-docs .tab-item.active:hover {
      background: #005095;
      box-shadow: 
        0 10px 0 #00355c,
        0 18px 28px rgba(0,80,150,0.4);
      transform: translateY(-3px);
      color: white;
    }

    .sarat-docs .tab-divider { display: none !important; }

    /* ----- CSV TABLE STYLES ----- */
    .sarat-docs .csv-tab-container {
      overflow-x: auto;
      padding: 20px 0 40px 0;
      background: transparent;
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .sarat-docs .csv-table {
      width: 80%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 16px;
      min-width: 600px;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
      box-shadow:
        0 0 0 4px #e8f0fe,
        0 8px 20px rgba(0, 80, 150, 0.2),
        inset 0 0 6px rgba(0, 120, 210, 0.1);
      margin: 0 auto;
    }

    .sarat-docs .csv-table thead {
      background: linear-gradient(135deg, #0a1e3c, #13294b);
    }

    .sarat-docs .csv-table thead th {
      color: #fff !important;
      font-weight: 700;
      text-align: center;
      padding: 20px 18px;
      letter-spacing: 0.8px;
      font-size: 16px;
      text-transform: uppercase;
    }

    .sarat-docs .csv-table td {
      padding: 18px 20px;
      border-bottom: 1px solid #d4e3f0;
      vertical-align: middle;
      background-color: white;
      font-size: 15px;
    }

    .sarat-docs .csv-table td:nth-child(1) {
      text-align: center;
      font-weight: 600;
      color: #0a2e4a;
      width: 80px;
    }

    .sarat-docs .csv-table td:nth-child(2) {
      text-align: left;
      font-weight: 500;
      color: #1e3a5f;
    }

    .sarat-docs .csv-table td:nth-child(3),
    .sarat-docs .csv-table td:nth-child(4) {
      text-align: center;
      width: 140px;
    }

    .sarat-docs .csv-table tbody tr:hover {
      background-color: #f0f9ff;
      transition: background-color 0.15s;
    }

    .sarat-docs .download-btn,
    .sarat-docs .share-btn {
      min-width: 120px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      box-shadow:
        inset 0 -3px 0 rgba(0,0,0,0.15),
        0 5px 12px rgba(0,0,0,0.12);
      transform: translateY(0);
      transition: all 0.2s ease;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .sarat-docs .download-btn {
      background: linear-gradient(to bottom, #2e7d32, #1b5e20);
    }

    .sarat-docs .download-btn:hover {
      background: linear-gradient(to bottom, #1b5e20, #0e4212);
      transform: translateY(-2px);
      box-shadow:
        inset 0 -3px 0 rgba(0,0,0,0.2),
        0 8px 18px rgba(46,125,50,0.4);
    }

    .sarat-docs .share-btn {
      background: linear-gradient(to bottom, #1976d2, #0d47a1);
    }

    .sarat-docs .share-btn:hover {
      background: linear-gradient(to bottom, #0d47a1, #062a5c);
      transform: translateY(-2px);
      box-shadow:
        inset 0 -3px 0 rgba(0,0,0,0.2),
        0 8px 18px rgba(25,118,210,0.4);
    }
    
    /* ----- GOVT. CALENDARS TABLE ----- */
    .sarat-docs #tab-Govt\ Calendars .csv-table {
      width: 80%;
      table-layout: fixed;
    }

    .sarat-docs #tab-Govt\ Calendars .csv-table th:nth-child(1),
    .sarat-docs #tab-Govt\ Calendars .csv-table td:nth-child(1) {
      width: 35% !important;
      min-width: 220px !important;
      text-align: left !important;
      padding-left: 30px !important;
    }

    .sarat-docs #tab-Govt\ Calendars .csv-table th:nth-child(2),
    .sarat-docs #tab-Govt\ Calendars .csv-table td:nth-child(2) {
      width: 32.5% !important;
      text-align: center !important;
    }

    .sarat-docs #tab-Govt\ Calendars .csv-table th:nth-child(3),
    .sarat-docs #tab-Govt\ Calendars .csv-table td:nth-child(3) {
      width: 32.5% !important;
      text-align: center !important;
    }

    .sarat-docs #tab-Govt\ Calendars .csv-table th:nth-child(1) {
      text-align: left !important;
      padding-left: 30px !important;
    }

    .sarat-docs #tab-Govt\ Calendars .csv-table { table-layout: fixed !important; }

    /* fallback header/footer */
    .fallback-header {
      background: #0c1f33;
      color: white;
      padding: 18px 30px;
      font-size: 24px;
      font-weight: bold;
    }
    .fallback-footer {
      background: #0a1929;
      color: #bbd6ff;
      padding: 20px 30px;
      text-align: center;
    }

    /* ================================
       ALL FILES TAB STYLES
    ================================ */
    .sara-table-container-v2 {
      width: 100%;
      max-width: 95vw;
      overflow-x: auto;
      background: #fefefe;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin: 20px auto;
      box-sizing: border-box;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1),
                  0 10px 20px rgba(0,0,0,0.15),
                  0 20px 40px rgba(0,0,0,0.2);
    }

    #saraCsvTableV2 {
      width: 100% !important;
      background: white;
      color: black;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      border-collapse: collapse !important;
      margin: 0 auto;
      table-layout: auto;
    }

    #saraCsvTableV2 th,
    #saraCsvTableV2 td {
      padding: 12px 15px;
      vertical-align: top;
      text-align: left;
      word-break: break-word;
      white-space: normal;
      border-bottom: 1px solid #ddd;
    }

    #saraCsvTableV2 td[data-label="Download"],
    #saraCsvTableV2 td[data-label="File Size"] {
      text-align: right;
      vertical-align: middle;
    }

    #saraCsvTableV2 thead tr th {
      background-color: #101535 !important;
      color: #ffffff !important;
      font-weight: bold;
      border-bottom: 2px solid #b20bb3 !important;
      position: relative;
      text-align: center;
      vertical-align: middle;
    }

    #saraCsvTableV2 thead th.sorting:after { content: "↕"; opacity: 0.5; }
    #saraCsvTableV2 thead th.sorting_asc:after { content: "↑"; }
    #saraCsvTableV2 thead th.sorting_desc:after { content: "↓"; }

    #saraCsvTableV2 thead th.sorting:after,
    #saraCsvTableV2 thead th.sorting_asc:after,
    #saraCsvTableV2 thead th.sorting_desc:after {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    }

    #saraCsvTableV2 tbody tr:hover td {
      background-color: #707070 !important;
      color: white;
      transition: background 0.2s ease-in-out;
    }

    .sara-download-btn,
    #saraCsvTableV2 td a button {
      padding: 8px 16px;
      background-color: #007bff;
      color: #ffffff !important;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.3s ease, transform 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .sara-download-btn:hover,
    #saraCsvTableV2 td a button:hover {
      background-color: #e615ed !important;
      transform: translateY(-2px);
      box-shadow: 0 3px 10px rgba(230,21,237,0.4);
    }

    .dataTables_wrapper { width: 100%; margin: 0 auto; }
    .dataTables_wrapper .dataTables_filter { float: right; margin-bottom: 15px; }
    .dataTables_wrapper .dataTables_filter input {
      width: 300px !important; padding: 8px 15px !important;
      border: 1px solid #ccc !important; border-radius: 6px !important;
      margin-left: 10px; font-size: 14px;
    }
    .dataTables_wrapper .dataTables_length { float: left; margin-bottom: 15px; }

    #saraCsvTableV2 td[data-label="Subject"] {
      max-width: 60%; white-space: normal !important;
      word-wrap: break-word !important; overflow-wrap: break-word !important; hyphens: auto;
    }
    #saraCsvTableV2 td[data-label="S.N."],
    #saraCsvTableV2 th:nth-child(1) { white-space: nowrap !important; max-width: 50px; }
    #saraCsvTableV2 td[data-label="Date"],
    #saraCsvTableV2 td[data-label="Download"],
    #saraCsvTableV2 td[data-label="Letter No."],
    #saraCsvTableV2 td[data-label="File Size"] { white-space: nowrap; }

    .dataTables_wrapper .dataTables_length select {
      padding: 8px 15px !important; border-radius: 6px !important;
      border: 1px solid #ccc !important; font-size: 14px;
    }
    .dataTables_wrapper .dataTables_info { float: left; margin-top: 15px; font-size: 14px; }
    .dataTables_wrapper .dataTables_paginate { float: right; margin-top: 15px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      padding: 8px 12px !important; border: 1px solid #ddd !important;
      margin: 0 2px !important; border-radius: 4px !important; transition: all 0.2s ease;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: #00bbff !important; color: white !important; border-color: #00bbff !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: #b20bb3 !important; color: white !important; border-color: #b20bb3 !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* =========================================================
       AMENDMENT CHAIN PICTOGRAPH – ACTS TAB ONLY
       All classes are prefixed with .sarat-act- to avoid conflicts
       ========================================================= */

    /* Wrapper around the acts table */
    .sarat-docs .sarat-act-wrap {
      width: 82%;
      margin: 0 auto;
    }

    /* The acts accordion table */
    .sarat-docs .sarat-act-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      border-radius: 10px;
      overflow: hidden;
      background: #ffffff;
      box-shadow:
        0 0 0 4px #e8f0fe,
        0 8px 20px rgba(0,80,150,0.2),
        inset 0 0 6px rgba(0,120,210,0.1);
    }

    .sarat-docs .sarat-act-table thead {
      background: linear-gradient(135deg, #0a1e3c, #13294b);
    }

    .sarat-docs .sarat-act-table thead th {
      color: #fff !important;
      font-weight: 700;
      text-align: center;
      padding: 18px 16px;
      letter-spacing: 0.8px;
      font-size: 15px;
      text-transform: uppercase;
    }

    /* Parent act row */
    .sarat-docs .sarat-act-table .sarat-act-parent-row {
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .sarat-docs .sarat-act-table .sarat-act-parent-row:hover {
      background-color: #eef6ff;
    }

    .sarat-docs .sarat-act-table .sarat-act-parent-row td {
      padding: 16px 18px;
      border-bottom: 1px solid #d4e3f0;
      vertical-align: middle;
      background-color: inherit;
    }

    /* Serial number cell */
    .sarat-docs .sarat-act-table .sarat-act-sno {
      text-align: center;
      font-weight: 700;
      color: #0a2e4a;
      width: 60px;
    }

    /* Subject cell with pictograph chain */
    .sarat-docs .sarat-act-table .sarat-act-subject-cell {
      text-align: left;
    }

    /* Act name line */
    .sarat-docs .sarat-act-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1e3a5f;
      font-size: 15px;
    }

    .sarat-docs .sarat-act-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Badge showing amendment count */
    .sarat-docs .sarat-act-amend-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff3e0;
      border: 1px solid #ffb74d;
      color: #e65100;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Toggle chevron */
    .sarat-docs .sarat-act-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: #e3ecf7;
      border-radius: 50%;
      font-size: 11px;
      color: #0066b3;
      flex-shrink: 0;
      transition: transform 0.25s ease, background 0.15s;
      margin-left: 4px;
    }

    .sarat-docs .sarat-act-parent-row.sarat-act-open .sarat-act-toggle {
      transform: rotate(180deg);
      background: #0066b3;
      color: white;
    }

    /* Chain container (hidden by default) */
    .sarat-docs .sarat-act-chain {
      display: none;
      padding: 4px 0 8px 36px;
      margin-top: 6px;
    }

    .sarat-docs .sarat-act-parent-row.sarat-act-open + .sarat-act-amendment-rows .sarat-act-chain,
    .sarat-docs .sarat-act-chain.sarat-act-chain-visible {
      display: block;
    }

    /* Each chain item line */
    .sarat-docs .sarat-act-chain-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 13px;
      color: #444;
      line-height: 1.4;
      padding: 3px 0;
      position: relative;
    }

    /* Tree connector lines using pseudo-elements */
    .sarat-docs .sarat-act-chain-item::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 0;
      width: 1px;
      height: 100%;
      background: #c0cfe0;
    }

    .sarat-docs .sarat-act-chain-item:last-child::before {
      height: 50%;
    }

    .sarat-docs .sarat-act-chain-item::after {
      content: '';
      position: absolute;
      left: -16px;
      top: 50%;
      width: 14px;
      height: 1px;
      background: #c0cfe0;
      transform: translateY(-50%);
    }

    .sarat-docs .sarat-act-chain-prefix {
      font-family: monospace;
      color: #8099b8;
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    .sarat-docs .sarat-act-chain-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .sarat-docs .sarat-act-chain-label {
      flex: 1;
      color: #2c4a70;
      font-weight: 500;
    }

    /* Amendment status badges */
    .sarat-docs .sarat-act-status-latest {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sarat-docs .sarat-act-status-old {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      color: #f57f17;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sarat-docs .sarat-act-status-original {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #e3f2fd;
      border: 1px solid #90caf9;
      color: #0d47a1;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Mini download button inside chain */
    .sarat-docs .sarat-act-chain-dl {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: linear-gradient(to bottom, #2e7d32, #1b5e20);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
      transition: all 0.15s ease;
    }

    .sarat-docs .sarat-act-chain-dl:hover {
      background: linear-gradient(to bottom, #1b5e20, #0e4212);
      transform: translateY(-1px);
    }

    /* Amendment expanded rows (the <tr> holding the chain) */
    .sarat-docs .sarat-act-amendment-rows {
      display: none;
    }

    .sarat-docs .sarat-act-amendment-rows.sarat-act-open {
      display: table-row-group;
    }

    .sarat-docs .sarat-act-amendment-rows td {
      padding: 0 18px 14px 18px;
      background: #f7fbff;
      border-bottom: 1px solid #d4e3f0;
    }

    /* Action buttons cell – stays aligned */
    .sarat-docs .sarat-act-actions {
      text-align: center;
      white-space: nowrap;
      width: 300px;
    }

    .sarat-docs .sarat-act-actions .download-btn,
    .sarat-docs .sarat-act-actions .share-btn {
      min-width: 110px;
      padding: 10px 16px;
      font-size: 13px;
    }

    /* No-amendments style (plain row, no toggle) */
    .sarat-docs .sarat-act-table .sarat-act-parent-row.sarat-act-no-amend {
      cursor: default;
    }

    .sarat-docs .sarat-act-table .sarat-act-parent-row.sarat-act-no-amend:hover {
      background-color: #f8fbff;
    }

    /* Loading / empty state */
    .sarat-docs .sarat-act-loading {
      text-align: center;
      padding: 40px 20px;
      color: #5577aa;
      font-size: 15px;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .sarat-docs { padding: 20px 50px; }

<!-- =========================================================
     AMENDMENT CHAIN PICTOGRAPH – JAVASCRIPT
     
     HOW YOUR GOOGLE SHEET / CSV SHOULD BE STRUCTURED:
     
     Columns needed for the Acts sheet:
       S.N.          → serial number (only set on the PARENT row, leave blank for amendments)
       Subject       → name of the act OR amendment
       Year          → year of enactment / amendment (e.g. 2020)
       Type          → "Act" for parent, "Amendment" for child rows
       ParentAct     → (for Amendment rows) exact Subject text of the parent act
       DownloadLink  → Google Drive direct download URL
       ShareLink     → shareable URL
     
     The script groups rows: all "Amendment" rows whose ParentAct matches
     a parent "Act" row are nested under it as the pictograph chain.
     ========================================================= -->
<script>
(function () {
  'use strict';

  /* ── CONFIG: replace with your actual published CSV URL ── */
  const ACTS_CSV_URL = 'YOUR_GOOGLE_SHEET_PUBLISHED_CSV_URL_FOR_ACTS_HERE';
  /* ──────────────────────────────────────────────────────── */

  /* Helper: make a Google Drive direct-download link */
  function driveDirectLink(url) {
    if (!url) return '#';
    var m = url.match(/\/d\/([^/]+)/);
    if (m) return 'https://drive.google.com/uc?export=download&id=' + m[1];
    return url;
  }

  /* Helper: copy link to clipboard */
  function copyLink(url, btn) {
    if (navigator.clipboard && url && url !== '#') {
      navigator.clipboard.writeText(url).then(function () {
        var orig = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(function () { btn.textContent = orig; }, 1800);
      });
    }
  }

  /* Build the pictograph chain HTML for a set of amendments */
  function buildChain(amendments) {
    if (!amendments || amendments.length === 0) return '';
    var html = '<div class="sarat-act-chain sarat-act-chain-visible">';
    amendments.forEach(function (amend, idx) {
      var isLast = (idx === amendments.length - 1);
      var prefix = isLast ? '└──' : '├──';
      var yearNum = parseInt(amend.Year || amend.year || '', 10);
      var latestYear = Math.max.apply(null, amendments.map(function(a){ return parseInt(a.Year || a.year || '0', 10); }));
      var isLatest = (yearNum === latestYear);
      var statusBadge = isLatest
        ? '<span class="sarat-act-status-latest">🟢 LATEST</span>'
        : '<span class="sarat-act-status-old">⚠️ OLDER</span>';
      var label = (amend.Subject || amend.subject || 'Amendment') +
                  (amend.Year || amend.year ? ' (' + (amend.Year || amend.year) + ')' : '');
      var dlUrl = driveDirectLink(amend.DownloadLink || amend.downloadlink || amend['Download Link'] || '');
      html += '<div class="sarat-act-chain-item">' +
                '<span class="sarat-act-chain-prefix">' + prefix + '</span>' +
                '<span class="sarat-act-chain-icon">📝</span>' +
                '<span class="sarat-act-chain-label">' + label + '</span>' +
                statusBadge +
                (dlUrl !== '#' ? '<a href="' + dlUrl + '" target="_blank" class="sarat-act-chain-dl">⬇ PDF</a>' : '') +
              '</div>';
    });
    html += '</div>';
    return html;
  }

  /* Render the acts table */
  function renderActsTable(rows) {
    var tbody = document.getElementById('sarat-acts-tbody');
    if (!tbody) return;

    /* Separate parents and amendments */
    var parents = [];
    var amendMap = {};   /* key = parent act subject → array of amendment rows */

    rows.forEach(function (row) {
      var type = (row.Type || row.type || '').trim().toLowerCase();
      if (type === 'amendment') {
        var parentKey = (row.ParentAct || row.parentact || row['Parent Act'] || '').trim();
        if (!amendMap[parentKey]) amendMap[parentKey] = [];
        amendMap[parentKey].push(row);
      } else {
        parents.push(row);
      }
    });

    /* Sort amendments newest-first within each parent */
    Object.keys(amendMap).forEach(function (k) {
      amendMap[k].sort(function (a, b) {
        return parseInt(b.Year || b.year || '0', 10) - parseInt(a.Year || a.year || '0', 10);
      });
    });

    if (parents.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="sarat-act-loading">No Acts found. Check your CSV column headers.</td></tr>';
      return;
    }

    var html = '';
    parents.forEach(function (act, idx) {
      var sno        = act['S.N.'] || act['S.N'] || act['SN'] || act['sno'] || (idx + 1);
      var subject    = act.Subject || act.subject || 'Untitled Act';
      var dlLink     = driveDirectLink(act.DownloadLink || act.downloadlink || act['Download Link'] || '');
      var shareLink  = act.ShareLink || act.sharelink || act['Share Link'] || dlLink;
      var amendments = amendMap[subject.trim()] || [];
      var hasAmends  = amendments.length > 0;
      var rowId      = 'sarat-act-row-' + idx;
      var amendId    = 'sarat-amend-rows-' + idx;

      /* Amendment count badge */
      var badge = hasAmends
        ? '<span class="sarat-act-amend-badge">✏️ ' + amendments.length + ' amendment' + (amendments.length > 1 ? 's' : '') + '</span>'
        : '';

      /* Toggle chevron (only shown if there are amendments) */
      var toggle = hasAmends
        ? '<span class="sarat-act-toggle" aria-label="Toggle amendments">▼</span>'
        : '';

      /* Parent row */
      html += '<tr class="sarat-act-parent-row' + (hasAmends ? '' : ' sarat-act-no-amend') + '" ' +
                  (hasAmends ? 'id="' + rowId + '" data-amend-id="' + amendId + '"' : '') +
              '>' +
        '<td class="sarat-act-sno">' + sno + '</td>' +
        '<td class="sarat-act-subject-cell">' +
          '<div class="sarat-act-name">' +
            '<span class="sarat-act-icon">📜</span>' +
            '<span>' + subject + '</span>' +
            badge +
            toggle +
          '</div>' +
          (hasAmends ? buildChain(amendments) : '') +
        '</td>' +
        '<td class="sarat-act-actions">' +
          (dlLink !== '#' ?
            '<a href="' + dlLink + '" target="_blank" style="text-decoration:none;">' +
              '<button class="download-btn">⬇ DOWNLOAD</button>' +
            '</a> ' : '') +
          '<button class="share-btn" data-share-url="' + shareLink + '">🔗 SHARE</button>' +
        '</td>' +
      '</tr>';
    });

    tbody.innerHTML = html;

    /* Attach toggle click handlers */
    tbody.querySelectorAll('.sarat-act-parent-row[data-amend-id]').forEach(function (row) {
      row.addEventListener('click', function (e) {
        /* Ignore clicks on the download/share buttons */
        if (e.target.closest('.sarat-act-actions')) return;
        row.classList.toggle('sarat-act-open');
        /* Toggle chain visibility */
        var chain = row.querySelector('.sarat-act-chain');
        if (chain) {
          chain.style.display = row.classList.contains('sarat-act-open') ? 'block' : 'none';
        }
      });
    });

    /* Share buttons – copy link */
    tbody.querySelectorAll('.share-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        copyLink(btn.dataset.shareUrl, btn);
      });
    });

    /* Collapse all chains initially */
    tbody.querySelectorAll('.sarat-act-chain').forEach(function (c) {
      c.style.display = 'none';
    });
  }

  /* Fetch and parse the CSV when the Acts tab is first shown */
  var actsLoaded = false;

  function loadActsIfNeeded() {
    if (actsLoaded) return;
    actsLoaded = true;

    /* --- DEMO DATA ---
       Remove the block below and uncomment the PapaParse fetch
       once you have replaced ACTS_CSV_URL with your real URL.
    ------------------------------------------------------------ */
    var demoRows = [
      { 'S.N.': 1, Subject: 'Essential Commodities Act, 1955',    Year: '1955', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': '',Subject: 'Essential Commodities Act, 1955',    Year: '2020', Type: 'Amendment', ParentAct: 'Essential Commodities Act, 1955', DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': '',Subject: 'Essential Commodities Act, 1955',    Year: '2019', Type: 'Amendment', ParentAct: 'Essential Commodities Act, 1955', DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': 2, Subject: 'The Odisha Lokayukta Act, 2014',     Year: '2014', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': 3, Subject: 'The Consumer Protection Act, 2019',  Year: '2019', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': '',Subject: 'The Consumer Protection Act, 2019',  Year: '2022', Type: 'Amendment', ParentAct: 'The Consumer Protection Act, 2019', DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': 4, Subject: 'The National Food Security Act, 2013',Year:'2013', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': 5, Subject: 'Right to Information Act, 2005',     Year: '2005', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': '',Subject: 'Right to Information Act, 2005',     Year: '2019', Type: 'Amendment', ParentAct: 'Right to Information Act, 2005', DownloadLink: '#', ShareLink: '#' },
      { 'S.N.': 6, Subject: 'The Income Tax Act, 1961',           Year: '1961', Type: 'Act',       DownloadLink: '#', ShareLink: '#' },
    ];
    renderActsTable(demoRows);

    /* --- REAL DATA (uncomment this and remove demoRows block above) ---
    if (!window.Papa) {
      setTimeout(loadActsIfNeeded, 500);
      actsLoaded = false;
      return;
    }
    Papa.parse(ACTS_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function (results) {
        renderActsTable(results.data);
      },
      error: function () {
        document.getElementById('sarat-acts-tbody').innerHTML =
          '<tr><td colspan="3" class="sarat-act-loading">⚠️ Could not load acts data. Please check the CSV URL.</td></tr>';
      }
    });
    -------------------------------------------------------------------- */
  }

  /* Hook into the existing tab switching system */
  document.addEventListener('DOMContentLoaded', function () {
    var tabBtns = document.querySelectorAll('.sarat-docs .tab-item');

    tabBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        /* Remove active from all */
        tabBtns.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');

        /* Hide all panels */
        document.querySelectorAll('.sarat-docs .csv-tab-container').forEach(function (p) {
          p.style.display = 'none';
        });

        var cat = btn.getAttribute('data-category');
        var panel = document.getElementById('tab-' + cat);
        if (panel) panel.style.display = 'flex';

        /* Load acts on first visit to Acts tab */
        if (cat === 'Act') loadActsIfNeeded();
      });
    });
  });

})();
</script>
