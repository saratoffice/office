<style>
/* Premium Stats Design - Right Aligned */
.hero-stats.premium-stats {
  display: flex;
  gap: 25px;
  margin-top: 40px;
  flex-wrap: wrap;
  justify-content: flex-end; /* Right alignment */
}

.premium-stats .stat-item-modern {
  background: linear-gradient(145deg, #1a2639, #0f172a);
  padding: 20px 35px;
  border-radius: 30px;
  box-shadow: 0 15px 30px -10px rgba(0, 51, 204, 0.3);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 130px;
  border: 1px solid rgba(124, 255, 0, 0.3);
  position: relative;
  overflow: hidden;
}

.premium-stats .stat-item-modern::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #7CFF00, #0033cc, #8b5cf6, #7CFF00);
  background-size: 300% 300%;
  border-radius: 32px;
  z-index: -2;
  animation: gradientBorder 3s ease infinite;
}

.premium-stats .stat-item-modern::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: linear-gradient(145deg, #1e293b, #0f172a);
  border-radius: 28px;
  z-index: -1;
}

@keyframes gradientBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.premium-stats .stat-number-modern {
  font-size: 3.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #7CFF00, #00B4D8, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  text-shadow: 0 0 20px rgba(124, 255, 0, 0.3);
  position: relative;
}

.premium-stats .stat-number-modern::after {
  content: '+';
  position: absolute;
  top: -5px;
  right: -15px;
  font-size: 2rem;
  color: #7CFF00;
  opacity: 0.8;
}

.premium-stats .stat-label-modern {
  font-size: 1.1rem;
  color: #e2e8f0;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
  margin-top: 5px;
  background: linear-gradient(135deg, #ffffff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Premium Button - Right Aligned */
.btn-right.premium-btn-right {
  display: flex;
  justify-content: flex-end;
  margin-top: 30px;
}

.premium-btn-right .btn-premium {
  display: inline-flex;
  align-items: center;
  gap: 15px;
  padding: 16px 38px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border-radius: 60px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  font-size: 1.2rem;
  letter-spacing: 1px;
  border: 2px solid transparent;
  background-clip: padding-box;
  position: relative;
  transition: all 0.4s ease;
  box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
}

.premium-btn-right .btn-premium::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #7CFF00, #0033cc, #8b5cf6, #FF6B35, #7CFF00);
  background-size: 300% 300%;
  border-radius: 62px;
  z-index: -1;
  animation: btnBorder 4s linear infinite;
}

@keyframes btnBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.premium-btn-right .btn-premium:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 20px 40px -10px rgba(124, 255, 0, 0.4);
}

.premium-btn-right .btn-premium i {
  font-size: 1.4rem;
  transition: transform 0.3s ease;
  color: #7CFF00;
}

.premium-btn-right .btn-premium:hover i {
  transform: translateX(8px) rotate(360deg);
}

.premium-btn-right .btn-premium span {
  background: linear-gradient(135deg, #ffffff, #e2e8f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Responsive adjustments */
@media (max-width: 768px) {
  .hero-stats.premium-stats {
    justify-content: center;
  }
  
  .premium-stats .stat-item-modern {
    padding: 15px 25px;
    min-width: 100px;
  }
  
  .premium-stats .stat-number-modern {
    font-size: 2.5rem;
  }
  
  .premium-btn-right {
    justify-content: center;
  }
}
