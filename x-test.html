<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website steps · modern interactive card</title>
    <!-- common fonts used throughout the site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- common CSS (header, footer, global) — kept exactly as you use -->
    <link rel="stylesheet" href="style.css">
    <!-- site components (header/footer loader) -->
    <script src="assets/Scripts/site-components.js" defer></script>
    <!-- go to top script (common) -->
    <script src="/assets/Scripts/gototop.js" defer></script>
    <!-- only the steps card custom styles (minimal, integrated) -->
    <style>
        /* ensure body uses common background, flex column for sticky footer */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* animated background overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmZmZmIj48L3JlY3Q+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiNmMGYwZjAiPjwvcmVjdD4KPC9zdmc+');
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        /* header & footer injected — they keep their original styles */
        #site-header,
        #site-footer {
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        /* main content grows to fill space, centers the card */
        .page-main {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* ----- redesigned steps card (fits perfectly with header/footer) ----- */
        .custom-ol {
            padding: 36px 42px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            max-width: 620px;
            width: 100%;
            border-radius: 56px 56px 56px 56px;
            box-shadow: 0 24px 46px -16px rgba(0, 45, 80, 0.35), 0 8px 15px rgba(0,0,0,0.03);
            font-family: "Roboto", sans-serif;
            color: #073b4c;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .custom-ol::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
        }

        .custom-ol:hover {
            box-shadow: 0 32px 58px -18px #0a2a4a;
            transform: translateY(-5px) scale(1.02);
        }

        .custom-ol:hover::before {
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* heading with accent bar (like h3 from list pages) */
        .custom-ol h2 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 16px 0;
            padding-left: 28px;
            position: relative;
            color: #0b2b40;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
            display: inline-block;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .custom-ol h2::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 8px;
            background: linear-gradient(145deg, #e11d48, #b91c1c);
            border-radius: 20px;
            transition: 0.3s ease;
        }

        .custom-ol:hover h2::before {
            width: 14px;
            background: linear-gradient(145deg, #2563eb, #1e3a8a);
        }

        /* reset list */
        .custom-ol ol {
            margin: 32px 0 8px 0;
            padding: 0;
            list-style: none;
            counter-reset: web-design;
        }

        /* list items – spacious, refined hover effect */
        .custom-ol ol li {
            margin: 28px 0;
            font-size: 1.35rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            padding: 12px 20px 12px 12px;
            border-radius: 60px 20px 20px 60px;
            cursor: pointer;
            color: #1a2e3f;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .custom-ol ol li::after {
            content: '🔗';
            position: absolute;
            right: -30px;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .custom-ol ol li:hover {
            background: linear-gradient(105deg, #ffd166 0%, #fbbf24 100%);
            transform: translateX(12px) scale(1.02);
            box-shadow: 0 12px 24px -16px #b45309, 0 0 0 2px rgba(255,215,0,0.3);
            color: #0f172a;
        }

        .custom-ol ol li:hover::after {
            right: 15px;
            opacity: 1;
        }

        /* step number (counter) – bigger, more presence */
        .custom-ol ol li::before {
            content: counter(web-design);
            counter-increment: web-design;
            margin-right: 28px;
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(130deg, #0b4b6f, #0a2472);
            padding: 8px 24px;
            border-radius: 0 28px 0 28px;
            color: #f8fafc;
            transition: all 0.4s ease;
            line-height: 1;
            box-shadow: 0 7px 0 #021b2b;
            letter-spacing: -1px;
            min-width: 84px;
            text-align: center;
        }

        .custom-ol ol li:hover::before {
            background: linear-gradient(145deg, #073b4c, #022c3a);
            transform: scale(1.2) rotate(-3deg) translateY(-4px);
            box-shadow: 0 12px 0 #02101a, 0 4px 20px rgba(0,180,255,0.4);
            color: white;
            border-radius: 20px 0 20px 0;
        }

        /* fine tune last item */
        .custom-ol ol li:last-child {
            margin-bottom: 0;
        }

        /* optional small footer note inside card – blends in */
        .card-footer-note {
            margin-top: 28px;
            text-align: right;
            font-size: 0.95rem;
            opacity: 0.55;
            letter-spacing: 0.3px;
            font-style: italic;
            border-top: 1px dashed rgba(0,40,70,0.1);
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .google-link {
            background: linear-gradient(45deg, #4285f4, #34a853, #fbbc05, #ea4335);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
        }

        .google-link:hover {
            background: linear-gradient(45deg, #ea4335, #fbbc05, #34a853, #4285f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: scale(1.05);
            border-color: #4285f4;
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
        }

        /* floating animation for the card */
        .custom-ol {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg); }
        }

        /* responsive: keep card comfortable on all devices */
        @media (max-width: 600px) {
            .page-main {
                padding: 24px 16px;
            }
            .custom-ol {
                padding: 28px 24px;
                border-radius: 40px;
            }
            .custom-ol h2 {
                font-size: 1.9rem;
                padding-left: 22px;
            }
            .custom-ol ol li {
                font-size: 1.15rem;
                margin: 22px 0;
            }
            .custom-ol ol li::before {
                font-size: 2.5rem;
                min-width: 68px;
                padding: 6px 14px;
                margin-right: 20px;
            }
        }

        @media (max-width: 420px) {
            .custom-ol h2 {
                font-size: 1.6rem;
            }
            .custom-ol ol li {
                font-size: 1rem;
            }
            .custom-ol ol li::before {
                font-size: 2.1rem;
                min-width: 58px;
                padding: 6px 8px;
            }
        }

        /* everything integrates: header & footer retain their original look */
    </style>
</head>
<body>
    <!-- common header loaded via site-components.js -->
    <div id="site-header"></div>

    <!-- main area that holds the steps card and centers it perfectly -->
    <div class="page-main">
        <div class="custom-ol">
            <h2>Steps To Design A Website</h2>
            <ol>
                <li onclick="window.open('https://www.google.com', '_blank')">The Planning Phase</li>
                <li onclick="window.open('https://www.google.com', '_blank')">Create The Wireframe</li>
                <li onclick="window.open('https://www.google.com', '_blank')">Design It</li>
                <li onclick="window.open('https://www.google.com', '_blank')">Write The Code</li>
                <li onclick="window.open('https://www.google.com', '_blank')">Publish The Website Online</li>
            </ol>
            <!-- a subtle card footer with Google link -->
            <div class="card-footer-note">
                <span>5 streamlined steps · start today</span>
                <a href="https://www.google.com" target="_blank" class="google-link" onclick="event.stopPropagation();">🔍 Visit Google</a>
            </div>
        </div>
    </div>

    <!-- common footer -->
    <div id="site-footer"></div>

    <!-- go to top button (already included via gototop.js) -->
    <!-- note: gototop.js is loaded with defer, it will attach automatically -->

    <script>
        // Additional JavaScript to enhance the experience
        document.addEventListener('DOMContentLoaded', function() {
            // Add click handlers to all list items if not already present
            const listItems = document.querySelectorAll('.custom-ol ol li');
            listItems.forEach((item, index) => {
                // Ensure the onclick attribute is set
                if (!item.hasAttribute('onclick')) {
                    item.setAttribute('onclick', "window.open('https://www.google.com', '_blank')");
                }
                
                // Add a small delay before opening to show hover effect
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    // Add a quick animation before redirect
                    this.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        window.open('https://www.google.com', '_blank');
                        this.style.transform = '';
                    }, 150);
                });
            });

            // Add click handler to the card footer note
            const footerNote = document.querySelector('.card-footer-note span');
            if (footerNote) {
                footerNote.style.cursor = 'pointer';
                footerNote.addEventListener('click', function() {
                    window.open('https://www.google.com', '_blank');
                });
            }
        });

        // Prevent event bubbling from the Google link
        document.querySelector('.google-link')?.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    </script>
</body>
</html>
