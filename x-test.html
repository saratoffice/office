<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSD · licence inspector (structured view)</title>
    <!-- Font Awesome 6 (free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- custom css classes (no header/footer styling) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* main container – no header/footer, only dropdown + cards */
        .hsd-container {
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        /* dropdown row */
        .selector-wrap {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 18px rgba(0,20,40,0.06);
        }

        .selector-wrap label {
            font-weight: 600;
            color: #1e3a6b;
            letter-spacing: 0.3px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .selector-wrap label i {
            color: #0f5fa3;
            font-size: 1.2rem;
        }

        #sectionSelect {
            flex: 1;
            padding: 0.7rem 1.2rem;
            border: 1px solid #cdddec;
            border-radius: 40px;
            font-size: 1rem;
            background: #f9fcff;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            font-weight: 500;
            color: #0b2d4b;
        }

        #sectionSelect:hover {
            border-color: #4791cf;
            background: #ffffff;
        }

        .print-btn {
            background: #1f4e7a;
            border: none;
            color: white;
            padding: 0.7rem 1.7rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,55,100,0.2);
            transition: 0.2s;
            border: 1px solid #154872;
        }

        .print-btn i {
            font-size: 1.1rem;
        }

        .print-btn:hover {
            background: #0f3b5e;
            box-shadow: 0 6px 14px rgba(0,55,100,0.3);
        }

        /* info panel – dynamic cards */
        .section-grid {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .section-card {
            background: white;
            border-radius: 28px;
            padding: 1.8rem 1.8rem 2rem 1.8rem;
            box-shadow: 0 16px 30px -8px rgba(17, 55, 90, 0.12);
            transition: 0.15s;
            border: 1px solid rgba(200, 221, 242, 0.4);
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 2px dashed #b7d3ec;
            padding-bottom: 0.7rem;
            color: #153e64;
        }

        .section-title i {
            font-size: 2rem;
            width: 2.2rem;
            color: #2d77b3;
        }

        .key-value-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 1.8rem;
            margin-top: 0.25rem;
        }

        .kv-item {
            flex: 1 1 260px;
            background: #fafdff;
            padding: 0.8rem 1.2rem 0.8rem 1rem;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e2edf9;
            transition: all 0.1s;
        }

        .kv-item i {
            font-size: 1.5rem;
            min-width: 2rem;
            text-align: center;
            color: #316e9e;
        }

        .kv-content {
            flex: 1;
            overflow-wrap: anywhere;
        }

        .kv-key {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
            color: #4874a5;
            margin-bottom: 4px;
        }

        .kv-value {
            font-size: 1.25rem;
            font-weight: 570;
            color: #0a1f33;
            line-height: 1.4;
        }

        .kv-value.missing {
            color: #9badc2;
            font-style: italic;
            font-weight: 400;
            font-size: 1.1rem;
        }

        /* small chips for validity / extra */
        .validity-chip {
            background: #e1effa;
            border-radius: 30px;
            padding: 0.25rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #0f4a7a;
            margin-left: 8px;
            white-space: nowrap;
        }

        /* print styles: minimal margin, no extra header/footer */
        @media print {
            body { background: white; padding: 0.3in; }
            .selector-wrap, .print-btn { display: none; }
            .section-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
            .kv-item { background: #f5f5f5; border: 1px solid #aaa; }
            @page { margin: 0.4in; }   /* minimal top/bottom margin */
        }
    </style>
</head>
<body>
<div class="hsd-container">
    <!-- DROPDOWN + PRINT (no header/footer) -->
    <div class="selector-wrap">
        <label><i class="fas fa-layer-group"></i> Show section:</label>
        <select id="sectionSelect">
            <option value="all" selected>📋 ALL SECTIONS (full record)</option>
            <option value="metadata">📄 METADATA</option>
            <option value="particulars">📌 PROPRIETOR / PARTICULARS</option>
            <option value="facilities">🧰 FACILITIES & EQUIPMENT</option>
            <option value="safety">🛡️ SAFETY GEAR</option>
            <option value="licenses">📜 LICENSES & VALIDITY</option>
            <option value="accounts">📊 ACCOUNT REGISTERS</option>
            <option value="stock">⛽ STOCK & DISCREPANCY</option>
            <option value="density">⚖️ DENSITY REFERENCE</option>
            <option value="recommendation">✅ RECOMMENDATION</option>
            <option value="officers">👮 INSPECTING OFFICERS</option>
        </select>
        <button class="print-btn" id="printBtn"><i class="fas fa-file-pdf"></i> Export / print (PDF)</button>
    </div>

    <!-- dynamic data will be injected here -->
    <div id="dataDisplay" class="section-grid"></div>
</div>

<script>
    (function() {
        // ----- raw embedded CSV data (exactly from file, trimmed) -----
        const csvData = `section,key,value,validity
metadata,title,HSD/LUBRICANT LICENSE RENEWAL,
metadata,stationName,ghuiyiugbhjvhjvhj,
metadata,verificationDate,,
metadata,verificationTime,etreyty,
metadata,verifyingOfficer,tuyuyt,
particulars,Proprietor Name,,
particulars,Proprietor Address,,
particulars,Email,,
particulars,Mobile,8895965811,
particulars,Aadhaar,205842503291,
particulars,PAN,AOAPM5635D,
particulars,GST,21AOAPM5635D3ZF,
particulars,Power of Attorney,No,
particulars,Plot No,831/1476,
particulars,Khata No,129/232,
particulars,Mouza,Naikensira,
particulars,Police Station,Deogaon,
particulars,Tahasil,Deogaon,
particulars,Block,Deogaon,
particulars,PIN,767029,
particulars,Establishment Year,2020,
particulars,Oil Company,BPCL,
particulars,Oil Co Recommendation Letter,SBP.TER.BOL-25 Dt. 23/01/2020,
particulars,Agreement Date,23/12/2020,
particulars,NOC Details,"2793/Judl Dtd. 20.11.2020, Collector, Balangir",
particulars,Power Supply,TPWODL: Consumer No. 911001140277,
facilities,First Aid Box,Available,
facilities,Generator set,Available,
facilities,Stock & Price Board,Available,
facilities,Density Board,Available,
facilities,Citizen Charter,Available,
facilities,Clean toilet,Available,
facilities,Free Air,Available,
facilities,Clean Drinking Water,Available,
facilities,Filter Paper,Available,
facilities,5 litre measuring jar,Available,
facilities,Hydrometer,Available,
facilities,Thermometer,Available,
facilities,Dip Rod,Available,
facilities,ASTM Conversion Chart,Available,
facilities,Measuring glass cylinder,Available,
facilities,Water finding paste,Available,
facilities,Consumer Complaint Register,Available,
facilities,Adequate lighting,Available,
safety,ABC extinguisher 10kg,4 Nos,2026-02-22
safety,CO₂ extinguisher 4.5kg,1 No,2026-02-22
safety,Sand buckets,6 with sand,
safety,Sump with water,0,
licenses,HSD License,06/2020-21,2025-03-31
licenses,Lubricant License,06/2020-21,2025-03-31
licenses,Explosive License,P/EC/OR/14/1977 (P313459),2026-12-31
licenses,Fire Safety,FIRCER1306180092023002500,2025-03-21
licenses,Weights & Measure (Pump 1),BGR25A2073,2026-02-17
licenses,Weights & Measure (Pump 2),BGR25A2074,2026-02-17
licenses,5 Ltr Conical,NOT PRODUCED,
accounts,Stock Register,Satisfactory,
accounts,Density Register,Satisfactory,
accounts,Cash Memo,Satisfactory,
accounts,Daily Sales Register,Satisfactory,
accounts,Inspection Register,Satisfactory,
stock,HSD Book Balance,7834 Ltrs,
stock,HSD Physical Stock,7856 Ltrs,
stock,HSD Discrepancy,#ERROR!,
stock,MS Book Balance,5967 Ltrs,
stock,MS Physical Stock,5983 Ltrs,
stock,MS Discrepancy,#ERROR!,
stock,Lubricants Stock,422 Ltrs,
density,HSD Reference Range,810-845 kg/m³,
density,HSD Observed,832.4 kg/m³,
density,MS Reference Range,720-775 kg/m³,
density,MS Observed,752.4 kg/m³,
recommendation,complaints,No,
recommendation,performance,Satisfactory,
recommendation,renewal,Recommended,
officers,inspector,"Inspector of Supplies, Deogaon",
officers,acso,Assistant Civil Supplies Officer,`;

        // ----- parse CSV (keeping section,key,value,validity) -----
        function parseCSVtoRows(str) {
            const lines = str.split(/\r?\n/).filter(line => line.trim() !== '');
            const headers = lines[0].split(',');
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                // naive parser (no escaped commas inside quotes – but we have one quoted value: NOC Details)
                let line = lines[i];
                const fields = [];
                let inQuote = false;
                let current = '';
                for (let ch of line) {
                    if (ch === '"' && !inQuote) { inQuote = true; }
                    else if (ch === '"' && inQuote) { inQuote = false; }
                    else if (ch === ',' && !inQuote) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += ch;
                    }
                }
                fields.push(current); // last field
                if (fields.length >= 4) {
                    rows.push({
                        section: fields[0].trim(),
                        key: fields[1].trim(),
                        value: fields[2].trim(),
                        validity: fields[3] ? fields[3].trim() : ''
                    });
                }
            }
            return rows;
        }

        const records = parseCSVtoRows(csvData);

        // ----- icon mapping based on key words (expressive) -----
        function getIconForKey(key, section) {
            const k = key.toLowerCase();
            if (k.includes('proprietor') || k.includes('owner')) return 'fa-user-tie';
            if (k.includes('mobile') || k.includes('phone')) return 'fa-mobile-alt';
            if (k.includes('aadhaar')) return 'fa-id-card';
            if (k.includes('pan')) return 'fa-credit-card';
            if (k.includes('gst')) return 'fa-file-invoice';
            if (k.includes('email')) return 'fa-envelope';
            if (k.includes('plot') || k.includes('khata') || k.includes('mouza') || k.includes('police') || k.includes('pin')) return 'fa-map-pin';
            if (k.includes('oil company') || k.includes('bpcl')) return 'fa-oil-can';
            if (k.includes('agreement')) return 'fa-file-signature';
            if (k.includes('noc')) return 'fa-file-contract';
            if (k.includes('power supply')) return 'fa-bolt';
            if (k.includes('extinguisher')) return 'fa-fire-extinguisher';
            if (k.includes('sand')) return 'fa-shovel';
            if (k.includes('sump')) return 'fa-water';
            if (k.includes('license') || k.includes('explosive') || k.includes('fire safety')) return 'fa-certificate';
            if (k.includes('weights') || k.includes('measure')) return 'fa-weight-scale';
            if (k.includes('stock') || k.includes('balance')) return 'fa-cubes';
            if (k.includes('discrepancy')) return 'fa-exclamation-triangle';
            if (k.includes('density')) return 'fa-flask';
            if (k.includes('first aid')) return 'fa-kit-medical';
            if (k.includes('generator')) return 'fa-car-battery';
            if (k.includes('board')) return 'fa-clipboard-list';
            if (k.includes('toilet') || k.includes('drinking')) return 'fa-toilet';
            if (k.includes('air')) return 'fa-wind';
            if (k.includes('filter') || k.includes('jar') || k.includes('cylinder')) return 'fa-flask';
            if (k.includes('thermometer')) return 'fa-temperature-high';
            if (k.includes('complaint')) return 'fa-book-open';
            if (k.includes('lighting')) return 'fa-lightbulb';
            if (k.includes('recommend') || k.includes('renewal')) return 'fa-thumbs-up';
            if (k.includes('officer') || k.includes('inspector') || k.includes('acso')) return 'fa-user-shield';
            if (k.includes('register')) return 'fa-book';
            if (k.includes('cash memo')) return 'fa-receipt';
            return 'fa-circle-check';  // fallback
        }

        // group records by section
        const grouped = records.reduce((acc, rec) => {
            if (!acc[rec.section]) acc[rec.section] = [];
            acc[rec.section].push(rec);
            return acc;
        }, {});

        // ordered sections for display
        const sectionOrder = ['metadata', 'particulars', 'facilities', 'safety', 'licenses', 'accounts', 'stock', 'density', 'recommendation', 'officers'];

        // human titles
        const sectionTitles = {
            metadata: '📋 METADATA', particulars: '📌 PROPRIETOR & DETAILS', facilities: '🧰 FACILITIES / EQUIPMENT',
            safety: '🛡️ SAFETY INSTALLATIONS', licenses: '📜 LICENSES (with validity)', accounts: '📊 ACCOUNTS & REGISTERS',
            stock: '⛽ STOCK POSITION', density: '⚖️ DENSITY CHECKS', recommendation: '✅ RECOMMENDATION', officers: '👮 OFFICERS'
        };

        // render function based on selected section
        function render(selected = 'all') {
            const container = document.getElementById('dataDisplay');
            let html = '';

            const sectionsToRender = selected === 'all' ? sectionOrder : [selected];

            for (let sec of sectionsToRender) {
                const items = grouped[sec] || [];
                if (items.length === 0) continue;

                html += `<div class="section-card">`;
                html += `<div class="section-title"><i class="fas ${sec === 'metadata' ? 'fa-diagram-project' : (sec==='particulars'?'fa-address-card':sec==='facilities'?'fa-toolbox':sec==='safety'?'fa-helmet-safety':sec==='licenses'?'fa-scroll':sec==='accounts'?'fa-calculator':sec==='stock'?'fa-oil-can':sec==='density'?'fa-weight-hanging':sec==='recommendation'?'fa-star':sec==='officers'?'fa-users': 'fa-folder-open')}"></i> ${sectionTitles[sec] || sec.toUpperCase()}</div>`;

                html += `<div class="key-value-row">`;

                items.forEach(item => {
                    const key = item.key;
                    let value = item.value || '';
                    const validity = item.validity;

                    // if value empty string → show blank / placeholder
                    const isEmpty = value === '';
                    const iconClass = getIconForKey(key, sec);

                    html += `<div class="kv-item"><i class="fas ${iconClass}"></i><div class="kv-content"><div class="kv-key">${key}</div>`;

                    if (!isEmpty) {
                        html += `<div class="kv-value">${value}`;
                        if (validity) {
                            html += ` <span class="validity-chip"><i class="far fa-calendar-alt"></i> ${validity}</span>`;
                        }
                        html += `</div>`;
                    } else {
                        html += `<div class="kv-value missing">— blank —</div>`;
                    }

                    html += `</div></div>`; // close kv-item
                });

                html += `</div></div>`; // close key-value-row and section-card
            }

            if (html === '') {
                html = `<div class="section-card" style="text-align:center;padding:3rem;"><i class="fas fa-folder-open" style="font-size:3rem;color:#abc0d0;"></i><p style="margin-top:1rem;">No entries for this section.</p></div>`;
            }

            container.innerHTML = html;
        }

        // initial render (all)
        render('all');

        // dropdown listener
        document.getElementById('sectionSelect').addEventListener('change', (e) => {
            render(e.target.value);
        });

        // print button: simply triggers browser print (our media query handles margins)
        document.getElementById('printBtn').addEventListener('click', () => {
            window.print();
        });

    })();
</script>
<!-- no header, no footer – only the selector and cards -->
</body>
</html>
