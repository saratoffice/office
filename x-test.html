<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⛽ Tank stock · MS/HSD ·  dip to volume</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: linear-gradient(145deg, #f0f3fa 0%, #e9eef5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }

    .tank-card {
      max-width: 760px;
      width: 100%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 20px 40px -12px rgba(0,20,50,0.25), 0 8px 24px -6px rgba(0,32,64,0.15);
      padding: 2rem 2rem 2.2rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s;
    }

    .tank-card h2 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      color: #13294b;
      margin: 0 0 0.25rem 0;
      border-bottom: 3px solid #d0dfed;
      padding-bottom: 0.9rem;
    }

    .tank-card h2 span {
      background: #1f3c88;
      color: white;
      font-size: 1.2rem;
      padding: 4px 16px;
      border-radius: 60px;
      margin-left: auto;
      font-weight: 500;
    }

    .meta-note {
      display: flex;
      justify-content: space-between;
      color: #2d4059;
      background: #f1f6fd;
      padding: 0.75rem 1.2rem;
      border-radius: 60px;
      margin: 1.2rem 0 1.8rem 0;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
    }

    .meta-note i {
      font-style: normal;
      background: #b3cefa;
      padding: 2px 12px;
      border-radius: 40px;
      color: #011b3c;
    }

    .fuel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem 1.8rem;
    }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
    }

    .input-field label {
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1f3c88;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-field label i {
      font-style: normal;
      background: #dae3f2;
      width: 26px;
      height: 26px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .input-field select,
    .input-field input {
      background: white;
      border: 1.5px solid #dbe1ed;
      border-radius: 24px;
      padding: 14px 20px;
      font-size: 1.05rem;
      font-weight: 500;
      color: #091c3a;
      transition: 0.2s;
      outline: none;
      width: 100%;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%231f3c88" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 18px center;
      background-size: 18px;
    }

    .input-field input {
      background-image: none;
    }

    .input-field select:hover,
    .input-field input:hover {
      border-color: #839dc0;
    }

    .input-field select:focus,
    .input-field input:focus {
      border-color: #1f3c88;
      box-shadow: 0 0 0 4px rgba(31,60,136,0.15);
    }

    .full-row {
      grid-column: span 2;
    }

    .action-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 28px;
    }

    .calculate-btn {
      background: #13294b;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
      padding: 16px 42px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 18px -8px rgba(11, 36, 92, 0.3);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2b4794;
      letter-spacing: 0.3px;
    }

    .calculate-btn:hover {
      background: #0e1f3f;
      transform: scale(1.01);
      box-shadow: 0 18px 24px -8px #10234b;
    }

    .result-panel {
      background: #eef3fc;
      border-radius: 40px;
      padding: 1.5rem 2rem;
      margin-top: 28px;
      border: 1px solid white;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 10px 20px -18px #16306b;
    }

    .stock-values {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
      text-align: center;
    }

    .stock-item {
      flex: 1;
      background: white;
      border-radius: 40px;
      padding: 1rem 0.5rem;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .stock-item .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #4267a5;
      letter-spacing: 0.4px;
    }

    .stock-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: #071a3b;
      line-height: 1.2;
    }

    .stock-item .unit {
      font-size: 0.9rem;
      color: #5a6f91;
      margin-left: 3px;
    }

    .water-badge {
      font-size: 0.95rem;
      background: #dde3ef;
      padding: 5px 18px;
      border-radius: 40px;
      color: #1f3c88;
    }

    hr {
      border: 1px solid #ced9e9;
      margin: 1.2rem 0 0.8rem;
    }

    @media (max-width: 600px) {
      .tank-card { padding: 1.5rem; }
      .fuel-grid { grid-template-columns: 1fr; }
      .full-row { grid-column: span 1; }
      .stock-values { flex-direction: column; }
      .calculate-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="tank-card">
  <h2>
    ⛽ FPS INSPECTION · NFSA
    <span>TPDS</span>
  </h2>
  <div class="meta-note">
    <span>📏 Cylindrical tank · dip to volume (ASTM formula based)</span>
    <i>capacities 15–30 kL</i>
  </div>

  <!-- main form -->
  <div class="fuel-grid">
    <div class="input-field">
      <label><i>🛢️</i> Commodity</label>
      <select id="commodity">
        <option value="MS" selected>Motor Spirit (MS) · petrol</option>
        <option value="HSD">High Speed Diesel (HSD)</option>
      </select>
    </div>

    <div class="input-field">
      <label><i>📏</i> Tank capacity</label>
      <select id="tankCap">
        <option value="15">15 kL (15,000 L)</option>
        <option value="20" selected>20 kL (20,000 L)</option>
        <option value="25">25 kL (25,000 L)</option>
        <option value="30">30 kL (30,000 L)</option>
      </select>
    </div>

    <div class="input-field">
      <label><i>⬇️</i> Fuel dip (mm)</label>
      <input type="number" id="dip" placeholder="e.g., 1250 mm" value="1200" step="any" min="0">
    </div>

    <div class="input-field">
      <label><i>💧</i> Water dip (mm)</label>
      <input type="number" id="waterDip" placeholder="0 if none" value="0" step="any" min="0">
    </div>

    <div class="input-field full-row" style="margin-top: 4px;">
      <label><i>⚙️</i> Tank diameter (optional — auto for selected kL)</label>
      <input type="text" id="diameterDisplay" readonly value="2.30 m (default for 20 kL)" style="background:#f4f7fc; font-weight:500;">
    </div>
  </div>

  <div class="action-area">
    <button class="calculate-btn" onclick="calculateStock()">
      <span>📊</span> CALCULATE STOCK
    </button>
    <div class="water-badge" id="waterInfo">Water dip: 0 mm</div>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="resultPanel">
    <div class="stock-values">
      <div class="stock-item">
        <div class="label">GROSS VOLUME</div>
        <div class="value" id="grossVal">—</div>
        <span class="unit">litres</span>
      </div>
      <div class="stock-item">
        <div class="label">WATER VOLUME</div>
        <div class="value" id="waterVal">—</div>
        <span class="unit">litres</span>
      </div>
      <div class="stock-item">
        <div class="label">NET STOCK</div>
        <div class="value" id="netVal">—</div>
        <span class="unit">litres</span>
      </div>
    </div>
    <hr>
    <div style="display: flex; justify-content: space-between; font-size:0.95rem; color:#2a4070; padding:0 6px;">
      <span>⏲️ dip: <span id="displayDip">1200 mm</span></span>
      <span>📦 tank: <span id="displayTank">20 kL</span></span>
    </div>
  </div>
</div>

<script>
(function() {
  // ----- physical tank data (cylindrical, horizontal) -----
  // For each capacity (kL) we store diameter (m) and length (m) – typical proportions L/D ~ 2.5 to 3
  // volumes: internal geometry. 15 kL, 20, 25, 30.
  const tankLibrary = {
    15: { diam: 2.05, length: 4.55 },  // ~15.0 m3
    20: { diam: 2.30, length: 4.82 },  // 20.02 m³
    25: { diam: 2.50, length: 5.10 },  // 25.04 m³
    30: { diam: 2.70, length: 5.25 }   // 30.07 m³
  };

  // DOM elements
  const commoditySel = document.getElementById('commodity');
  const tankCapSel = document.getElementById('tankCap');
  const dipInput = document.getElementById('dip');
  const waterInput = document.getElementById('waterDip');
  const diamDisplay = document.getElementById('diameterDisplay');
  const waterInfoSpan = document.getElementById('waterInfo');

  const grossSpan = document.getElementById('grossVal');
  const waterSpan = document.getElementById('waterVal');
  const netSpan = document.getElementById('netVal');
  const displayDip = document.getElementById('displayDip');
  const displayTank = document.getElementById('displayTank');

  // ---- update diameter readout when tank changes ----
  function updateDiameterDisplay() {
    const capKey = tankCapSel.value;  // string "15", "20" etc
    const tank = tankLibrary[capKey];
    if (tank) {
      diamDisplay.value = `${tank.diam.toFixed(2)} m diameter × ${tank.length.toFixed(2)} m length (approx)`;
    } else {
      diamDisplay.value = '—';
    }
    // also update tank display under result
    displayTank.innerText = capKey + ' kL';
  }

  // ---- core math: volume of liquid in horizontal cylinder ----
  function horizontalCylinderVolume(diamM, lengthM, depthMm) {
    const depthM = depthMm / 1000;            // convert mm to metres
    if (depthM <= 0) return 0;
    const radius = diamM / 2;
    if (depthM >= diamM) return Math.PI * radius * radius * lengthM; // full

    // central angle (radians) from depth:  θ = 2 * arccos((r - h)/r)
    const ratio = (radius - depthM) / radius;
    // clamp to avoid numerical issues
    const clampedRatio = Math.min(1, Math.max(-1, ratio));
    const theta = 2 * Math.acos(clampedRatio);

    // segment area = (r²/2) * (θ - sin θ)
    const area = (radius * radius / 2) * (theta - Math.sin(theta));
    return area * lengthM;                   // volume in m³ (= kilolitres)
  }

  // convert m³ → litres
  function cumToLitres(cum) {
    return cum * 1000;
  }

  // ---- main calculation ----
  window.calculateStock = function() {
    const commodity = commoditySel.value;       // 'MS' or 'HSD'
    const capKey = tankCapSel.value;            // '15','20','25','30'
    const dipMm = parseFloat(dipInput.value) || 0;
    const waterMm = parseFloat(waterInput.value) || 0;

    // update water badge
    waterInfoSpan.innerText = `💧 Water dip: ${waterMm} mm`;

    // fetch tank dimensions
    const tank = tankLibrary[capKey];
    if (!tank) {
      grossSpan.innerText = 'ERR';
      waterSpan.innerText = 'ERR';
      netSpan.innerText = 'ERR';
      return;
    }

    const diam = tank.diam;
    const length = tank.length;

    // 1. gross fuel volume (total dip)
    let grossM3 = horizontalCylinderVolume(diam, length, dipMm);
    let grossLitres = cumToLitres(grossM3);

    // 2. water volume (if any)
    let waterLitres = 0;
    if (waterMm > 0) {
      const waterM3 = horizontalCylinderVolume(diam, length, waterMm);
      waterLitres = cumToLitres(waterM3);
    }

    // 3. net stock = gross fuel - water
    let netLitres = grossLitres - waterLitres;
    if (netLitres < 0) netLitres = 0;   // sanity

    // --- apply commodity factor? Actually MS/HSD stored in same tank, but we keep commodity for display.
    // sometimes MS and HSD have slight density adjustment? but volume remains same. we keep commodity as info.
    // we can adjust if any expansion factor needed, but normally not for dip.
    // (just for completeness we can show slightly different if needed — but keep as is)

    // round to 1 decimal
    grossLitres = Math.round(grossLitres * 10) / 10;
    waterLitres = Math.round(waterLitres * 10) / 10;
    netLitres = Math.round(netLitres * 10) / 10;

    // update result fields
    grossSpan.innerText = grossLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    waterSpan.innerText = waterLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    netSpan.innerText = netLitres.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});

    // display dip info
    displayDip.innerText = dipMm + ' mm';

    // optional: add commodity to result info (subtle)
    const panel = document.getElementById('resultPanel');
    // keep tank display updated
    displayTank.innerText = capKey + ' kL (' + (commodity === 'MS' ? 'MS' : 'HSD') + ')';
  };

  // ---- event listeners to refresh diameter and recalc on change ----
  tankCapSel.addEventListener('change', function() {
    updateDiameterDisplay();
    calculateStock();   // recalc with new tank size
  });

  commoditySel.addEventListener('change', function() {
    calculateStock();   // update commodity label (optional)
  });

  dipInput.addEventListener('input', calculateStock);
  waterInput.addEventListener('input', calculateStock);

  // initial update
  updateDiameterDisplay();
  calculateStock();
})();
</script>
<!-- stub gototop (doesn't interfere) -->
<script src="/assets/Scripts/gototop.js"></script>
</body>
</html>
