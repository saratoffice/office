<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Article Gallery</title>

  <link rel="stylesheet" href="style.css">
  <script src="assets/Scripts/site-components.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --off-white: #fafafa;
      --border:  #e8e8e8;
      --border-light: #f0f0f0;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent:  #1a1a1a;
      --accent-hover: #333333;
      --tag-bg:  #f4f4f4;
      --tag-active: #111111;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 4px;
      --radius-lg: 8px;
    }

    body {
      background: var(--white);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── MASTHEAD ──────────────────────────────────── */
    .blogs-masthead {
      border-bottom: 1px solid var(--border);
      padding: 3.5rem 0 3rem;
      text-align: center;
      background: var(--white);
    }

    .blogs-masthead .label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      position: relative;
    }

    .blogs-masthead .label::before,
    .blogs-masthead .label::after {
      content: '';
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--border);
      vertical-align: middle;
      margin: 0 0.8rem;
    }

    .blogs-masthead h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.8rem;
    }

    .blogs-masthead .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    .blogs-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    /* ── TOOLBAR ──────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 1.5rem;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      max-width: 340px;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.62rem 1rem 0.62rem 2.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text-primary);
      background: var(--off-white);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #aaa;
      background: var(--white);
      box-shadow: var(--shadow-sm);
    }

    .search-box input::placeholder { color: var(--text-muted); }

    .category-filter {
      position: relative;
    }

    .category-filter select {
      appearance: none;
      padding: 0.62rem 2.2rem 0.62rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text-secondary);
      background: var(--off-white);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .category-filter select:focus { outline: none; border-color: #aaa; }

    .category-filter i {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .sort-controls {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-left: auto;
    }

    .sort-btn {
      padding: 0.6rem 1.1rem;
      border: none;
      border-left: 1px solid var(--border);
      background: var(--off-white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .sort-btn:first-child { border-left: none; }

    .sort-btn:hover { background: #f0f0f0; color: var(--text-primary); }

    .sort-btn.active {
      background: var(--white);
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ── TAGS CLOUD ──────────────────────────────────────── */
    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 1rem 0 1.4rem;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 1.8rem;
    }

    .tag {
      padding: 0.32rem 0.85rem;
      background: var(--tag-bg);
      border-radius: 2px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text-secondary);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .tag:hover { background: #ebebeb; color: var(--text-primary); }

    .tag.active {
      background: var(--tag-active);
      color: var(--white);
      border-color: var(--tag-active);
    }

    .tag i { margin-right: 0.25rem; font-size: 0.65rem; }

    /* ── RESULTS META ──────────────────────────────────────── */
    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .clear-filters {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
      cursor: pointer;
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.15s;
      background: var(--white);
    }

    .clear-filters:hover { background: var(--off-white); border-color: #ccc; }

    /* ── BLOG GRID ──────────────────────────────────────── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-light);
      border: 1px solid var(--border-light);
      margin-bottom: 3rem;
    }

    /* ── BLOG CARD ──────────────────────────────────────── */
    .blog-card {
      background: var(--white);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .blog-card:hover { background: var(--off-white); }

    /* stagger animation */
    .blog-card:nth-child(1) { animation-delay: 0.02s; }
    .blog-card:nth-child(2) { animation-delay: 0.06s; }
    .blog-card:nth-child(3) { animation-delay: 0.10s; }
    .blog-card:nth-child(4) { animation-delay: 0.14s; }
    .blog-card:nth-child(5) { animation-delay: 0.18s; }
    .blog-card:nth-child(6) { animation-delay: 0.22s; }

    .blog-image {
      height: 130px;
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 1px solid var(--border-light);
    }

    /* Subtle category-based tints */
    .blog-image[data-cat="technology"]   { background: #f0f4ff; }
    .blog-image[data-cat="legal"]        { background: #f5f0ff; }
    .blog-image[data-cat="science"]      { background: #f0fff4; }
    .blog-image[data-cat="business"]     { background: #fff8f0; }
    .blog-image[data-cat="health"]       { background: #fff0f0; }
    .blog-image[data-cat="design"]       { background: #fffbf0; }

    .blog-image .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
    }

    .blog-category-badge {
      position: absolute;
      top: 0.85rem;
      right: 0.85rem;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--white);
      border: 1px solid var(--border);
      padding: 0.22rem 0.65rem;
      border-radius: var(--radius);
    }

    .blog-content {
      padding: 1.4rem 1.5rem 1.2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .blog-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text-primary);
      margin-bottom: 0.65rem;
      letter-spacing: -0.01em;
    }

    .blog-excerpt {
      font-size: 0.855rem;
      color: var(--text-secondary);
      line-height: 1.65;
      flex-grow: 1;
      margin-bottom: 1rem;
      font-weight: 300;
    }

    .blog-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.76rem;
      color: var(--text-muted);
      padding-top: 0.85rem;
      border-top: 1px solid var(--border-light);
      margin-bottom: 0.9rem;
    }

    .blog-meta .meta-item { display: flex; align-items: center; gap: 0.35rem; }

    .blog-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }

    .blog-tag {
      font-size: 0.7rem;
      padding: 0.18rem 0.6rem;
      background: var(--tag-bg);
      border-radius: 2px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .read-more {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .read-more i { font-size: 0.7rem; transition: transform 0.2s; }
    .blog-card:hover .read-more i { transform: translateX(4px); }

    /* ── LOADING / NO-RESULTS ───────────────────────── */
    .loading, .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
      background: var(--white);
    }

    .loading i { font-size: 1.5rem; margin-bottom: 0.8rem; animation: spin 1s linear infinite; }

    .no-results i { font-size: 2.5rem; margin-bottom: 1rem; color: var(--border); }
    .no-results h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .no-results p { font-size: 0.88rem; }

    /* ── PAGINATION ─────────────────────────────────── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.3rem;
      margin: 2rem 0 1rem;
    }

    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      gap: 0.3rem;
    }

    .page-btn:hover:not(:disabled):not(.active) {
      background: var(--off-white);
      border-color: #ccc;
      color: var(--text-primary);
    }

    .page-btn.active {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--white);
      font-weight: 600;
    }

    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .page-dots { color: var(--text-muted); font-size: 0.9rem; padding: 0 0.2rem; }

    /* ── KEYFRAMES ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .blog-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .sort-controls { margin-left: 0; }
      .blogs-section { padding: 0 1rem 4rem; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <!-- Masthead -->
  <div class="blogs-masthead">
    <div class="label">Publication</div>
    <h1>Blog Gallery</h1>
    <p class="subtitle">Discover inspiring articles, stories, and insights</p>
  </div>

  <!-- Main blogs section -->
  <section class="blogs-section">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search articles…">
      </div>

      <div class="category-filter">
        <select id="categorySelect">
          <option value="all">All Categories</option>
        </select>
        <i class="fas fa-chevron-down"></i>
      </div>

      <div class="sort-controls">
        <button class="sort-btn active" data-sort="latest"><i class="fas fa-clock"></i> Latest</button>
        <button class="sort-btn" data-sort="oldest"><i class="fas fa-calendar"></i> Oldest</button>
        <button class="sort-btn" data-sort="popular"><i class="fas fa-fire"></i> Popular</button>
      </div>
    </div>

    <!-- Tags Cloud -->
    <div class="tags-cloud" id="tagsCloud">
      <span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>
    </div>

    <!-- Results Info -->
    <div class="results-info">
      <span id="resultsCount">Loading articles…</span>
      <span class="clear-filters" id="clearFilters"><i class="fas fa-times"></i> Clear filters</span>
    </div>

    <!-- Blog Grid -->
    <div class="blog-grid" id="blogGrid">
      <div class="loading">
        <i class="fas fa-spinner"></i>
        <p>Loading articles…</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </section>

  <footer id="site-footer"></footer>
  <script src="assets/Scripts/gototop.js"></script>

<script>
(function () {
  const POSTS_PER_PAGE = 12;
  const POSTS_DIRECTORY = 'Posts/';

  let allPosts = [], filteredPosts = [];
  let currentPage = 1, currentSort = 'latest',
      currentCategory = 'all', currentTag = 'all', searchQuery = '';

  const blogGrid        = document.getElementById('blogGrid');
  const paginationDiv   = document.getElementById('pagination');
  const searchInput     = document.getElementById('searchInput');
  const categorySelect  = document.getElementById('categorySelect');
  const sortBtns        = document.querySelectorAll('.sort-btn');
  const tagsCloud       = document.getElementById('tagsCloud');
  const resultsCountSpan = document.getElementById('resultsCount');
  const clearFiltersBtn = document.getElementById('clearFilters');

  async function loadAllPosts() {
    try {
      const res = await fetch('posts-manifest.json');
      if (!res.ok) throw new Error('Manifest not found');
      const manifest = await res.json();
      if (!Array.isArray(manifest) || !manifest.length) return [];
      const posts = await Promise.all(manifest.map(fetchPostMetadata));
      return posts.filter(Boolean);
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  async function fetchPostMetadata(filename) {
    try {
      const res = await fetch(POSTS_DIRECTORY + filename);
      if (!res.ok) return null;
      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const getMeta = (n) => { const m = doc.querySelector(`meta[name="${n}"]`); return m ? m.getAttribute('content') : null; };
      const extractExcerpt = () => {
        const ex = getMeta('blog:excerpt');
        if (ex) return ex;
        const p = doc.querySelector('p');
        return p ? p.textContent.substring(0, 150) + '…' : 'Read this interesting article…';
      };
      const iconMap = { technology:'fa-microchip', lifestyle:'fa-heart', travel:'fa-plane', food:'fa-utensils', health:'fa-heartbeat', business:'fa-briefcase', design:'fa-pencil-ruler', science:'fa-flask', art:'fa-palette', legal:'fa-gavel', technical:'fa-gear', uncategorized:'fa-newspaper' };
      const category = getMeta('blog:category') || 'uncategorized';
      return {
        id: filename, filename, url: POSTS_DIRECTORY + filename,
        title: getMeta('blog:title') || filename.replace('.html','').replace(/%20/g,' '),
        excerpt: extractExcerpt(),
        category,
        tags: getMeta('blog:tags') ? getMeta('blog:tags').split(',').map(t=>t.trim()) : [],
        author: getMeta('blog:author') || 'Unknown',
        date: getMeta('blog:date') || new Date().toISOString().split('T')[0],
        readTime: parseInt(getMeta('blog:readTime')) || Math.floor(Math.random()*10)+3,
        views: parseInt(getMeta('blog:views')) || Math.floor(Math.random()*5000)+500,
        icon: getMeta('blog:icon') || iconMap[category] || 'fa-newspaper'
      };
    } catch (e) { return null; }
  }

  function getTagIcon(tag) {
    const icons = { 'ec act':'fa-gavel','confiscation':'fa-box','seizure':'fa-handcuffs','legal':'fa-scale-balanced','smart-meter':'fa-microchip','electricity':'fa-bolt','energy':'fa-solar-panel','technology':'fa-code','jute':'fa-leaf','textiles':'fa-shirt','sacking bags':'fa-box','foodgrains':'fa-wheat-awn','packaging':'fa-box-open','is standard':'fa-certificate' };
    const tl = tag.toLowerCase();
    for (const [k,v] of Object.entries(icons)) if (tl.includes(k)) return v;
    return 'fa-tag';
  }

  function updateFiltersFromPosts(posts) {
    const categories = ['all', ...new Set(posts.map(p=>p.category))];
    categorySelect.innerHTML = categories.map(c=>
      `<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`
    ).join('');

    const tagsToRemove = ['detention','commodities','section 6a','section-6a','innovation','sustainability','packaging','LDL','VLDL','CoQ10','excel-tips','excel-formulas','petroleum','density','productivity'];
    const tagCount = new Map();
    posts.forEach(p => p.tags.forEach(t => {
      if (!tagsToRemove.some(r => t.toLowerCase()===r.toLowerCase()||t.toLowerCase().includes(r.toLowerCase()))) {
        tagCount.set(t, (tagCount.get(t)||0)+1);
      }
    }));
    const sorted = Array.from(tagCount.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15);
    tagsCloud.innerHTML = `<span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>`
      + sorted.map(([t,c])=>`<span class="tag" data-tag="${t}"><i class="fas ${getTagIcon(t)}"></i> ${t} (${c})</span>`).join('');
    document.querySelectorAll('.tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
        tag.classList.add('active');
        currentTag = tag.dataset.tag;
        currentPage = 1;
        renderPosts();
      });
    });
  }

  function filterPosts() {
    let f = [...allPosts];
    if (currentCategory !== 'all') f = f.filter(p=>p.category===currentCategory);
    if (currentTag !== 'all') f = f.filter(p=>p.tags.includes(currentTag));
    if (searchQuery) { const q=searchQuery.toLowerCase(); f=f.filter(p=>p.title.toLowerCase().includes(q)||p.excerpt.toLowerCase().includes(q)||p.author.toLowerCase().includes(q)); }
    f.sort((a,b)=>{ if(currentSort==='latest') return new Date(b.date)-new Date(a.date); if(currentSort==='oldest') return new Date(a.date)-new Date(b.date); return b.views-a.views; });
    return f;
  }

  function formatDate(d) { return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }

  function renderPosts() {
    filteredPosts = filterPosts();
    const total = filteredPosts.length;
    const totalPages = Math.ceil(total/POSTS_PER_PAGE);
    if (currentPage > totalPages) currentPage = totalPages||1;
    const start = (currentPage-1)*POSTS_PER_PAGE;
    const end   = start+POSTS_PER_PAGE;
    const show  = filteredPosts.slice(start,end);

    resultsCountSpan.textContent = total===0 ? 'No articles found' : `Showing ${start+1}–${Math.min(end,total)} of ${total} articles`;

    if (!show.length) {
      blogGrid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h3>No articles found</h3><p>Try adjusting your filters or search query</p></div>`;
    } else {
      blogGrid.innerHTML = show.map(post => `
        <div class="blog-card" onclick="window.location.href='${post.url}'">
          <div class="blog-image" data-cat="${post.category}">
            <div class="icon-wrap"><i class="fas ${post.icon}"></i></div>
            <span class="blog-category-badge">${post.category}</span>
          </div>
          <div class="blog-content">
            <h3 class="blog-title">${post.title}</h3>
            <p class="blog-excerpt">${post.excerpt}</p>
            <div class="blog-meta">
              <span class="meta-item"><i class="fas fa-user"></i>${post.author}</span>
              <span class="meta-item"><i class="fas fa-calendar"></i>${formatDate(post.date)}</span>
              <span class="meta-item"><i class="fas fa-clock"></i>${post.readTime} min</span>
            </div>
            <div class="blog-tags">${post.tags.slice(0,3).map(t=>`<span class="blog-tag">${t}</span>`).join('')}</div>
            <div class="read-more">Read article <i class="fas fa-arrow-right"></i></div>
          </div>
        </div>
      `).join('');
    }
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    if (totalPages <= 1) { paginationDiv.innerHTML=''; return; }
    let html = `<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}"><i class="fas fa-chevron-left"></i> Prev</button>`;
    for (let i=1;i<=totalPages;i++) {
      if (i===1||i===totalPages||(i>=currentPage-2&&i<=currentPage+2)) html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      else if (i===currentPage-3||i===currentPage+3) html+=`<span class="page-dots">…</span>`;
    }
    html+=`<button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">Next <i class="fas fa-chevron-right"></i></button>`;
    paginationDiv.innerHTML = html;
    paginationDiv.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => { if(!btn.disabled){currentPage=parseInt(btn.dataset.page);renderPosts();window.scrollTo({top:0,behavior:'smooth'});} });
    });
  }

  searchInput.addEventListener('input', e=>{searchQuery=e.target.value;currentPage=1;renderPosts();});
  categorySelect.addEventListener('change', e=>{currentCategory=e.target.value;currentPage=1;renderPosts();});
  sortBtns.forEach(btn=>btn.addEventListener('click',()=>{sortBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=btn.dataset.sort;currentPage=1;renderPosts();}));
  clearFiltersBtn.addEventListener('click',()=>{searchInput.value='';categorySelect.value='all';document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));document.querySelector('.tag[data-tag="all"]').classList.add('active');searchQuery='';currentCategory='all';currentTag='all';currentPage=1;renderPosts();});

  async function init() {
    try {
      blogGrid.innerHTML='<div class="loading"><i class="fas fa-spinner"></i><p>Loading articles…</p></div>';
      allPosts = await loadAllPosts();
      if (!allPosts.length) {
        blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-file-alt"></i><h3>No posts found</h3><p>Add HTML files to the Posts/ folder and run the GitHub Action.</p></div>`;
        resultsCountSpan.textContent='0 articles';
        return;
      }
      updateFiltersFromPosts(allPosts);
      renderPosts();
    } catch(e) {
      console.error(e);
      blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-exclamation-triangle"></i><h3>Error loading posts</h3><p>Please refresh the page or try again later.</p></div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
