<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist · live from Google Sheets</title>
    <style>
        /* ALL STYLES ARE NAMESPACED UNDER .checklist-wrapper TO PREVENT CONFLICTS */
        .checklist-wrapper {
            --cl-primary: #1a3e5c;
            --cl-primary-dark: #0f2d44;
            --cl-secondary: #2c4b6e;
            --cl-light: #f0f5fa;
            --cl-border: #c5d5e8;
            --cl-success: #1e7e34;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            line-height: 1.5;
            color: #1d3f5e;
        }

        /* navigation */
        .checklist-wrapper .checklist-nav {
            background: white;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,20,30,0.08);
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid var(--cl-border);
        }

        .checklist-wrapper .checklist-nav label {
            font-weight: 600;
            color: var(--cl-primary);
            font-size: 1.1rem;
        }

        .checklist-wrapper .checklist-nav select {
            padding: 0.7rem 3rem 0.7rem 1.5rem;
            border: 2px solid var(--cl-primary);
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--cl-primary);
            background: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a3e5c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2rem;
            min-width: 280px;
        }

        .checklist-wrapper .checklist-badge {
            background: #e9eff7;
            color: var(--cl-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: auto;
        }

        /* main card */
        .checklist-wrapper .checklist-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,30,50,0.15);
            padding: 2rem;
            border: 1px solid var(--cl-border);
            margin-bottom: 2rem;
        }

        .checklist-wrapper .card-header {
            border-bottom: 4px solid var(--cl-primary);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .checklist-wrapper .header-title h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--cl-primary);
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .checklist-wrapper .station-name {
            font-size: 1.3rem;
            color: var(--cl-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .checklist-wrapper .verification-info {
            display: flex;
            gap: 2rem;
            color: #3e5f7e;
            font-size: 1rem;
            background: #eef4fa;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            display: inline-flex;
        }

        .checklist-wrapper .print-btn {
            background: var(--cl-primary);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(26,62,92,0.3);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .checklist-wrapper .print-btn:hover {
            background: var(--cl-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26,62,92,0.4);
        }

        /* sections */
        .checklist-wrapper .checklist-section {
            background: #f9fcff;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #d6e4f0;
        }

        .checklist-wrapper .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--cl-primary);
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 3px solid #b8cee8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .checklist-wrapper .section-title .badge {
            background: var(--cl-primary);
            color: white;
            font-size: 0.8rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
        }

        /* MULTI‑COLUMN LAYOUTS */
        .checklist-wrapper .grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem 2rem;
        }
        .checklist-wrapper .grid-3col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem 2rem;
        }
        .checklist-wrapper .grid-4col {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem 1.5rem;
        }

        /* items */
        .checklist-wrapper .info-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #b8cee8;
        }
        .checklist-wrapper .info-label {
            font-weight: 600;
            color: var(--cl-primary);
            min-width: 120px;
            font-size: 0.95rem;
        }
        .checklist-wrapper .info-value {
            color: #1d3f5e;
            font-size: 0.95rem;
            word-break: break-word;
            min-height: 1.2em;
        }
        .checklist-wrapper .info-value:empty::before {
            content: "—";
            color: #9aaec5;
            font-style: italic;
        }

        .checklist-wrapper .facility-item, 
        .checklist-wrapper .safety-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #a0b6ce;
        }
        .checklist-wrapper .facility-item span:first-child, 
        .checklist-wrapper .safety-item span:first-child {
            font-size: 0.95rem;
            color: #152b3b;
            flex: 1;
        }
        .checklist-wrapper .facility-status {
            background: var(--cl-primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            white-space: nowrap;
            text-transform: uppercase;
        }
        .checklist-wrapper .facility-status.available { background: var(--cl-success); }
        .checklist-wrapper .facility-status:empty::before {
            content: "—";
            color: #9aaec5;
        }

        /* recommendation */
        .checklist-wrapper .recommendation-box {
            background: linear-gradient(145deg, #e4edf7, #d2e2f2);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            border-left: 10px solid var(--cl-primary);
        }
        .checklist-wrapper .recommendation-item {
            text-align: center;
            min-width: 140px;
        }
        .checklist-wrapper .recommendation-label {
            font-size: 0.8rem;
            color: var(--cl-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }
        .checklist-wrapper .recommendation-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cl-primary);
        }

        /* officer signatures */
        .checklist-wrapper .officer-section {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 3rem;
            border-top: 3px dashed #a0bada;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .checklist-wrapper .officer-signature {
            text-align: center;
            min-width: 250px;
        }
        .checklist-wrapper .officer-title {
            font-weight: 700;
            color: var(--cl-primary);
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .checklist-wrapper .officer-line {
            width: 250px;
            height: 2px;
            border-bottom: 3px dotted var(--cl-primary);
            margin: 0.8rem auto;
        }
        .checklist-wrapper .officer-signature small { color: #3e5f7e; }

        /* loading / print */
        .checklist-wrapper .loading-state { 
            text-align: center; 
            padding: 4rem; 
            color: var(--cl-primary); 
        }
        
        @media print {
            .checklist-wrapper .checklist-nav, 
            .checklist-wrapper .print-btn, 
            .checklist-wrapper .checklist-badge {
                display: none !important;
            }
            .checklist-wrapper .checklist-card { 
                box-shadow: none; 
                border: none; 
                padding: 0; 
            }
            .checklist-wrapper .facility-status, 
            .checklist-wrapper .data-table th { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
        }
        
        @media (max-width: 700px) {
            .checklist-wrapper .grid-2col,
            .checklist-wrapper .grid-3col,
            .checklist-wrapper .grid-4col { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>
<!-- Your existing header -->
<div id="site-header" style="background: #1a3e5c; color: white; padding: 1rem;">
    <!-- your existing header content -->
</div>

<main>
    <div class="checklist-wrapper">
        <div class="checklist-nav">
            <label for="checklist-type">📋 Select Checklist:</label>
            <select id="checklist-type">
                <option value="hsd-renewal">⛽ HSD Renewal (hsd_data)</option>
                <option value="fps-checklist">🛒 FPS (fps_data)</option>
                <option value="ppc-checklist">🏭 PPC (ppc_data)</option>
                <option value="rice-mill">🌾 Rice Mill (rice_mill_data)</option>
                <option value="kerosene">🛢️ Kerosene Dealer</option>
                <option value="lpg">🔥 LPG Distributor</option>
            </select>
            <span class="checklist-badge" id="checklist-type-badge">HSD Renewal</span>
        </div>

        <div id="checklist-container"><div class="loading-state">⏳ Loading data from Google Sheet …</div></div>
    </div>
</main>

<div id="site-footer" style="background: #1e3a5f; color: #ccddee; padding: 1.5rem; margin-top: 2rem;">
    <!-- your existing footer content -->
</div>

<script>
    // ==========================================================================
    // CONFIGURATION
    // ==========================================================================
    const SHEET_CONFIG = {
        SPREADSHEET_ID: '2PACX-1vS7ik39OFKwscZJiFMgl2CNzRltAxK2sG6fIn-WniMGJ2rvQX1mFnzoerLz0lZOAsUMGeyFtyp0II4o',
        
        sheets: {
            'hsd-renewal': 'hsd_data',
            'fps-checklist': 'fps_data',
            'ppc-checklist': 'ppc_data',
            'rice-mill': 'rice_mill_data',
            'kerosene': 'kerosene_data',
            'lpg': 'lpg_data'
        }
    };

    // ==========================================================================
    // Helper: Parse CSV
    // ==========================================================================
    function csvToObjects(csvText) {
        const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
        if (lines.length === 0) return [];
        
        const headers = parseCSVLine(lines[0]);
        
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            const values = parseCSVLine(lines[i]);
            const obj = {};
            headers.forEach((h, idx) => {
                obj[h] = values[idx] || '';
            });
            rows.push(obj);
        }
        return rows;
    }

    function parseCSVLine(line) {
        const result = [];
        let inQuote = false;
        let currentValue = '';
        
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            
            if (char === '"') {
                inQuote = !inQuote;
            } else if (char === ',' && !inQuote) {
                result.push(currentValue);
                currentValue = '';
            } else {
                currentValue += char;
            }
        }
        result.push(currentValue);
        
        return result.map(val => val.trim());
    }

    // ==========================================================================
    // Fetch data from specific sheet - WITH ERROR HANDLING
    // ==========================================================================
    async function fetchSheetData(sheetName) {
        const spreadsheetId = SHEET_CONFIG.SPREADSHEET_ID;
        
        // Add cache buster
        const cacheBuster = new Date().getTime();
        const url = `https://docs.google.com/spreadsheets/d/e/${spreadsheetId}/pub?output=csv&sheet=${encodeURIComponent(sheetName)}&cb=${cacheBuster}`;
        
        console.log(`🔍 Fetching ${sheetName} from:`, url);
        
        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const csvText = await response.text();
            
            // Check if we got HTML instead of CSV
            if (csvText.trim().startsWith('<!DOCTYPE') || csvText.trim().startsWith('<html')) {
                throw new Error(`Sheet "${sheetName}" not found or not published as CSV`);
            }
            
            // Check if CSV has content beyond headers
            const rows = csvToObjects(csvText);
            if (rows.length === 0) {
                console.warn(`⚠️ Sheet "${sheetName}" is empty`);
            }
            
            return rows;
            
        } catch (error) {
            console.error(`❌ Error fetching ${sheetName}:`, error);
            throw error; // Re-throw to be handled by caller
        }
    }

    // ==========================================================================
    // Build checklist object from sheet rows
    // ==========================================================================
    function buildChecklistFromRows(rows, checklistType) {
        if (!rows || rows.length === 0) {
            return null;
        }

        const output = {
            metadata: {},
            sections: {}
        };

        // Process each row
        rows.forEach(row => {
            const section = (row.section || '').trim().toLowerCase();
            const key = (row.key || '').trim();
            const value = (row.value || '').trim();
            const validity = (row.validity || '').trim();
            
            if (!section || !key) return;

            if (section === 'metadata') {
                output.metadata[key] = value;
            } else {
                if (!output.sections[section]) {
                    output.sections[section] = {
                        items: []
                    };
                }
                
                output.sections[section].items.push({
                    key: key,
                    value: value,
                    validity: validity
                });
            }
        });

        return output;
    }

    // ==========================================================================
    // Renderer class
    // ==========================================================================
    class ChecklistRenderer {
        constructor() { 
            this.currentType = null; 
            this.data = null; 
        }

        loadChecklist(type, rows) {
            // Create new data object (completely separate from previous)
            const newData = buildChecklistFromRows(rows, type);
            
            // Update properties
            this.currentType = type;
            this.data = newData;
            
            const container = document.getElementById('checklist-container');
            const badge = document.getElementById('checklist-type-badge');
            const names = { 
                'hsd-renewal': 'HSD Renewal', 
                'fps-checklist': 'FPS', 
                'ppc-checklist': 'PPC', 
                'rice-mill': 'Rice Mill', 
                'kerosene': 'Kerosene', 
                'lpg': 'LPG' 
            };
            if (badge) badge.textContent = names[type] || type;

            if (!this.data) {
                container.innerHTML = `<div style="background:#ffeeee; padding:3rem; border-radius:32px; color:#a00; text-align:center;">
                    ⚠️ No data found in sheet <strong>${SHEET_CONFIG.sheets[type]}</strong>.<br>
                    Please add data with columns: section, key, value, validity
                </div>`;
                return;
            }
            
            this.render();
        }

        render() {
            const container = document.getElementById('checklist-container');
            
            // Build header
            const headerHtml = this.renderHeader();
            
            // Build sections
            let sectionsHtml = '';
            if (this.data.sections) {
                Object.keys(this.data.sections).forEach(section => {
                    sectionsHtml += this.renderSection(section, this.data.sections[section]);
                });
            }
            
            const html = `
                <div class="checklist-card">
                    ${headerHtml}
                    ${sectionsHtml}
                </div>
            `;
            
            container.innerHTML = html;
            document.getElementById('print-checklist-btn')?.addEventListener('click', ()=>window.print());
        }

        renderHeader() {
            const m = this.data.metadata || {};
            return `
                <div class="card-header">
                    <div class="header-title">
                        <h1>⛽ ${m.title || 'Checklist'}</h1>
                        <div class="station-name">${m.stationName || ''}</div>
                        <div class="verification-info">
                            <span>📅 ${m.verificationDate || ''}</span>
                            <span>⏰ ${m.verificationTime || ''}</span>
                            <span>👤 ${m.verifyingOfficer || ''}</span>
                        </div>
                    </div>
                    <button class="print-btn" id="print-checklist-btn">📋 PRINT</button>
                </div>
            `;
        }

        renderSection(sectionName, sectionData) {
            if (!sectionData.items || sectionData.items.length === 0) return '';
            
            // Format section title
            const displayTitle = sectionName.split(/[-_\s]+/)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
            
            // Choose grid columns
            let gridClass = 'grid-2col';
            if (sectionData.items.length > 8) {
                gridClass = 'grid-3col';
            }
            if (sectionData.items.length > 15) {
                gridClass = 'grid-4col';
            }
            
            // Check if this looks like a status section
            const hasStatusItems = sectionData.items.some(item => 
                item.value.toLowerCase().includes('available') || 
                item.value.toLowerCase().includes('yes') ||
                item.value.match(/^\d+/)
            );
            
            let itemsHtml = '';
            if (hasStatusItems) {
                itemsHtml = sectionData.items.map(item => `
                    <div class="facility-item">
                        <span>${item.key}</span>
                        <span class="facility-status ${item.value.toLowerCase().includes('avail') ? 'available' : ''}">${item.value || '—'}</span>
                    </div>
                `).join('');
            } else {
                itemsHtml = sectionData.items.map(item => `
                    <div class="info-item">
                        <span class="info-label">${item.key}</span>
                        <span class="info-value">${item.value || ''}${item.validity ? ' (valid: ' + item.validity + ')' : ''}</span>
                    </div>
                `).join('');
            }
            
            return `
                <div class="checklist-section">
                    <div class="section-title">📋 ${displayTitle}</div>
                    <div class="${gridClass}">${itemsHtml}</div>
                </div>
            `;
        }
    }

    // ==========================================================================
    // MAIN: Initialize with proper state management
    // ==========================================================================
    document.addEventListener('DOMContentLoaded', () => {
        const select = document.getElementById('checklist-type');
        const container = document.getElementById('checklist-container');
        let renderer = null;

        async function loadChecklistForType(type) {
            // CRITICAL: Create a NEW renderer instance each time
            // This completely breaks any reference to old data
            renderer = new ChecklistRenderer();
            
            // Show loading state
            container.innerHTML = '<div class="loading-state">⏳ Loading data from sheet...</div>';
            
            try {
                const sheetName = SHEET_CONFIG.sheets[type];
                if (!sheetName) {
                    throw new Error(`No sheet configured for type: ${type}`);
                }
                
                console.log(`🔄 Loading ${sheetName} for ${type}...`);
                const rows = await fetchSheetData(sheetName);
                console.log(`✅ Loaded ${rows.length} rows from ${sheetName}`);
                
                if (rows.length === 0) {
                    container.innerHTML = `<div style="background:#fff3e0; padding:2rem; border-radius:32px; color:#a00; text-align:center;">
                        ⚠️ Sheet <strong>${sheetName}</strong> is empty.<br>
                        Please add data with columns: section, key, value, validity
                    </div>`;
                    return;
                }
                
                // Load the data into the NEW renderer
                renderer.loadChecklist(type, rows);
                
                // Update URL
                history.pushState({ type, timestamp: Date.now() }, '', `?type=${type}`);
                
            } catch (error) {
                console.error(`❌ Error loading ${type}:`, error);
                
                // Show specific error message based on error type
                let errorMessage = error.message;
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Network error - please check your internet connection';
                } else if (error.message.includes('404')) {
                    errorMessage = `Sheet "${SHEET_CONFIG.sheets[type]}" not found. Please create this sheet.`;
                }
                
                container.innerHTML = `<div style="background:#fff0f0; padding:2rem; border-radius:32px; color:#b33; text-align:center;">
                    ❌ Error loading <strong>${SHEET_CONFIG.sheets[type]}</strong><br>
                    ${errorMessage}<br>
                    <small>Make sure the sheet exists and is published (File → Share → Publish to web)</small>
                </div>`;
            }
        }

        // Get type from URL or default
        const urlParams = new URLSearchParams(window.location.search);
        const initialType = urlParams.get('type') || 'hsd-renewal';
        if (select) select.value = initialType;

        // Load initial checklist
        loadChecklistForType(initialType);

        // Handle selection change - ALWAYS create new instance
        select.addEventListener('change', (e) => {
            const newType = e.target.value;
            console.log(`🔄 Selection changed to: ${newType}`);
            loadChecklistForType(newType);
        });

        // Handle browser back/forward
        window.addEventListener('popstate', (e) => {
            if (e.state?.type) {
                console.log(`🔄 Popstate to: ${e.state.type}`);
                if (select) select.value = e.state.type;
                loadChecklistForType(e.state.type);
            }
        });
    });
</script>
</body>
</html>
