<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Article Gallery</title>
  
  <!-- Common CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Site components -->
  <script src="assets/Scripts/site-components.js" defer></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --paper: #faf8f3;
      --cream: #f2ede3;
      --accent: #c8522a;
      --accent2: #2a6cc8;
      --muted: #8a8070;
      --border: #ddd8cc;
      --card-bg: #ffffff;
      --shadow: 0 2px 24px rgba(15,14,12,0.07);
      --shadow-hover: 0 12px 48px rgba(15,14,12,0.13);
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Blogs Section Wrapper ── */
    .blogs-section {
      display: block;
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
      min-height: 100vh;
    }

    /* ── Hero Header ── */
    .blogs-section .page-hero {
      position: relative;
      text-align: center;
      padding: 3.5rem 1rem 3rem;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .blogs-section .page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(200,82,42,0.07) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
      z-index: 0;
      opacity: 0.5;
    }

    .blogs-section .hero-eyebrow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,82,42,0.08);
      border: 1px solid rgba(200,82,42,0.2);
      padding: 0.35rem 1rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
    }

    .blogs-section h1 {
      position: relative;
      z-index: 1;
      font-family: 'Fraunces', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .blogs-section h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
    }

    .blogs-section .subtitle {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ── Filter Bar ── */
    .blogs-section .filter-bar {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .blogs-section .search-box {
      flex: 2;
      min-width: 240px;
      position: relative;
    }

    .blogs-section .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
    }

    .blogs-section .search-box input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
    }

    .blogs-section .search-box input::placeholder { color: var(--muted); }

    .blogs-section .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    .blogs-section .filter-controls {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      justify-content: flex-end;
    }

    .blogs-section .category-filter {
      position: relative;
      min-width: 170px;
    }

    .blogs-section .category-filter select {
      width: 100%;
      padding: 0.75rem 2.2rem 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      cursor: pointer;
      appearance: none;
      transition: border-color 0.2s;
    }

    .blogs-section .category-filter select:focus { outline: none; border-color: var(--accent); }

    .blogs-section .category-filter i {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.75rem;
    }

    .blogs-section .sort-controls {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      background: var(--cream);
    }

    .blogs-section .sort-btn {
      padding: 0.6rem 1.1rem;
      border: none;
      border-right: 1.5px solid var(--border);
      background: transparent;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      letter-spacing: 0.02em;
    }

    .blogs-section .sort-btn:last-child { border-right: none; }

    .blogs-section .sort-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .blogs-section .sort-btn:hover:not(.active) {
      background: var(--border);
      color: var(--ink);
    }

    /* ── Tags Cloud ── */
    .blogs-section .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.8rem;
      min-height: 48px;
    }

    .blogs-section .tag {
      padding: 0.38rem 0.9rem;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .blogs-section .tag i {
      margin-right: 0.3rem;
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .blogs-section .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,82,42,0.05);
    }

    .blogs-section .tag.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
    }

    /* ── Results Info ── */
    .blogs-section .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--ink);
    }

    .blogs-section #resultsCount {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ink);
    }

    .blogs-section .clear-filters {
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid rgba(200,82,42,0.3);
      border-radius: 2px;
      background: transparent;
      transition: all 0.2s;
    }

    .blogs-section .clear-filters:hover {
      background: rgba(200,82,42,0.08);
    }

    /* ── Loading ── */
    .blogs-section .loading {
      text-align: center;
      padding: 5rem 3rem;
      color: var(--muted);
      grid-column: 1/-1;
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
    }

    .blogs-section .loading i {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      display: block;
      color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── Blog Grid ── */
    .blogs-section .blog-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin: 0 0 3rem;
    }

    /* ── Blog Card ── */
    .blogs-section .blog-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.28s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.28s ease;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      animation: riseIn 0.5s ease forwards;
      opacity: 0;
    }

    .blogs-section .blog-card:nth-child(1)  { animation-delay: 0.05s; }
    .blogs-section .blog-card:nth-child(2)  { animation-delay: 0.10s; }
    .blogs-section .blog-card:nth-child(3)  { animation-delay: 0.15s; }
    .blogs-section .blog-card:nth-child(4)  { animation-delay: 0.20s; }
    .blogs-section .blog-card:nth-child(5)  { animation-delay: 0.25s; }
    .blogs-section .blog-card:nth-child(6)  { animation-delay: 0.30s; }
    .blogs-section .blog-card:nth-child(7)  { animation-delay: 0.35s; }
    .blogs-section .blog-card:nth-child(8)  { animation-delay: 0.40s; }
    .blogs-section .blog-card:nth-child(9)  { animation-delay: 0.45s; }
    .blogs-section .blog-card:nth-child(10) { animation-delay: 0.50s; }
    .blogs-section .blog-card:nth-child(11) { animation-delay: 0.55s; }
    .blogs-section .blog-card:nth-child(12) { animation-delay: 0.60s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .blogs-section .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    /* Card accent top strip */
    .blogs-section .blog-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: 3;
    }

    .blogs-section .blog-card:hover::before { transform: scaleX(1); }

    /* ── Blog Image Area ── */
    .blogs-section .blog-image {
      height: 150px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .blogs-section .blog-card:nth-child(4n+1) .blog-image { background: linear-gradient(135deg, #1a1a2e 0%, #c8522a 100%); }
    .blogs-section .blog-card:nth-child(4n+2) .blog-image { background: linear-gradient(135deg, #0f2027 0%, #2a6cc8 100%); }
    .blogs-section .blog-card:nth-child(4n+3) .blog-image { background: linear-gradient(135deg, #1b2838 0%, #2a8c5c 100%); }
    .blogs-section .blog-card:nth-child(4n+4) .blog-image { background: linear-gradient(135deg, #2d1b4e 0%, #c8522a 80%); }

    .blogs-section .blog-image-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: cover;
      mix-blend-mode: overlay;
      opacity: 0.4;
    }

    .blogs-section .blog-image .icon-wrap {
      position: relative;
      z-index: 1;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
    }

    .blogs-section .blog-category {
      position: absolute;
      bottom: 0.8rem;
      left: 0.9rem;
      z-index: 2;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 0.2rem 0.65rem;
      border-radius: 2px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }

    /* ── Blog Content ── */
    .blogs-section .blog-content {
      padding: 1.3rem 1.4rem 1.4rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .blogs-section .blog-title {
      font-family: 'Fraunces', serif;
      font-size: 1.08rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .blogs-section .blog-excerpt {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      flex-grow: 1;
    }

    .blogs-section .blog-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px dashed var(--border);
    }

    .blogs-section .blog-meta i { margin-right: 0.3rem; opacity: 0.7; }

    .blogs-section .blog-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .blogs-section .blog-tag {
      font-size: 0.67rem;
      font-weight: 500;
      padding: 0.18rem 0.55rem;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .blogs-section .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: auto;
      padding-top: 0.3rem;
    }

    .blogs-section .read-more i {
      font-size: 0.7rem;
      transition: transform 0.2s ease;
    }

    .blogs-section .blog-card:hover .read-more i { transform: translateX(5px); }

    /* ── Pagination ── */
    .blogs-section .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      margin: 2rem 0;
    }

    .blogs-section .page-btn {
      min-width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.75rem;
      border-radius: 3px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .blogs-section .page-btn:hover:not(.active):not([disabled]) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .blogs-section .page-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
      font-weight: 600;
    }

    .blogs-section .page-btn[disabled] {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .blogs-section .page-btn.next-prev { padding: 0 1.1rem; }

    .blogs-section .page-dots {
      color: var(--muted);
      padding: 0 0.2rem;
      font-size: 0.9rem;
    }

    /* ── No Results ── */
    .blogs-section .no-results {
      text-align: center;
      padding: 5rem 3rem;
      background: var(--card-bg);
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--muted);
      grid-column: 1/-1;
    }

    .blogs-section .no-results i {
      font-size: 2.5rem;
      margin-bottom: 1.2rem;
      display: block;
      opacity: 0.3;
    }

    .blogs-section .no-results h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    /* ── Responsive ── */
    @media (max-width: 1200px) {
      .blogs-section .blog-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      .blogs-section .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .blogs-section { padding: 1.5rem 1rem 3rem; }
      .blogs-section .blog-grid { grid-template-columns: 1fr; }
      .blogs-section .filter-bar { flex-direction: column; }
      .blogs-section .filter-controls { width: 100%; justify-content: flex-start; }
      .blogs-section h1 { font-size: 2.4rem; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <!-- Main blogs section -->
  <section class="blogs-section">

    <!-- Hero -->
    <div class="page-hero">
      <div class="hero-eyebrow"><i class="fas fa-book-open"></i> Knowledge Hub</div>
      <h1>Article <em>Gallery</em></h1>
      <p class="subtitle">Discover inspiring articles, stories, and insights</p>
    </div>

    <!-- Search and Filter Bar -->
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search articles by title or content...">
      </div>
      
      <div class="filter-controls">
        <div class="category-filter">
          <select id="categorySelect">
            <option value="all">All Categories</option>
            <!-- Categories will be populated dynamically -->
          </select>
          <i class="fas fa-chevron-down"></i>
        </div>

        <div class="sort-controls">
          <button class="sort-btn active" data-sort="latest"><i class="fas fa-clock"></i> Latest</button>
          <button class="sort-btn" data-sort="oldest"><i class="fas fa-calendar"></i> Oldest</button>
          <button class="sort-btn" data-sort="popular"><i class="fas fa-fire"></i> Popular</button>
        </div>
      </div>
    </div>

    <!-- Tags Cloud - Dynamic -->
    <div class="tags-cloud" id="tagsCloud">
      <span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>
      <!-- Tags will be populated dynamically -->
    </div>

    <!-- Results Info -->
    <div class="results-info">
      <span id="resultsCount">Loading articles...</span>
      <span class="clear-filters" id="clearFilters"><i class="fas fa-times"></i> Clear filters</span>
    </div>

    <!-- Blog Grid -->
    <div class="blog-grid" id="blogGrid">
      <div class="loading">
        <i class="fas fa-spinner"></i>
        <p>Loading articles...</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </section>

  <footer id="site-footer"></footer>

  <!-- Go to Top -->
  <script src="assets/Scripts/gototop.js"></script>

<script>
(function() {
  // Configuration
  const POSTS_PER_PAGE = 12; // 4x3 grid
  const POSTS_DIRECTORY = 'Posts/';
  
  // State management
  let allPosts = [];
  let filteredPosts = [];
  let currentPage = 1;
  let currentSort = 'latest';
  let currentCategory = 'all';
  let currentTag = 'all';
  let searchQuery = '';
  
  // DOM elements
  const blogGrid = document.getElementById('blogGrid');
  const paginationDiv = document.getElementById('pagination');
  const searchInput = document.getElementById('searchInput');
  const categorySelect = document.getElementById('categorySelect');
  const sortBtns = document.querySelectorAll('.sort-btn');
  const tagsCloud = document.getElementById('tagsCloud');
  const resultsCountSpan = document.getElementById('resultsCount');
  const clearFiltersBtn = document.getElementById('clearFilters');

  // =============================================
  // LOAD POSTS FROM MANIFEST (Generated by GitHub Action)
  // =============================================
  async function loadAllPosts() {
    try {
      // Fetch the manifest file (auto-generated by GitHub Action)
      const manifestResponse = await fetch('posts-manifest.json');
      
      if (!manifestResponse.ok) {
        throw new Error('posts-manifest.json not found - waiting for first GitHub Action run');
      }
      
      const manifest = await manifestResponse.json();
      
      if (!Array.isArray(manifest) || manifest.length === 0) {
        console.log('Manifest is empty');
        return [];
      }
      
      console.log('📋 Found posts in manifest:', manifest);
      
      // Load metadata for each post
      const posts = await Promise.all(
        manifest.map(filename => fetchPostMetadata(filename))
      );
      
      // Filter out any failed loads
      const validPosts = posts.filter(post => post !== null);
      
      console.log(`✅ Loaded ${validPosts.length} posts successfully`);
      return validPosts;
      
    } catch (error) {
      console.error('Failed to load manifest:', error);
      return [];
    }
  }

  // Fetch individual post metadata
  async function fetchPostMetadata(filename) {
    try {
      const response = await fetch(POSTS_DIRECTORY + filename);
      if (!response.ok) return null;
      
      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      // Extract meta tags
      const getMeta = (name) => {
        const meta = doc.querySelector(`meta[name="${name}"]`);
        return meta ? meta.getAttribute('content') : null;
      };
      
      // Generate excerpt from content if not provided
      const extractExcerpt = () => {
        const excerpt = getMeta('blog:excerpt');
        if (excerpt) return excerpt;
        
        const firstP = doc.querySelector('p');
        if (firstP) {
          return firstP.textContent.substring(0, 150) + '...';
        }
        return 'Read this interesting article...';
      };
      
      // Get icon based on category
      const getIcon = (category) => {
        const icons = {
          technology: 'fa-microchip',
          lifestyle: 'fa-heart',
          travel: 'fa-plane',
          food: 'fa-utensils',
          health: 'fa-heartbeat',
          business: 'fa-briefcase',
          design: 'fa-pencil-ruler',
          science: 'fa-flask',
          art: 'fa-palette',
          legal: 'fa-gavel',
          technical: 'fa-gear',
          uncategorized: 'fa-newspaper'
        };
        return icons[category] || 'fa-newspaper';
      };
      
      const title = getMeta('blog:title') || filename.replace('.html', '').replace(/%20/g, ' ');
      const category = getMeta('blog:category') || 'uncategorized';
      const tags = getMeta('blog:tags') ? getMeta('blog:tags').split(',').map(t => t.trim()) : [];
      const author = getMeta('blog:author') || 'Unknown';
      const date = getMeta('blog:date') || new Date().toISOString().split('T')[0];
      const readTime = parseInt(getMeta('blog:readTime')) || Math.floor(Math.random() * 10) + 3;
      const views = parseInt(getMeta('blog:views')) || Math.floor(Math.random() * 5000) + 500;
      const icon = getMeta('blog:icon') || getIcon(category);
      
      return {
        id: filename,
        filename: filename,
        title: title,
        excerpt: extractExcerpt(),
        category: category,
        tags: tags,
        author: author,
        date: date,
        readTime: readTime,
        views: views,
        icon: icon,
        url: POSTS_DIRECTORY + filename
      };
      
    } catch (error) {
      console.error(`Error fetching ${filename}:`, error);
      return null;
    }
  }

  // Helper function to get tag icons
  function getTagIcon(tag) {
    const icons = {
      'ec act': 'fa-gavel',
      'ec act 1955': 'fa-gavel',
      'confiscation': 'fa-box',
      'seizure': 'fa-handcuffs',
      'legal': 'fa-scale-balanced',
      'smart-meter': 'fa-microchip',
      'electricity': 'fa-bolt',
      'energy': 'fa-solar-panel',
      'technology': 'fa-code',
      'genus-power': 'fa-building',
      'jute': 'fa-leaf',
      'textiles': 'fa-tshirt',
      'sacking bags': 'fa-box',
      'foodgrains': 'fa-wheat',
      'packaging': 'fa-box-open',
      'is standard': 'fa-certificate',
      'is 9113': 'fa-certificate'
    };
    
    const tagLower = tag.toLowerCase();
    for (const [key, icon] of Object.entries(icons)) {
      if (tagLower.includes(key)) {
        return icon;
      }
    }
    return 'fa-tag';
  }

  // Update filters from posts
  function updateFiltersFromPosts(posts) {
    // Extract unique categories
    const categories = ['all', ...new Set(posts.map(p => p.category))];
    
    // Update category select
    categorySelect.innerHTML = categories.map(cat => 
      `<option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>`
    ).join('');
    
    // ===== TAGS TO REMOVE =====
    // Add any tags you want to hide from the cloud
    const tagsToRemove = [
      'detention',           // Similar to seizure
      'commodities',         // Too broad
      'section 6a',         // Too specific
      'section-6a',         // With hyphen
      'innovation',         // Generic
      'sustainability',     // Generic buzzword
      'packaging' ,          // Remove if too generic
        'LDL',
      'VLDL',
    ' CoQ10',
      'excel-tips',
      ' excel-formulas',
      ' petroleum',
      ' density',
      ' productivity'
    ];
    
    // Extract and count unique tags - WITH FILTERING
    const tagCount = new Map();
    
    posts.forEach(post => {
      post.tags.forEach(tag => {
        // Skip tags in the remove list (case insensitive)
        const shouldRemove = tagsToRemove.some(removeTag => 
          tag.toLowerCase() === removeTag.toLowerCase() ||
          tag.toLowerCase().includes(removeTag.toLowerCase())
        );
        
        if (!shouldRemove) {
          tagCount.set(tag, (tagCount.get(tag) || 0) + 1);
        }
      });
    });
    
    // Sort tags by frequency and take top 15
    const sortedTags = Array.from(tagCount.entries())
      .sort((a, b) => b[1] - a[1])
      .slice(0, 15); // Show only top 15 tags
    
    // Update tags cloud with icons
    tagsCloud.innerHTML = `
      <span class="tag active" data-tag="all"><i class="fas fa-tag"></i> All</span>
      ${sortedTags.map(([tag, count]) => `
        <span class="tag" data-tag="${tag}">
          <i class="fas ${getTagIcon(tag)}"></i> ${tag} (${count})
        </span>
      `).join('')}
    `;
    
    // Reattach tag click handlers
    document.querySelectorAll('.tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentTag = tag.dataset.tag;
        currentPage = 1;
        filterAndRenderPosts();
      });
    });
  }

  // Filter posts
  function filterPosts() {
    let filtered = [...allPosts];

    if (currentCategory !== 'all') {
      filtered = filtered.filter(post => post.category === currentCategory);
    }

    if (currentTag !== 'all') {
      filtered = filtered.filter(post => post.tags.includes(currentTag));
    }

    if (searchQuery) {
      const query = searchQuery.toLowerCase();
      filtered = filtered.filter(post => 
        post.title.toLowerCase().includes(query) || 
        post.excerpt.toLowerCase().includes(query) ||
        post.author.toLowerCase().includes(query)
      );
    }

    filtered.sort((a, b) => {
      switch(currentSort) {
        case 'latest':
          return new Date(b.date) - new Date(a.date);
        case 'oldest':
          return new Date(a.date) - new Date(b.date);
        case 'popular':
          return b.views - a.views;
        default:
          return 0;
      }
    });

    return filtered;
  }

  // Render posts
  function renderPosts() {
    filteredPosts = filterPosts();
    const totalPosts = filteredPosts.length;
    const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
    
    if (currentPage > totalPages) currentPage = totalPages || 1;
    
    const start = (currentPage - 1) * POSTS_PER_PAGE;
    const end = start + POSTS_PER_PAGE;
    const postsToShow = filteredPosts.slice(start, end);

    if (totalPosts === 0) {
      resultsCountSpan.textContent = 'No articles found';
    } else {
      const startCount = start + 1;
      const endCount = Math.min(end, totalPosts);
      resultsCountSpan.textContent = `Showing ${startCount}–${endCount} of ${totalPosts} articles`;
    }

    if (postsToShow.length === 0) {
      blogGrid.innerHTML = `
        <div class="no-results">
          <i class="fas fa-search"></i>
          <h3>No articles found</h3>
          <p>Try adjusting your filters or search query</p>
        </div>
      `;
    } else {
      blogGrid.innerHTML = postsToShow.map(post => `
        <div class="blog-card" onclick="window.location.href='${post.url}'">
          <div class="blog-image">
            <div class="blog-image-noise"></div>
            <div class="icon-wrap">
              <i class="fas ${post.icon}"></i>
            </div>
            <span class="blog-category">${post.category}</span>
          </div>
          <div class="blog-content">
            <h3 class="blog-title">${post.title}</h3>
            <p class="blog-excerpt">${post.excerpt}</p>
            <div class="blog-meta">
              <span><i class="fas fa-user"></i> ${post.author}</span>
              <span><i class="fas fa-calendar"></i> ${formatDate(post.date)}</span>
            </div>
            <div class="blog-tags">
              ${post.tags.slice(0, 3).map(tag => `<span class="blog-tag">${tag}</span>`).join('')}
            </div>
            <div class="read-more">
              Read article <i class="fas fa-arrow-right"></i>
            </div>
          </div>
        </div>
      `).join('');
    }

    renderPagination(totalPages);
  }

  // Format date
  function formatDate(dateString) {
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    return new Date(dateString).toLocaleDateString('en-US', options);
  }

  // Render pagination
  function renderPagination(totalPages) {
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      return;
    }

    let paginationHTML = '';
    
    paginationHTML += `
      <button class="page-btn next-prev" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">
        <i class="fas fa-chevron-left"></i> Prev
      </button>
    `;

    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
        paginationHTML += `
          <button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">
            ${i}
          </button>
        `;
      } else if (i === currentPage - 3 || i === currentPage + 3) {
        paginationHTML += `<span class="page-dots">...</span>`;
      }
    }

    paginationHTML += `
      <button class="page-btn next-prev" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">
        Next <i class="fas fa-chevron-right"></i>
      </button>
    `;

    paginationDiv.innerHTML = paginationHTML;

    document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (!btn.disabled) {
          const page = parseInt(btn.dataset.page);
          if (!isNaN(page)) {
            currentPage = page;
            renderPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        }
      });
    });
  }

  // Filter and render wrapper
  function filterAndRenderPosts() {
    renderPosts();
  }

  // Event listeners
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    currentPage = 1;
    filterAndRenderPosts();
  });

  categorySelect.addEventListener('change', (e) => {
    currentCategory = e.target.value;
    currentPage = 1;
    filterAndRenderPosts();
  });

  sortBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      sortBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      currentPage = 1;
      filterAndRenderPosts();
    });
  });

  clearFiltersBtn.addEventListener('click', () => {
    searchInput.value = '';
    categorySelect.value = 'all';
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    document.querySelector('.tag[data-tag="all"]').classList.add('active');
    searchQuery = '';
    currentCategory = 'all';
    currentTag = 'all';
    currentPage = 1;
    filterAndRenderPosts();
  });

  // Initialize
  async function init() {
    try {
      blogGrid.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Loading articles...</p></div>';
      
      allPosts = await loadAllPosts();
      
      if (allPosts.length === 0) {
        blogGrid.innerHTML = `
          <div class="no-results">
            <i class="fas fa-file-alt"></i>
            <h3>No posts found</h3>
            <p>Add HTML files to the Posts/ folder. The GitHub Action will auto-generate the manifest.</p>
          </div>
        `;
        resultsCountSpan.textContent = '0 articles';
        return;
      }
      
      updateFiltersFromPosts(allPosts);
      filterAndRenderPosts();
      
    } catch (error) {
      console.error('Initialization error:', error);
      blogGrid.innerHTML = `
        <div class="no-results">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Error loading posts</h3>
          <p>Please refresh the page or try again later</p>
        </div>
      `;
    }
  }

  init();
})();
</script>
</body>
</html>
