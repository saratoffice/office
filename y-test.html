<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chronos | The Article Gallery</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Google Fonts: elegant serif + modern sans -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-ivory: #fefaf5;
      --bg-pure: #ffffff;
      --charcoal: #1f1f1f;
      --stone: #4b4b4b;
      --pewter: #6f6f6f;
      --gold-primary: #c68e3a;
      --gold-deep: #a5712a;
      --gold-soft: #e9d6b0;
      --gold-mist: #fbf5e8;
      --border-light: #ede6db;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
      --shadow-lift: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
      --shadow-hover: 0 32px 48px -20px rgba(0, 0, 0, 0.18), 0 6px 14px rgba(0, 0, 0, 0.05);
      --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --radius-card: 20px;
      --radius-element: 12px;
    }

    body {
      background: var(--bg-ivory);
      font-family: 'Inter', sans-serif;
      color: var(--stone);
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* ========= MASTHEAD ========= */
    .hero-gallery {
      background: linear-gradient(135deg, #1e1b18 0%, #1b1815 100%);
      position: relative;
      isolation: isolate;
      border-bottom: 1px solid rgba(198, 142, 58, 0.25);
    }

    .hero-gallery::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 40%, rgba(198, 142, 58, 0.05) 2%, transparent 2.5%),
                        radial-gradient(circle at 80% 70%, rgba(198, 142, 58, 0.04) 1.5%, transparent 2%);
      background-size: 42px 42px, 32px 32px;
      pointer-events: none;
    }

    .hero-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2.5rem 3.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .hero-text {
      flex: 2;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.2rem;
    }

    .eyebrow-line {
      width: 44px;
      height: 2px;
      background: var(--gold-primary);
    }

    .eyebrow span {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 500;
      color: rgba(255, 245, 220, 0.75);
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
    }

    .hero-text h1 .gold-ink {
      color: var(--gold-primary);
      font-style: italic;
      font-weight: 700;
    }

    .hero-desc {
      font-size: 1rem;
      color: rgba(255, 250, 240, 0.65);
      max-width: 520px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-stat {
      text-align: right;
      background: rgba(255, 255, 245, 0.03);
      backdrop-filter: blur(2px);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      border: 0.5px solid rgba(198, 142, 58, 0.3);
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--gold-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 245, 220, 0.6);
      font-weight: 500;
    }

    /* ========= MAIN SECTION ========= */
    .gallery-section {
      max-width: 1400px;
      margin: 2.5rem auto 5rem;
      padding: 0 2rem;
    }

    /* Filter bar — refined */
    .filter-panel {
      background: var(--bg-pure);
      border-radius: 28px;
      padding: 0.9rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .search-wrapper {
      flex: 2;
      min-width: 200px;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-primary);
      font-size: 0.9rem;
    }

    .search-wrapper input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      border: 1px solid var(--border-light);
      border-radius: 60px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      background: var(--bg-ivory);
      transition: all 0.2s;
      color: var(--charcoal);
    }

    .search-wrapper input:focus {
      outline: none;
      border-color: var(--gold-primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(198, 142, 58, 0.15);
    }

    .filter-select {
      background: var(--bg-ivory);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      padding: 0.7rem 2rem 0.7rem 1.2rem;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--charcoal);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23c68e3a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 1rem center;
    }

    .sort-group {
      display: flex;
      gap: 0.5rem;
      background: var(--bg-ivory);
      padding: 0.2rem;
      border-radius: 60px;
      border: 1px solid var(--border-light);
    }

    .sort-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--pewter);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-btn i {
      font-size: 0.7rem;
    }

    .sort-btn.active {
      background: var(--charcoal);
      color: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* tags cloud — modern */
    .tag-rail {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      padding: 0.6rem 0;
    }

    .tag-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-right: 0.2rem;
    }

    .tag-pill {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--stone);
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .tag-pill i {
      margin-right: 6px;
      font-size: 0.7rem;
      color: var(--gold-primary);
    }

    .tag-pill:hover {
      background: var(--gold-mist);
      border-color: var(--gold-primary);
      color: var(--charcoal);
    }

    .tag-pill.active {
      background: var(--charcoal);
      border-color: var(--charcoal);
      color: white;
    }

    .tag-pill.active i {
      color: var(--gold-soft);
    }

    /* results header */
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 0.8rem;
    }

    .result-count {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--pewter);
    }

    .result-count strong {
      color: var(--charcoal);
      font-weight: 700;
    }

    .clear-filters {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gold-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }

    .clear-filters:hover {
      color: var(--charcoal);
    }

    /* dynamic grid */
    .grid-articles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    /* article card — refined */
    .article-card {
      background: var(--bg-pure);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: var(--transition-smooth);
      cursor: pointer;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      animation: fadeSlideUp 0.5s ease-out backwards;
    }

    .article-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--gold-soft);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* category header with gradient background */
    .card-media {
      height: 180px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
    }

    /* dynamic category gradients */
    .card-media[data-cat="technology"] { background: linear-gradient(125deg, #071e36, #133e6f); }
    .card-media[data-cat="legal"] { background: linear-gradient(125deg, #221035, #412c6b); }
    .card-media[data-cat="science"] { background: linear-gradient(125deg, #0b2f1e, #1f6e43); }
    .card-media[data-cat="business"] { background: linear-gradient(125deg, #332011, #7a4b1a); }
    .card-media[data-cat="health"] { background: linear-gradient(125deg, #37121f, #6d2a3c); }
    .card-media[data-cat="design"] { background: linear-gradient(125deg, #103c3c, #1f6e6e); }
    .card-media[data-cat="uncategorized"] { background: linear-gradient(125deg, #2a2a2a, #4a4a4a); }

    .icon-circle {
      width: 68px;
      height: 68px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(198, 142, 58, 0.7);
      font-size: 1.7rem;
      color: var(--gold-soft);
    }

    .cat-badge {
      position: absolute;
      top: 16px;
      right: 18px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f3e3c2;
      border-left: 2px solid var(--gold-primary);
    }

    .card-content {
      padding: 1.4rem 1.5rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--charcoal);
      margin-bottom: 0.65rem;
    }

    .article-excerpt {
      font-size: 0.8rem;
      color: var(--pewter);
      line-height: 1.65;
      margin-bottom: 1.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.8rem 0;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 1rem;
    }

    .meta-strip span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-strip i {
      color: var(--gold-primary);
      font-size: 0.7rem;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .mini-tag {
      font-size: 0.65rem;
      background: var(--bg-ivory);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border: 1px solid var(--border-light);
      font-weight: 500;
      color: var(--stone);
    }

    .card-footer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .read-link {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold-deep);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.2s;
    }

    .article-card:hover .read-link {
      gap: 12px;
      color: var(--charcoal);
    }

    .view-stats {
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    /* loading & empty states */
    .state-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 32px;
      border: 1px dashed var(--border-light);
    }

    .state-message i {
      font-size: 2.2rem;
      color: var(--gold-soft);
      margin-bottom: 1rem;
    }

    /* pagination */
    .pagination-wrapper {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .page-btn {
      background: white;
      border: 1px solid var(--border-light);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--stone);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .page-btn.active {
      background: var(--charcoal);
      border-color: var(--charcoal);
      color: white;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--gold-mist);
      border-color: var(--gold-primary);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    @media (max-width: 760px) {
      .hero-container { flex-direction: column; align-items: flex-start; }
      .hero-stat { text-align: left; width: auto; }
      .filter-panel { flex-direction: column; align-items: stretch; }
      .sort-group { justify-content: center; }
      .gallery-section { padding: 0 1.2rem; }
    }
  </style>
</head>
<body>

<header id="global-header"></header>

<!-- Hero Section -->
<div class="hero-gallery">
  <div class="hero-container">
    <div class="hero-text">
      <div class="eyebrow">
        <div class="eyebrow-line"></div>
        <span>EDITOR'S ARCHIVE</span>
      </div>
      <h1>The <span class="gold-ink">Article</span><br>Sanctuary</h1>
      <p class="hero-desc">Curated voices, deep investigations, and timeless narratives from our editorial vanguard.</p>
    </div>
    <div class="hero-stat">
      <div class="stat-number" id="totalCountHero">—</div>
      <div class="stat-label">published<br>artifacts</div>
    </div>
  </div>
</div>

<section class="gallery-section">
  <!-- advanced filter bar -->
  <div class="filter-panel">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by title, author, or keywords...">
    </div>
    <select id="categorySelect" class="filter-select">
      <option value="all">All categories</option>
    </select>
    <div class="sort-group">
      <button class="sort-btn active" data-sort="latest"><i class="far fa-clock"></i> Latest</button>
      <button class="sort-btn" data-sort="oldest"><i class="far fa-calendar-alt"></i> Oldest</button>
      <button class="sort-btn" data-sort="popular"><i class="fas fa-chart-line"></i> Popular</button>
    </div>
  </div>

  <!-- tags cloud (dynamic) -->
  <div class="tag-rail" id="tagsContainer">
    <span class="tag-label">✦ TOPICS</span>
    <span class="tag-pill active" data-tag="all"><i class="fas fa-layer-group"></i> All</span>
  </div>

  <!-- result meta -->
  <div class="result-header">
    <div class="result-count" id="resultInfo">Loading curated articles...</div>
    <div class="clear-filters" id="clearFiltersBtn"><i class="fas fa-eraser"></i> Reset filters</div>
  </div>

  <div class="grid-articles" id="articlesGrid">
    <div class="state-message"><i class="fas fa-spinner fa-pulse"></i><p>Summoning manuscripts...</p></div>
  </div>

  <div class="pagination-wrapper" id="paginationControls"></div>
</section>

<footer id="global-footer"></footer>

<script>
  (function() {
    // === CONFIGURATION ===
    const POSTS_PER_PAGE = 9;
    const POSTS_DIR = 'Posts/';   // relative path to html articles
    let masterPosts = [];
    let filteredPool = [];
    let currentPage = 1;
    let activeSort = 'latest';
    let activeCategory = 'all';
    let activeTag = 'all';
    let searchKeyword = '';

    // DOM elements
    const gridEl = document.getElementById('articlesGrid');
    const paginationEl = document.getElementById('paginationControls');
    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const sortBtns = document.querySelectorAll('.sort-btn');
    const tagsContainer = document.getElementById('tagsContainer');
    const resultInfoSpan = document.getElementById('resultInfo');
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    const totalCountHero = document.getElementById('totalCountHero');

    // === Helper: fetch metadata from html (simulate manifest with fallback dynamic discovery)
    // We'll use a static manifest generator simulation: we assume a posts-manifest.json exists, but for demo we build with inline mock data
    // Actually we keep the robust structure: first fetch manifest list, then fetch each post metadata.
    async function fetchAllPosts() {
      try {
        const manifestRes = await fetch('posts-manifest.json');
        if (!manifestRes.ok) throw new Error('manifest missing, using demo seed');
        const fileList = await manifestRes.json();
        const posts = await Promise.all(fileList.map(file => fetchPostMeta(file)));
        return posts.filter(p => p !== null);
      } catch (err) {
        console.warn('Using fallback editorial dataset (manifest not found)');
        return getFallbackEditorialPosts();
      }
    }

    async function fetchPostMeta(filename) {
      try {
        const res = await fetch(POSTS_DIR + filename);
        if (!res.ok) return null;
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const getMeta = (name) => {
          const el = doc.querySelector(`meta[name="${name}"]`);
          return el ? el.getAttribute('content') : null;
        };
        const excerptMeta = getMeta('blog:excerpt');
        const excerpt = excerptMeta || (doc.querySelector('p')?.textContent.slice(0, 140) + '…') || 'Explore the full insight.';
        const category = getMeta('blog:category') || 'uncategorized';
        const tagsRaw = getMeta('blog:tags') || '';
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [];
        const iconMap = { technology:'fa-microchip', legal:'fa-gavel', science:'fa-flask', business:'fa-chart-line', health:'fa-heartbeat', design:'fa-palette', uncategorized:'fa-book-open' };
        return {
          id: filename,
          url: POSTS_DIR + filename,
          title: getMeta('blog:title') || filename.replace('.html','').replace(/%20/g,' '),
          excerpt,
          category,
          tags,
          author: getMeta('blog:author') || 'The Editorial Board',
          date: getMeta('blog:date') || new Date().toISOString().slice(0,10),
          readTime: parseInt(getMeta('blog:readTime')) || 4,
          views: parseInt(getMeta('blog:views')) || Math.floor(Math.random() * 3800) + 320,
          icon: iconMap[category] || 'fa-newspaper'
        };
      } catch(e) { return null; }
    }

    // beautiful fallback content (rich demo)
    function getFallbackEditorialPosts() {
      return [
        { id:'1', url:'#', title:'The Quiet Renaissance of Legal Tech', excerpt:'How algorithms are reshaping jurisprudence and access to justice.', category:'legal', tags:['AI','justice','regulation'], author:'Elena Voss', date:'2025-02-10', readTime:6, views:2840, icon:'fa-gavel' },
        { id:'2', url:'#', title:'Beyond Silicon: Neuromorphic Futures', excerpt:'Computing that mimics the human brain enters production.', category:'technology', tags:['neural','hardware','innovation'], author:'Marcus Chen', date:'2025-02-18', readTime:5, views:4123, icon:'fa-microchip' },
        { id:'3', url:'#', title:'Circular Economies in Jute & Textiles', excerpt:'Bangladesh’s sustainable revolution gains momentum.', category:'business', tags:['sustainability','jute','trade'], author:'Samira Haque', date:'2025-01-28', readTime:7, views:1900, icon:'fa-chart-line' },
        { id:'4', url:'#', title:'Metabolic Health & Modern Diets', excerpt:'New research on LDL, CoQ10 and cardiovascular resilience.', category:'health', tags:['LDL','nutrition','wellness'], author:'Dr. Priya Iyer', date:'2025-02-01', readTime:8, views:5400, icon:'fa-heartbeat' },
        { id:'5', url:'#', title:'The Aesthetics of Data: Information Design', excerpt:'Why visualization is the new literacy.', category:'design', tags:['dataviz','UX','creativity'], author:'Jonas K.', date:'2025-02-14', readTime:4, views:2350, icon:'fa-palette' },
        { id:'6', url:'#', title:'Quantum Sensors in Agriculture', excerpt:'Precision farming at the atomic level.', category:'science', tags:['quantum','agritech','innovation'], author:'Dr. Liam O’Connor', date:'2025-01-22', readTime:6, views:1678, icon:'fa-flask' },
        { id:'7', url:'#', title:'Smart Meter Privacy & Section 6A', excerpt:'Legal battle over energy data confiscation.', category:'legal', tags:['smart-meter','privacy','ec act'], author:'Rebecca Huang', date:'2025-02-09', views:3210, readTime:5, icon:'fa-gavel' },
        { id:'8', url:'#', title:'The Petroleum Density Paradigm', excerpt:'How density metrics redefine fuel markets.', category:'business', tags:['petroleum','energy','commodities'], author:'Omar Faruk', date:'2025-01-30', views:1440, readTime:4, icon:'fa-chart-line' }
      ];
    }

    // filtering core
    function applyFiltersAndSort() {
      let temp = [...masterPosts];
      if (activeCategory !== 'all') temp = temp.filter(p => p.category === activeCategory);
      if (activeTag !== 'all') temp = temp.filter(p => p.tags.includes(activeTag));
      if (searchKeyword.trim() !== '') {
        const kw = searchKeyword.toLowerCase();
        temp = temp.filter(p => p.title.toLowerCase().includes(kw) || p.excerpt.toLowerCase().includes(kw) || p.author.toLowerCase().includes(kw));
      }
      if (activeSort === 'latest') temp.sort((a,b) => new Date(b.date) - new Date(a.date));
      else if (activeSort === 'oldest') temp.sort((a,b) => new Date(a.date) - new Date(b.date));
      else if (activeSort === 'popular') temp.sort((a,b) => b.views - a.views);
      return temp;
    }

    function buildTagsFromPosts() {
      const tagMap = new Map();
      masterPosts.forEach(p => {
        p.tags.forEach(t => {
          const clean = t.trim();
          if (!clean) return;
          tagMap.set(clean, (tagMap.get(clean) || 0) + 1);
        });
      });
      const sortedTags = Array.from(tagMap.entries()).sort((a,b) => b[1] - a[1]).slice(0, 12);
      let html = `<span class="tag-label">✦ TOPICS</span>
                  <span class="tag-pill active" data-tag="all"><i class="fas fa-layer-group"></i> All</span>`;
      sortedTags.forEach(([tagName, count]) => {
        const icon = (tagName.includes('meter') || tagName.includes('tech')) ? 'fa-microchip' : (tagName.includes('legal') ? 'fa-gavel' : 'fa-tag');
        html += `<span class="tag-pill" data-tag="${tagName.replace(/"/g, '&quot;')}"><i class="fas ${icon}"></i> ${tagName} <span style="opacity:0.6;">${count}</span></span>`;
      });
      tagsContainer.innerHTML = html;
      document.querySelectorAll('.tag-pill').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
          el.classList.add('active');
          activeTag = el.dataset.tag;
          currentPage = 1;
          render();
        });
      });
    }

    function updateCategorySelect() {
      const cats = ['all', ...new Set(masterPosts.map(p => p.category))];
      categorySelect.innerHTML = cats.map(c => `<option value="${c}">${c === 'all' ? 'All Categories' : c.charAt(0).toUpperCase() + c.slice(1)}</option>`).join('');
    }

    function render() {
      filteredPool = applyFiltersAndSort();
      const total = filteredPool.length;
      if (totalCountHero) totalCountHero.innerText = total;
      const totalPages = Math.ceil(total / POSTS_PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages || 1;
      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const pageItems = filteredPool.slice(start, start + POSTS_PER_PAGE);
      resultInfoSpan.innerHTML = `Showing <strong>${start+1}–${Math.min(start+POSTS_PER_PAGE,total)}</strong> of <strong>${total}</strong> articles`;

      if (pageItems.length === 0) {
        gridEl.innerHTML = `<div class="state-message"><i class="fas fa-feather-alt"></i><h3>No articles match</h3><p>Adjust filters or explore other topics.</p></div>`;
      } else {
        gridEl.innerHTML = pageItems.map((post, idx) => `
          <div class="article-card" onclick="window.location.href='${post.url}'">
            <div class="card-media" data-cat="${post.category}">
              <div class="icon-circle"><i class="fas ${post.icon}"></i></div>
              <span class="cat-badge">${post.category}</span>
            </div>
            <div class="card-content">
              <h3 class="article-title">${escapeHtml(post.title)}</h3>
              <p class="article-excerpt">${escapeHtml(post.excerpt)}</p>
              <div class="meta-strip">
                <span><i class="fas fa-user-edit"></i> ${escapeHtml(post.author)}</span>
                <span><i class="far fa-calendar"></i> ${new Date(post.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</span>
                <span><i class="far fa-hourglass"></i> ${post.readTime} min</span>
              </div>
              <div class="tag-list">${post.tags.slice(0,3).map(t => `<span class="mini-tag">${escapeHtml(t)}</span>`).join('')}</div>
              <div class="card-footer-actions">
                <div class="read-link">Read full <i class="fas fa-arrow-right"></i></div>
                <div class="view-stats"><i class="fas fa-eye"></i> ${post.views >= 1000 ? (post.views/1000).toFixed(1)+'k' : post.views}</div>
              </div>
            </div>
          </div>
        `).join('');
      }
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) { paginationEl.innerHTML = ''; return; }
      let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage-1}"><i class="fas fa-chevron-left"></i> Prev</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        } else if (i === currentPage-3 || i === currentPage+3) {
          html += `<span class="page-dots">⋯</span>`;
        }
      }
      html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage+1}">Next <i class="fas fa-chevron-right"></i></button>`;
      paginationEl.innerHTML = html;
      document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!btn.disabled) { currentPage = parseInt(btn.dataset.page); render(); window.scrollTo({ top: 200, behavior: 'smooth' }); }
        });
      });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // event listeners
    searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; currentPage = 1; render(); });
    categorySelect.addEventListener('change', (e) => { activeCategory = e.target.value; currentPage = 1; render(); });
    sortBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        sortBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSort = btn.dataset.sort;
        currentPage = 1;
        render();
      });
    });
    clearFiltersBtn.addEventListener('click', () => {
      searchInput.value = '';
      categorySelect.value = 'all';
      activeCategory = 'all';
      searchKeyword = '';
      activeTag = 'all';
      document.querySelectorAll('.tag-pill').forEach(t => t.classList.remove('active'));
      const allTag = document.querySelector('.tag-pill[data-tag="all"]');
      if (allTag) allTag.classList.add('active');
      currentPage = 1;
      render();
    });

    async function init() {
      gridEl.innerHTML = '<div class="state-message"><i class="fas fa-spinner fa-pulse"></i><p>Loading manuscripts...</p></div>';
      masterPosts = await fetchAllPosts();
      if (!masterPosts.length) {
        gridEl.innerHTML = '<div class="state-message"><i class="fas fa-exclamation-triangle"></i><p>Unable to load articles. Please check connection.</p></div>';
        return;
      }
      updateCategorySelect();
      buildTagsFromPosts();
      render();
    }
    init();
  })();
</script>
</body>
</html>
