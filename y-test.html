<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Article Gallery</title>

  <link rel="stylesheet" href="style.css">
  <script src="assets/Scripts/site-components.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0d0d0d;
      --ink-soft:   #1c1c1c;
      --ink-muted:  #3a3a3a;
      --gold:       #c8980a;
      --gold-lt:    #e8b82a;
      --gold-pale:  #f5e8b0;
      --gold-faint: #fdf8e8;
      --cream:      #faf8f2;
      --cream-deep: #f2ede0;
      --white:      #ffffff;
      --rule:       rgba(200,152,10,0.25);
      --rule-dark:  rgba(200,152,10,0.5);

      --cat-tech:    #1a4a7a;
      --cat-legal:   #5a1a7a;
      --cat-sci:     #1a6a3a;
      --cat-biz:     #7a3a1a;
      --cat-health:  #7a1a2a;
      --cat-design:  #2a5a5a;

      --shadow-card: 0 2px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-hover: 0 20px 50px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink-muted);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       MASTHEAD
    ══════════════════════════════════════ */
    .blogs-masthead {
      background: var(--ink);
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    /* Diagonal texture overlay */
    .blogs-masthead::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 40px,
          rgba(200,152,10,0.04) 40px,
          rgba(200,152,10,0.04) 41px
        );
      pointer-events: none;
    }

    /* Gold accent bar */
    .blogs-masthead::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-lt) 20%, var(--gold) 50%, var(--gold-lt) 80%, transparent);
    }

    .masthead-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 5rem 2rem 4.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .masthead-left {}

    .masthead-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.4rem;
    }

    .masthead-eyebrow .rule {
      width: 36px;
      height: 1.5px;
      background: var(--gold);
    }

    .masthead-eyebrow span {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-lt);
    }

    .blogs-masthead h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 900;
      color: var(--white);
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 1.4rem;
    }

    .blogs-masthead h1 .accent {
      color: var(--gold-lt);
      font-style: italic;
    }

    .masthead-desc {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      font-weight: 300;
      letter-spacing: 0.02em;
      max-width: 440px;
      line-height: 1.7;
    }

    .masthead-stat {
      text-align: right;
    }

    .masthead-stat .big-num {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .masthead-stat .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      margin-top: 0.4rem;
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .blogs-section {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2.8rem 2rem 6rem;
    }

    /* ══════════════════════════════════════
       TOOLBAR
    ══════════════════════════════════════ */
    .toolbar {
      background: var(--white);
      border: 1.5px solid var(--cream-deep);
      border-radius: 4px;
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-card);
    }

    .search-box { flex: 1; min-width: 200px; max-width: 340px; position: relative; }

    .search-box i {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%); color: var(--gold); font-size: 0.8rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      border: 1.5px solid var(--cream-deep);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,152,10,0.12);
      background: var(--white);
    }

    .search-box input::placeholder { color: #bbb; }

    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: var(--cream-deep);
      flex-shrink: 0;
    }

    .category-filter { position: relative; }

    .category-filter select {
      appearance: none;
      padding: 0.68rem 2.4rem 0.68rem 1rem;
      border: 1.5px solid var(--cream-deep);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      font-weight: 600;
      background: var(--cream);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .category-filter select:focus { outline: none; border-color: var(--gold); }

    .category-filter i {
      position: absolute; right: 0.8rem; top: 50%;
      transform: translateY(-50%); font-size: 0.65rem;
      color: var(--gold); pointer-events: none;
    }

    .sort-controls {
      display: flex;
      gap: 0.3rem;
      margin-left: auto;
    }

    .sort-btn {
      padding: 0.6rem 1.1rem;
      border: 1.5px solid var(--cream-deep);
      border-radius: 3px;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .sort-btn:hover { background: var(--gold-pale); border-color: var(--gold); color: var(--ink); }

    .sort-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .sort-btn.active i { color: var(--gold-lt); }

    /* ══════════════════════════════════════
       TAGS
    ══════════════════════════════════════ */
    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      padding: 0.85rem 1.2rem;
      background: var(--white);
      border: 1.5px solid var(--cream-deep);
      border-radius: 4px;
      margin-bottom: 1.6rem;
      box-shadow: var(--shadow-card);
    }

    .tags-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-right: 0.4rem;
    }

    .tag {
      padding: 0.3rem 0.85rem;
      background: transparent;
      border: 1.5px solid var(--cream-deep);
      border-radius: 2px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .tag:hover {
      background: var(--gold-pale);
      border-color: var(--gold);
      color: var(--ink);
    }

    .tag.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .tag i { margin-right: 0.3rem; font-size: 0.6rem; opacity: 0.7; }

    /* ══════════════════════════════════════
       RESULTS META
    ══════════════════════════════════════ */
    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1.5px solid var(--cream-deep);
    }

    .results-count-text {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .results-count-text strong {
      color: var(--ink);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
    }

    .clear-filters {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .clear-filters:hover { color: var(--ink); }

    /* ══════════════════════════════════════
       BLOG GRID
    ══════════════════════════════════════ */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3.5rem;
    }

    /* ══════════════════════════════════════
       BLOG CARD
    ══════════════════════════════════════ */
    .blog-card {
      background: var(--white);
      border: 1.5px solid var(--cream-deep);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.32s cubic-bezier(0.22, 1, 0.36, 1),
                  border-color 0.2s;
      box-shadow: var(--shadow-card);
      animation: riseUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
    }

    .blog-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: var(--gold);
    }

    /* Stagger */
    .blog-card:nth-child(1){animation-delay:.04s}
    .blog-card:nth-child(2){animation-delay:.1s}
    .blog-card:nth-child(3){animation-delay:.16s}
    .blog-card:nth-child(4){animation-delay:.22s}
    .blog-card:nth-child(5){animation-delay:.28s}
    .blog-card:nth-child(6){animation-delay:.34s}
    .blog-card:nth-child(7){animation-delay:.4s}
    .blog-card:nth-child(8){animation-delay:.46s}
    .blog-card:nth-child(9){animation-delay:.52s}

    /* ── CARD HEADER IMAGE ─── */
    .blog-image {
      height: 148px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Dark editorial backgrounds per category */
    .blog-image[data-cat="technology"] { background: linear-gradient(140deg, #0d1f3a 0%, #1a3a6a 100%); }
    .blog-image[data-cat="legal"]      { background: linear-gradient(140deg, #1a0d30 0%, #3a1a60 100%); }
    .blog-image[data-cat="science"]    { background: linear-gradient(140deg, #0d2a1a 0%, #1a4a30 100%); }
    .blog-image[data-cat="business"]   { background: linear-gradient(140deg, #2a1400 0%, #4a2800 100%); }
    .blog-image[data-cat="health"]     { background: linear-gradient(140deg, #2a0a14 0%, #501428 100%); }
    .blog-image[data-cat="design"]     { background: linear-gradient(140deg, #0a2020 0%, #143a3a 100%); }
    .blog-image[data-cat="uncategorized"] { background: linear-gradient(140deg, #1a1a1a 0%, #2c2c2c 100%); }

    /* Subtle grid pattern on image bg */
    .blog-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .icon-wrap {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(200,152,10,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      color: var(--gold-lt);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(4px);
    }

    .blog-category-badge {
      position: absolute;
      top: 0.85rem; right: 0.85rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-lt);
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(200,152,10,0.35);
      padding: 0.25rem 0.65rem;
      border-radius: 2px;
      backdrop-filter: blur(4px);
    }

    /* Category accent line at bottom of image */
    .blog-image::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .blog-image[data-cat="technology"]::after  { background: linear-gradient(90deg, transparent, #4a90d9, transparent); }
    .blog-image[data-cat="legal"]::after       { background: linear-gradient(90deg, transparent, #9a60d9, transparent); }
    .blog-image[data-cat="science"]::after     { background: linear-gradient(90deg, transparent, #50c080, transparent); }
    .blog-image[data-cat="business"]::after    { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .blog-image[data-cat="health"]::after      { background: linear-gradient(90deg, transparent, #d96080, transparent); }
    .blog-image[data-cat="design"]::after      { background: linear-gradient(90deg, transparent, #50c0c0, transparent); }

    /* ── CARD BODY ─── */
    .blog-content {
      padding: 1.4rem 1.5rem 1.3rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      border-top: none;
    }

    .blog-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: 0.7rem;
      letter-spacing: -0.01em;
    }

    .blog-excerpt {
      font-size: 0.84rem;
      color: var(--ink-muted);
      line-height: 1.75;
      flex-grow: 1;
      margin-bottom: 1.1rem;
      font-weight: 400;
    }

    .blog-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.73rem;
      padding: 0.75rem 0;
      border-top: 1px solid var(--cream-deep);
      border-bottom: 1px solid var(--cream-deep);
      margin-bottom: 1rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .meta-item i { color: var(--gold); font-size: 0.68rem; }
    .meta-author { color: var(--cat-sci); font-weight: 700; }
    .meta-date   { color: var(--cat-legal); }

    .blog-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }

    .blog-tag {
      font-size: 0.67rem;
      padding: 0.18rem 0.6rem;
      background: var(--cream);
      border: 1px solid var(--cream-deep);
      border-radius: 2px;
      color: var(--ink-muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: gap 0.2s, color 0.2s;
    }

    .read-more i {
      font-size: 0.65rem;
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .blog-card:hover .read-more { gap: 0.8rem; color: var(--ink); }
    .blog-card:hover .read-more i { transform: translateX(4px); }

    .views-badge {
      font-size: 0.68rem;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
    }

    .views-badge i { font-size: 0.62rem; }

    /* ══════════════════════════════════════
       FEATURED / WIDE CARD (1st card)
    ══════════════════════════════════════ */
    .blog-card.featured {
      grid-column: span 2;
    }

    .blog-card.featured .blog-image {
      height: 220px;
    }

    .blog-card.featured .blog-title {
      font-size: 1.4rem;
    }

    /* ══════════════════════════════════════
       LOADING / NO-RESULTS
    ══════════════════════════════════════ */
    .loading, .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 2rem;
      color: var(--ink-muted);
      background: var(--white);
      border: 1.5px dashed var(--cream-deep);
      border-radius: 4px;
    }

    .loading i {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      animation: spin 1s linear infinite;
      color: var(--gold);
      display: block;
    }

    .loading p { font-size: 0.9rem; color: #aaa; }

    .no-results i { font-size: 2.5rem; margin-bottom: 1rem; color: var(--cream-deep); display: block; }

    .no-results h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .no-results p { font-size: 0.9rem; color: #aaa; }

    /* ══════════════════════════════════════
       PAGINATION
    ══════════════════════════════════════ */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      margin: 2rem 0 1rem;
    }

    .page-btn {
      min-width: 40px; height: 40px;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--cream-deep);
      border-radius: 3px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.18s;
      gap: 0.35rem;
    }

    .page-btn:hover:not(:disabled):not(.active) {
      background: var(--gold-pale);
      border-color: var(--gold);
      color: var(--ink);
    }

    .page-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
      font-weight: 700;
    }

    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-dots { color: #ccc; font-size: 1rem; padding: 0 0.2rem; }

    /* ══════════════════════════════════════
       KEYFRAMES
    ══════════════════════════════════════ */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 1000px) {
      .blog-grid { grid-template-columns: repeat(2,1fr); }
      .blog-card.featured { grid-column: span 1; }
      .masthead-stat { display: none; }
    }

    @media (max-width: 640px) {
      .blog-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .sort-controls { margin-left: 0; flex-wrap: wrap; }
      .toolbar-divider { display: none; }
      .blogs-section { padding: 1.5rem 1rem 4rem; }
      .blogs-masthead h1 { font-size: 2.8rem; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <!-- ═══════════════════════════════
       MASTHEAD
  ═══════════════════════════════ -->
  <div class="blogs-masthead">
    <div class="masthead-inner">
      <div class="masthead-left">
        <div class="masthead-eyebrow">
          <span class="rule"></span>
          <span>Official Publications</span>
        </div>
        <h1>The<br><span class="accent">Article</span><br>Gallery</h1>
        <p class="masthead-desc">Authoritative articles, official insights, and curated knowledge from our editorial team.</p>
      </div>
      <div class="masthead-stat">
        <div class="big-num" id="totalCount">—</div>
        <div class="label">Published<br>Articles</div>
      </div>
    </div>
  </div>

  <section class="blogs-section">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search articles, authors…">
      </div>
      <div class="toolbar-divider"></div>
      <div class="category-filter">
        <select id="categorySelect"><option value="all">All Categories</option></select>
        <i class="fas fa-chevron-down"></i>
      </div>
      <div class="toolbar-divider"></div>
      <div class="sort-controls">
        <button class="sort-btn active" data-sort="latest"><i class="fas fa-clock"></i> Latest</button>
        <button class="sort-btn" data-sort="oldest"><i class="fas fa-calendar"></i> Oldest</button>
        <button class="sort-btn" data-sort="popular"><i class="fas fa-fire"></i> Popular</button>
      </div>
    </div>

    <!-- TAGS -->
    <div class="tags-cloud" id="tagsCloud">
      <span class="tags-label">Topics</span>
      <span class="tag active" data-tag="all"><i class="fas fa-layer-group"></i> All</span>
    </div>

    <!-- RESULTS META -->
    <div class="results-info">
      <span class="results-count-text" id="resultsCount">Loading articles…</span>
      <span class="clear-filters" id="clearFilters"><i class="fas fa-times-circle"></i> Clear filters</span>
    </div>

    <div class="blog-grid" id="blogGrid">
      <div class="loading"><i class="fas fa-spinner"></i><p>Fetching articles…</p></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </section>

  <footer id="site-footer"></footer>
  <script src="assets/Scripts/gototop.js"></script>

<script>
(function () {
  const POSTS_PER_PAGE = 12;
  const POSTS_DIRECTORY = 'Posts/';

  let allPosts = [], filteredPosts = [];
  let currentPage = 1, currentSort = 'latest',
      currentCategory = 'all', currentTag = 'all', searchQuery = '';

  const blogGrid         = document.getElementById('blogGrid');
  const paginationDiv    = document.getElementById('pagination');
  const searchInput      = document.getElementById('searchInput');
  const categorySelect   = document.getElementById('categorySelect');
  const sortBtns         = document.querySelectorAll('.sort-btn');
  const tagsCloud        = document.getElementById('tagsCloud');
  const resultsCountSpan = document.getElementById('resultsCount');
  const clearFiltersBtn  = document.getElementById('clearFilters');
  const totalCountEl     = document.getElementById('totalCount');

  async function loadAllPosts() {
    try {
      const res = await fetch('posts-manifest.json');
      if (!res.ok) throw new Error('Manifest not found');
      const manifest = await res.json();
      if (!Array.isArray(manifest) || !manifest.length) return [];
      const posts = await Promise.all(manifest.map(fetchPostMetadata));
      return posts.filter(Boolean);
    } catch (e) { console.error(e); return []; }
  }

  async function fetchPostMetadata(filename) {
    try {
      const res = await fetch(POSTS_DIRECTORY + filename);
      if (!res.ok) return null;
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const getMeta = n => { const m = doc.querySelector(`meta[name="${n}"]`); return m ? m.getAttribute('content') : null; };
      const extractExcerpt = () => {
        const ex = getMeta('blog:excerpt'); if (ex) return ex;
        const p = doc.querySelector('p');
        return p ? p.textContent.substring(0, 150) + '…' : 'Read this article…';
      };
      const iconMap = { technology:'fa-microchip',lifestyle:'fa-heart',travel:'fa-plane',food:'fa-utensils',health:'fa-heartbeat',business:'fa-briefcase',design:'fa-pencil-ruler',science:'fa-flask',art:'fa-palette',legal:'fa-gavel',technical:'fa-gear',uncategorized:'fa-newspaper' };
      const category = getMeta('blog:category') || 'uncategorized';
      return {
        id: filename, filename, url: POSTS_DIRECTORY + filename,
        title:    getMeta('blog:title') || filename.replace('.html','').replace(/%20/g,' '),
        excerpt:  extractExcerpt(), category,
        tags:     getMeta('blog:tags') ? getMeta('blog:tags').split(',').map(t=>t.trim()) : [],
        author:   getMeta('blog:author') || 'Editorial Team',
        date:     getMeta('blog:date') || new Date().toISOString().split('T')[0],
        readTime: parseInt(getMeta('blog:readTime')) || Math.floor(Math.random()*10)+3,
        views:    parseInt(getMeta('blog:views')) || Math.floor(Math.random()*5000)+500,
        icon:     getMeta('blog:icon') || iconMap[category] || 'fa-newspaper'
      };
    } catch (e) { return null; }
  }

  function getTagIcon(tag) {
    const icons = { 'ec act':'fa-gavel','confiscation':'fa-box','seizure':'fa-handcuffs','legal':'fa-scale-balanced','smart-meter':'fa-microchip','electricity':'fa-bolt','energy':'fa-solar-panel','technology':'fa-code','jute':'fa-leaf','textiles':'fa-shirt','foodgrains':'fa-wheat-awn','is standard':'fa-certificate' };
    const tl = tag.toLowerCase();
    for (const [k,v] of Object.entries(icons)) if (tl.includes(k)) return v;
    return 'fa-tag';
  }

  function updateFiltersFromPosts(posts) {
    if (totalCountEl) totalCountEl.textContent = posts.length;
    const categories = ['all', ...new Set(posts.map(p=>p.category))];
    categorySelect.innerHTML = categories.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');
    const tagsToRemove = ['detention','commodities','section 6a','section-6a','innovation','sustainability','packaging','LDL','VLDL','CoQ10','excel-tips','excel-formulas','petroleum','density','productivity'];
    const tagCount = new Map();
    posts.forEach(p => p.tags.forEach(t => {
      if (!tagsToRemove.some(r=>t.toLowerCase()===r.toLowerCase()||t.toLowerCase().includes(r.toLowerCase()))) tagCount.set(t,(tagCount.get(t)||0)+1);
    }));
    const sorted = Array.from(tagCount.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15);
    tagsCloud.innerHTML = `<span class="tags-label">Topics</span><span class="tag active" data-tag="all"><i class="fas fa-layer-group"></i> All</span>`
      + sorted.map(([t,c])=>`<span class="tag" data-tag="${t}"><i class="fas ${getTagIcon(t)}"></i> ${t} <em style="opacity:.55;font-style:normal">${c}</em></span>`).join('');
    document.querySelectorAll('.tag').forEach(tag=>{
      tag.addEventListener('click',()=>{ document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active')); tag.classList.add('active'); currentTag=tag.dataset.tag; currentPage=1; renderPosts(); });
    });
  }

  function filterPosts() {
    let f = [...allPosts];
    if (currentCategory !== 'all') f = f.filter(p=>p.category===currentCategory);
    if (currentTag !== 'all') f = f.filter(p=>p.tags.includes(currentTag));
    if (searchQuery) { const q=searchQuery.toLowerCase(); f=f.filter(p=>p.title.toLowerCase().includes(q)||p.excerpt.toLowerCase().includes(q)||p.author.toLowerCase().includes(q)); }
    f.sort((a,b)=>{ if(currentSort==='latest') return new Date(b.date)-new Date(a.date); if(currentSort==='oldest') return new Date(a.date)-new Date(b.date); return b.views-a.views; });
    return f;
  }

  function formatDate(d) { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

  function formatViews(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : n; }

  function renderPosts() {
    filteredPosts = filterPosts();
    const total = filteredPosts.length;
    const totalPages = Math.ceil(total/POSTS_PER_PAGE);
    if (currentPage > totalPages) currentPage = totalPages||1;
    const start=(currentPage-1)*POSTS_PER_PAGE, end=start+POSTS_PER_PAGE;
    const show=filteredPosts.slice(start,end);

    if (total === 0) {
      resultsCountSpan.innerHTML = 'No articles found';
    } else {
      resultsCountSpan.innerHTML = `Showing <strong>${start+1}–${Math.min(end,total)}</strong> of <strong>${total}</strong> articles`;
    }

    if (!show.length) {
      blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-search"></i><h3>No articles found</h3><p>Try adjusting your filters or search terms.</p></div>`;
    } else {
      blogGrid.innerHTML = show.map((post, idx)=>`
        <div class="blog-card${idx===0 && currentPage===1 ? ' featured' : ''}" onclick="window.location.href='${post.url}'">
          <div class="blog-image" data-cat="${post.category}">
            <div class="icon-wrap"><i class="fas ${post.icon}"></i></div>
            <span class="blog-category-badge">${post.category}</span>
          </div>
          <div class="blog-content">
            <h3 class="blog-title">${post.title}</h3>
            <p class="blog-excerpt">${post.excerpt}</p>
            <div class="blog-meta">
              <span class="meta-item meta-author"><i class="fas fa-user-pen"></i>${post.author}</span>
              <span class="meta-item meta-date"><i class="fas fa-calendar"></i>${formatDate(post.date)}</span>
              <span class="meta-item"><i class="fas fa-clock"></i>${post.readTime} min</span>
            </div>
            <div class="blog-tags">${post.tags.slice(0,3).map(t=>`<span class="blog-tag">${t}</span>`).join('')}</div>
            <div class="card-footer">
              <div class="read-more">Read Article <i class="fas fa-arrow-right"></i></div>
              <span class="views-badge"><i class="fas fa-eye"></i>${formatViews(post.views)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    if (totalPages<=1) { paginationDiv.innerHTML=''; return; }
    let html=`<button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}"><i class="fas fa-chevron-left"></i> Prev</button>`;
    for (let i=1;i<=totalPages;i++) {
      if(i===1||i===totalPages||(i>=currentPage-2&&i<=currentPage+2)) html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      else if(i===currentPage-3||i===currentPage+3) html+=`<span class="page-dots">…</span>`;
    }
    html+=`<button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">Next <i class="fas fa-chevron-right"></i></button>`;
    paginationDiv.innerHTML=html;
    paginationDiv.querySelectorAll('.page-btn[data-page]').forEach(btn=>{
      btn.addEventListener('click',()=>{ if(!btn.disabled){currentPage=parseInt(btn.dataset.page);renderPosts();window.scrollTo({top:0,behavior:'smooth'});} });
    });
  }

  searchInput.addEventListener('input', e=>{searchQuery=e.target.value;currentPage=1;renderPosts();});
  categorySelect.addEventListener('change', e=>{currentCategory=e.target.value;currentPage=1;renderPosts();});
  sortBtns.forEach(btn=>btn.addEventListener('click',()=>{sortBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=btn.dataset.sort;currentPage=1;renderPosts();}));
  clearFiltersBtn.addEventListener('click',()=>{ searchInput.value='';categorySelect.value='all'; document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active')); document.querySelector('.tag[data-tag="all"]').classList.add('active'); searchQuery='';currentCategory='all';currentTag='all';currentPage=1;renderPosts(); });

  async function init() {
    try {
      blogGrid.innerHTML='<div class="loading"><i class="fas fa-spinner"></i><p>Fetching articles…</p></div>';
      allPosts = await loadAllPosts();
      if (!allPosts.length) {
        blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-file-alt"></i><h3>No posts found</h3><p>Add HTML files to the Posts/ folder and run the GitHub Action.</p></div>`;
        resultsCountSpan.textContent='0 articles';
        if(totalCountEl) totalCountEl.textContent='0';
        return;
      }
      updateFiltersFromPosts(allPosts);
      renderPosts();
    } catch(e) {
      console.error(e);
      blogGrid.innerHTML=`<div class="no-results"><i class="fas fa-exclamation-triangle"></i><h3>Error loading posts</h3><p>Please refresh or try again later.</p></div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
