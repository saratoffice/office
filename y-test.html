        /* ========== GLOBAL RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f5fa;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== HEADER & FOOTER ========== */
        #site-header {
            background: linear-gradient(135deg, #1a3e5c 0%, #0f2d44 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 12px rgba(0,20,30,0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo small {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .header-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        .header-links a:hover {
            background: rgba(255,255,255,0.2);
        }

        #site-footer {
            background: #1e3a5f;
            color: #ccddee;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
            border-top: 3px solid #2c4b6e;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* ========== MAIN CONTAINER ========== */
        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            flex: 1;
            width: 100%;
        }

        /* ========== CHECKLIST NAVIGATION ========== */
        .checklist-nav {
            background: white;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,20,30,0.08);
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #d0dfef;
        }

        .checklist-nav label {
            font-weight: 600;
            color: #1a3e5c;
            font-size: 1.1rem;
        }

        .checklist-nav select {
            padding: 0.7rem 3rem 0.7rem 1.5rem;
            border: 2px solid #1a3e5c;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: #1a3e5c;
            background: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a3e5c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2rem;
            min-width: 280px;
        }

        .checklist-nav select:hover {
            background-color: #f5f9ff;
        }

        .checklist-badge {
            background: #e9eff7;
            color: #1a3e5c;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: auto;
        }

        /* ========== MAIN CARD ========== */
        .checklist-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,30,50,0.15);
            padding: 2rem;
            border: 1px solid #c5d5e8;
            margin-bottom: 2rem;
        }

        /* ========== HEADER SECTION ========== */
        .card-header {
            border-bottom: 4px solid #1a3e5c;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .header-title h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #1a3e5c;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .header-title .station-name {
            font-size: 1.3rem;
            color: #2c4b6e;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .header-title .verification-info {
            display: flex;
            gap: 2rem;
            color: #3e5f7e;
            font-size: 1rem;
            background: #eef4fa;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            display: inline-flex;
        }

        .print-btn {
            background: #1a3e5c;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(26,62,92,0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .print-btn:hover {
            background: #0f2d44;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26,62,92,0.4);
        }

        /* ========== SECTION STYLES ========== */
        .checklist-section {
            background: #f9fcff;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #d6e4f0;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a3e5c;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 3px solid #b8cee8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-title .badge {
            background: #1a3e5c;
            color: white;
            font-size: 0.8rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .section-title .badge.orange {
            background: #d19c2a;
            color: #1e2b38;
        }

        /* ========== GRID LAYOUTS ========== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 0.8rem 2rem;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #b8cee8;
        }

        .info-label {
            font-weight: 600;
            color: #1a3e5c;
            min-width: 140px;
            font-size: 0.95rem;
        }

        .info-value {
            color: #1d3f5e;
            font-size: 0.95rem;
            word-break: break-word;
        }

        /* ========== DOCUMENTS GRID ========== */
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem 2rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #cbd2dd;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a3e5c;
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: 0.95rem;
            color: #152b3b;
            cursor: pointer;
            flex: 1;
        }

        /* ========== TABLES ========== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .data-table th {
            background: #1a3e5c;
            color: white;
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .data-table td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #dde6f0;
            background: white;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:nth-child(even) td {
            background: #f5faff;
        }

        /* ========== FACILITIES GRID ========== */
        .facilities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem 1.5rem;
        }

        .facility-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #a0b6ce;
        }

        .facility-item span:first-child {
            font-size: 0.95rem;
            color: #152b3b;
        }

        .facility-status {
            background: #1a3e5c;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            margin-left: auto;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .facility-status.available {
            background: #1e7e34;
        }

        /* ========== RECORDS GRID ========== */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem 1.5rem;
        }

        .record-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.4rem 0;
            border-bottom: 1px dotted #8aa3c0;
        }

        /* ========== RECOMMENDATION BOX ========== */
        .recommendation-box {
            background: linear-gradient(145deg, #e4edf7, #d2e2f2);
            border-radius: 24px;
            padding: 1.8rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            border-left: 10px solid #1a3e5c;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 6px 12px rgba(0,20,30,0.1);
        }

        .recommendation-item {
            text-align: center;
            min-width: 150px;
        }

        .recommendation-label {
            font-size: 0.8rem;
            color: #2c4b6e;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .recommendation-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3e5c;
            margin-top: 0.3rem;
        }

        /* ========== OFFICER SECTION ========== */
        .officer-section {
            margin-top: 2.5rem;
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 3rem;
            border-top: 3px dashed #a0bada;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .officer-signature {
            text-align: center;
            min-width: 250px;
        }

        .officer-title {
            font-weight: 700;
            color: #1a3e5c;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .officer-line {
            width: 250px;
            height: 2px;
            border-bottom: 3px dotted #1a3e5c;
            margin: 0.8rem auto;
        }

        .officer-signature small {
            color: #3e5f7e;
            font-style: italic;
        }

        /* ========== LOADING STATE ========== */
        .loading-state {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 32px;
            font-size: 1.2rem;
            color: #1a3e5c;
        }

        .loading-state::after {
            content: '';
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 3px solid #1a3e5c;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 0.8rem;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== PRINT STYLES ========== */
        @media print {
            @page {
                size: A4;
                margin: 0.4in;
            }

            body {
                background: white;
                padding: 0;
            }

            #site-header,
            #site-footer,
            .checklist-nav,
            .print-btn,
            .header-links,
            .checklist-badge {
                display: none !important;
            }

            .checklist-card {
                box-shadow: none;
                border: none;
                padding: 0;
                margin: 0;
                border-radius: 0;
            }

            .facility-status {
                background: #1a3e5c !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .data-table th {
                background: #1a3e5c !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .documents-grid,
            .facilities-grid,
            .records-grid {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .header-title h1 {
                font-size: 1.8rem;
            }

            .checklist-nav select {
                min-width: 100%;
            }

            .officer-section {
                flex-direction: column;
                align-items: center;
                padding: 1rem;
            }
        }
    </style>
</head>

<script>
    // ==================== CHECKLIST RENDERER ====================
    class ChecklistRenderer {
        constructor() {
            this.currentType = 'hsd-renewal';
            this.data = null;
        }

        // Load and render checklist
        loadChecklist(type) {
            this.currentType = type;
            this.data = CHECKLIST_DATA[type];
            
            if (!this.data) {
                document.getElementById('checklist-container').innerHTML = 
                    '<div style="color: red; text-align: center; padding: 3rem;">❌ Checklist data not found!</div>';
                return;
            }

            // Update badge
            const badge = document.getElementById('checklist-type-badge');
            if (badge) {
                const names = {
                    'hsd-renewal': 'HSD Renewal',
                    'fps-checklist': 'FPS Checklist',
                    'ppc-checklist': 'PPC Compliance',
                    'rice-mill': 'Rice Mill',
                    'kerosene': 'Kerosene Dealer',
                    'lpg': 'LPG Distributor'
                };
                badge.textContent = names[type] || type;
            }

            // Render
            this.render();
            
            // Update URL
            history.pushState({type: type}, '', `?type=${type}`);
            
            // Restore checkbox states
            setTimeout(() => this.restoreCheckboxStates(), 100);
        }

        // Main render function
        render() {
            const container = document.getElementById('checklist-container');
            if (!this.data) return;

            const html = `
                <div class="checklist-card">
                    ${this.renderHeader()}
                    ${this.renderParticulars()}
                    ${this.renderDocuments()}
                    ${this.renderTanksAndPumps()}
                    ${this.renderLicenses()}
                    ${this.renderSafetyItems()}
                    ${this.renderFacilities()}
                    ${this.renderFireFighting()}
                    ${this.renderMachinery()}
                    ${this.renderRecords()}
                    ${this.renderStockVerification()}
                    ${this.renderDensityVerification()}
                    ${this.renderRecommendation()}
                    ${this.renderOfficers()}
                </div>
            `;
            
            container.innerHTML = html;
            this.attachPrintButton();
        }

        renderHeader() {
            const m = this.data.metadata;
            return `
                <div class="card-header">
                    <div class="header-title">
                        <h1>⛽ ${m.title}</h1>
                        <div class="station-name">${m.stationName || ''}</div>
                        <div class="verification-info">
                            <span>📅 ${m.verificationDate || ''}</span>
                            <span>⏰ ${m.verificationTime || ''}</span>
                            <span>👤 ${m.verifyingOfficer || ''}</span>
                        </div>
                    </div>
                    <button class="print-btn" id="print-checklist-btn">📋 PRINT CHECKLIST</button>
                </div>
            `;
        }

        renderParticulars() {
            if (!this.data.particulars) return '';
            
            const p = this.data.particulars;
            const items = [];
            
            if (p.proprietor) {
                items.push(
                    `<div class="info-item"><span class="info-label">Proprietor:</span><span class="info-value">${p.proprietor.name || ''}</span></div>`,
                    `<div class="info-item"><span class="info-label">Address:</span><span class="info-value">${p.proprietor.address || ''}</span></div>`
                );
            }
            
            if (p.contact) {
                if (p.contact.email) items.push(`<div class="info-item"><span class="info-label">Email:</span><span class="info-value">${p.contact.email}</span></div>`);
                if (p.contact.mobile) items.push(`<div class="info-item"><span class="info-label">Mobile:</span><span class="info-value">${p.contact.mobile}</span></div>`);
                if (p.contact.aadhaar) items.push(`<div class="info-item"><span class="info-label">Aadhaar:</span><span class="info-value">${p.contact.aadhaar}</span></div>`);
                if (p.contact.pan) items.push(`<div class="info-item"><span class="info-label">PAN:</span><span class="info-value">${p.contact.pan}</span></div>`);
                if (p.contact.gst) items.push(`<div class="info-item"><span class="info-label">GST:</span><span class="info-value">${p.contact.gst}</span></div>`);
            }
            
            if (p.location) {
                if (p.location.plotNo) items.push(`<div class="info-item"><span class="info-label">Plot No.:</span><span class="info-value">${p.location.plotNo}</span></div>`);
                if (p.location.khataNo) items.push(`<div class="info-item"><span class="info-label">Khata No.:</span><span class="info-value">${p.location.khataNo}</span></div>`);
                if (p.location.mouza) items.push(`<div class="info-item"><span class="info-label">Mouza:</span><span class="info-value">${p.location.mouza}</span></div>`);
                if (p.location.policeStation) items.push(`<div class="info-item"><span class="info-label">PS:</span><span class="info-value">${p.location.policeStation}</span></div>`);
                if (p.location.block) items.push(`<div class="info-item"><span class="info-label">Block:</span><span class="info-value">${p.location.block}</span></div>`);
            }
            
            if (p.oilCompany) items.push(`<div class="info-item"><span class="info-label">Oil Company:</span><span class="info-value">${p.oilCompany}</span></div>`);
            if (p.agreementDate) items.push(`<div class="info-item"><span class="info-label">Agreement:</span><span class="info-value">${p.agreementDate}</span></div>`);
            if (p.powerSupply) items.push(`<div class="info-item"><span class="info-label">Power Supply:</span><span class="info-value">${p.powerSupply}</span></div>`);

            return `
                <div class="checklist-section">
                    <div class="section-title">📋 STATION PARTICULARS</div>
                    <div class="info-grid">
                        ${items.join('')}
                    </div>
                </div>
            `;
        }

        renderDocuments() {
            if (!this.data.documents || !this.data.documents.length) return '';
            
            return `
                <div class="checklist-section">
                    <div class="section-title">📸 DOCUMENTS REQUIRED <span class="badge">verify & check</span></div>
                    <div class="documents-grid">
                        ${this.data.documents.map((doc, index) => `
                            <div class="checkbox-item">
                                <input type="checkbox" id="doc-${this.currentType}-${index}" class="doc-checkbox">
                                <label for="doc-${this.currentType}-${index}">${doc}</label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        renderTanksAndPumps() {
            if (!this.data.tanks && !this.data.dispensingUnits) return '';
            
            return `
                <div class="checklist-section">
                    <div class="section-title">⛽ TANKS & DISPENSING UNITS</div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Tanks (Product)</th>
                                <th>No.</th>
                                <th>Capacity (KL)</th>
                                <th>Pump Model</th>
                                <th>HSD Nozzles</th>
                                <th>MS Nozzles</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${this.renderTankPumpRows()}
                        </tbody>
                    </table>
                </div>
            `;
        }

        renderTankPumpRows() {
            const tanks = this.data.tanks || [];
            const pumps = this.data.dispensingUnits || [];
            const rows = [];
            const maxRows = Math.max(tanks.length, pumps.length);
            
            for (let i = 0; i < maxRows; i++) {
                const tank = tanks[i] || {product: '', number: '', capacity: ''};
                const pump = pumps[i] || {model: '', hsdNozzles: '', msNozzles: ''};
                
                rows.push(`
                    <tr>
                        <td>${tank.product || '-'}</td>
                        <td>${tank.number || '-'}</td>
                        <td>${tank.capacity || '-'}</td>
                        <td>${pump.model || '-'}</td>
                        <td>${pump.hsdNozzles || '-'}</td>
                        <td>${pump.msNozzles || '-'}</td>
                    </tr>
                `);
            }
            
            return rows.join('');
        }

            if (!this.data.licenses) return '';

                                <div class="recommendation-value">${r.performance}</div>
                            </div>
                        ` : ''}
                        <div class="recommendation-item">
                            <div class="recommendation-label">Renewal</div>
                            <div class="recommendation-value">${r.renewal}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        renderOfficers() {
            if (!this.data.officers) return '';
            
            const o = this.data.officers;
            
            return `
                <div class="officer-section">
                    <div class="officer-signature">
                        <div class="officer-title">${o.inspector || 'Inspecting Officer'}</div>
                        <div class="officer-line"></div>
                        <small>Signature with Date</small>
                    </div>
                    <div class="officer-signature">
                        <div class="officer-title">${o.acso || 'ACSO'}</div>
                        <div class="officer-line"></div>
                        <small>Signature with Date</small>
                    </div>
                </div>
            `;
        }

        attachPrintButton() {
            const btn = document.getElementById('print-checklist-btn');
            if (btn) {
                btn.addEventListener('click', () => {
                    window.print();
                });
            }
        }

        restoreCheckboxStates() {
            const checkboxes = document.querySelectorAll('.doc-checkbox');
            checkboxes.forEach(cb => {
                const id = cb.id;
                const saved = localStorage.getItem(id);
                if (saved !== null) {
                    cb.checked = saved === 'true';
                }
                
                cb.addEventListener('change', () => {
                    localStorage.setItem(cb.id, cb.checked);
                });
            });
        }
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
        const renderer = new ChecklistRenderer();
        
        // Get type from URL
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'hsd-renewal';
        
        // Set select value
        const select = document.getElementById('checklist-type');
        if (select) {
            select.value = type;
            select.addEventListener('change', (e) => {
                renderer.loadChecklist(e.target.value);
            });
        }
        
        // Load initial checklist
        renderer.loadChecklist(type);
        
        // Handle browser back/forward
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.type) {
                renderer.loadChecklist(e.state.type);
                if (select) select.value = e.state.type;
            }
        });
    });
</script>
