<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>High Court · Modern Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts: clean, contemporary -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9f7f4;
      --paper: #ffffff;
      --text-dark: #1e1e2f;
      --text-medium: #4a4a5e;
      --text-light: #7a7a8c;
      --accent: #1e3a5f;
      --accent-light: #bb8f4f;
      --border-light: #e4e0da;
      --gold-muted: #c6a15b;
      --shadow: rgba(0, 0, 0, 0.02) 0 4px 12px;
      --hover-bg: #f3f1ed;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-dark);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* wrapper */
    .modern-container {
      max-width: 1360px;
      margin: 0 auto;
      padding: 2rem 2.5rem;
    }

    /* header – clean and minimal */
    .modern-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 2px solid var(--text-dark);
    }

    .title-section h1 {
      font-family: 'Literata', serif;
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text-dark);
    }

    .title-section h1 span {
      color: var(--accent-light);
      font-weight: 400;
      font-style: italic;
      margin-left: 0.5rem;
    }

    .header-meta {
      display: flex;
      gap: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-light);
      letter-spacing: 0.3px;
    }

    .header-meta i {
      color: var(--accent-light);
      margin-right: 0.3rem;
    }

    .stamp-modern {
      border: 1.5px solid var(--accent-light);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      background: white;
      letter-spacing: 0.8px;
    }

    /* filter bar – minimal segmented control */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2rem 3rem;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      background: #edebe8;
      padding: 0.2rem;
      border-radius: 40px;
    }

    .filter-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-medium);
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-btn.active {
      background: white;
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .filter-label {
      font-weight: 600;
      color: var(--text-medium);
      letter-spacing: 0.3px;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    /* grid – clean, with subtle gaps */
    .grid-modern {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    /* cards – white, shadow, minimal */
    .card-modern {
      background: var(--paper);
      border-radius: 12px;
      padding: 1.5rem 1.5rem 1.8rem;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-light);
      position: relative;
    }

    .card-modern:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px -8px rgba(0, 20, 40, 0.12);
      border-color: var(--accent-light);
    }

    /* featured card (first) – more prominence */
    .card-modern.featured {
      grid-column: span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .featured-left {
      border-right: 1px solid var(--border-light);
      padding-right: 1.2rem;
    }

    .featured-right {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* card elements */
    .court-chip {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent-light);
      background: #f5efe6;
      padding: 0.2rem 1rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      width: fit-content;
    }

    .card-title-modern {
      font-family: 'Literata', serif;
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.8rem;
      color: var(--text-dark);
    }

    .featured .card-title-modern {
      font-size: 1.6rem;
    }

    .ref-modern {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      background: #f0f2f5;
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      margin-bottom: 1rem;
    }

    .desc-modern {
      font-size: 0.9rem;
      color: var(--text-medium);
      margin-bottom: 1.5rem;
      line-height: 1.6;
      flex: 1;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed var(--border-light);
      padding-top: 1rem;
      margin-top: auto;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .btn-group {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-light);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-medium);
      transition: all 0.1s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-outline:hover {
      background: var(--hover-bg);
      border-color: var(--accent-light);
    }

    .btn-solid {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-solid:hover {
      background: #0f2b47;
    }

    /* wide card (special) */
    .card-modern.wide {
      grid-column: span 2;
    }

    /* footer */
    .footer-modern {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 0.5rem;
      border-top: 2px solid var(--text-dark);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .footer-left i {
      color: var(--accent-light);
      margin-right: 0.5rem;
    }

    /* responsive */
    @media (max-width: 1024px) {
      .grid-modern {
        grid-template-columns: repeat(2, 1fr);
      }
      .card-modern.featured {
        grid-column: span 2;
        grid-template-columns: 1fr;
      }
      .featured-left {
        border-right: 0;
        padding-right: 0;
      }
    }

    @media (max-width: 700px) {
      .grid-modern {
        grid-template-columns: 1fr;
      }
      .card-modern.featured, .card-modern.wide {
        grid-column: span 1;
      }
      .modern-container {
        padding: 1.5rem;
      }
      .filter-row {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="modern-container">
    <!-- header minimal -->
    <header class="modern-header">
      <div class="title-section">
        <h1>High Court <span>· Modern Reports</span></h1>
      </div>
      <div class="header-meta">
        <span><i class="fas fa-gavel"></i> Vol. 124 (2024)</span>
        <span><i class="fas fa-balance-scale"></i> All India</span>
      </div>
      <div class="stamp-modern">
        <i class="fas fa-check-circle" style="color: var(--accent-light); margin-right: 5px;"></i>Open access
      </div>
    </header>

    <!-- filter group – pill style -->
    <div class="filter-row">
      <span class="filter-label">COURTS</span>
      <div class="filter-group">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Orissa</button>
        <button class="filter-btn">Calcutta</button>
        <button class="filter-btn">Bombay</button>
        <button class="filter-btn">Delhi</button>
        <button class="filter-btn">P&H</button>
      </div>
      <span class="filter-label" style="margin-left: auto;">SUBJECT</span>
      <div class="filter-group">
        <button class="filter-btn">Art.22(5)</button>
        <button class="filter-btn">EC Act</button>
        <button class="filter-btn">PDS</button>
        <button class="filter-btn">Vehicle</button>
      </div>
    </div>

    <!-- dynamic grid -->
    <div class="grid-modern" id="modernGrid"></div>

    <!-- footer -->
    <footer class="footer-modern">
      <div class="footer-left"><i class="fas fa-book-open"></i> 12 judgements · Hilary term 2024</div>
      <div><i class="fas fa-chevron-right" style="color: var(--accent-light);"></i> Lex Reporta · India</div>
    </footer>
  </div>

  <script>
    (function() {
      const judgments = [
        {
          title: "Preventive Detention & Art. 22(5) – Right to Representation",
          description: "Full text examining delay in considering representation, non‑supply of documents, and constitutional safeguards. Detailed analysis of Art. 22(5).",
          court: "Orissa HC",
          caseRef: "2024 · CRLMC 245/2024",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
        },
        {
          title: "Rabi Kumar Nanda v. State: Vehicle Seizure under EC Act",
          description: "Interim release of vehicle seized for alleged PDS violation. Conditions, bank guarantee and magisterial powers.",
          court: "Orissa HC",
          caseRef: "2023 · W.P.(C) 892/2023",
          btn1: { text: "Full Text", link: "#" }, btn2: { text: "Seizure Notes", link: "#" }
        },
        {
          title: "Storage Agents vs. Transport Contractors – PDS Reforms",
          description: "Landmark distinction: liability for damaged foodgrains, allocation between agent and transporter.",
          court: "Orissa HC",
          caseRef: "2024 · ARBA 78/2024",
          btn1: { text: "Judgment", link: "#" }, btn2: { text: "Analysis", link: "#" }
        },
        {
          title: "Sk. Salim v. State: Non‑supply of Documents – Detention void",
          description: "Art.22(5) – non‑supply of relied upon documents renders detention unconstitutional. Detailed examination.",
          court: "Calcutta HC",
          caseRef: "2022 · WP 1145/2022",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Case Analysis", link: "#" }
        },
        {
          title: "Jagmal Singh v. State: Release of Vehicle – EC Act",
          description: "Principles governing interim release of vehicle under Essential Commodities Act. Security bond & valuation.",
          court: "Punjab & Haryana HC",
          caseRef: "2023 · CRM-M 2398/2023",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Notes", link: "#" }
        },
        {
          title: "Transport Contractor Liability – Foodgrain Shortage (PDS)",
          description: "Transport contractor cannot be treated as storage agent for recovery; vital distinction for liability.",
          court: "Allahabad HC",
          caseRef: "2024 · Writ C 4081/2024",
          btn1: { text: "Judgment", link: "#" }, btn2: { text: "Analysis", link: "#" }
        },
        {
          title: "Grounds in Detainee's Language – Art.22(5)",
          description: "Detention set aside for non‑translation into language understood by detenu; linguistic access is a right.",
          court: "Delhi HC",
          caseRef: "2023 · CRL.A. 789/2023",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
        },
        {
          title: "Shivlal v. State: Supurtnama – EC Act vehicle release",
          description: "Magistrate's power to release seized vehicle; procedure for interim custody and supurtnama.",
          court: "Madhya Pradesh HC",
          caseRef: "2022 · MCRC 56782/2022",
          btn1: { text: "Judgment", link: "#" }, btn2: { text: "Custody order", link: "#" }
        },
        {
          title: "Storage Agent not liable for Transit Loss – PDS",
          description: "Agent responsible only for storage, not for contractor's negligence in transit. Important clarification.",
          court: "Gujarat HC",
          caseRef: "2023 · SCA 10234/2023",
          btn1: { text: "Full Text", link: "#" }, btn2: { text: "Storage Duty", link: "#" }
        },
        {
          title: "Delay in Representation – Art.22(5) Violation",
          description: "Unreasonable delay by advisory board renders detention invalid; speedy consideration mandated.",
          court: "Bombay HC",
          caseRef: "2024 · CRLWP 2047/2024",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Analysis", link: "#" }
        },
        {
          title: "Mahendra Kumar v. State: Bank Guarantee instead of Custody",
          description: "Conditional release of vehicle under EC Act; alternatives to physical custody.",
          court: "Rajasthan HC",
          caseRef: "2023 · SBWP 6543/2023",
          btn1: { text: "Judgment", link: "#" }, btn2: { text: "Bank Guarantee", link: "#" }
        },
        {
          title: "FCI v. Storage Agent: Demurrage & Handling – PDS",
          description: "Storage agent cannot be penalised for transport contractor's delay; demurrage charges clarified.",
          court: "Karnataka HC",
          caseRef: "2024 · W.P. 11077/2024",
          btn1: { text: "Read", link: "#" }, btn2: { text: "Case Analysis", link: "#" }
        }
      ];

      const grid = document.getElementById('modernGrid');
      if (!grid) return;

      judgments.forEach((j, idx) => {
        const card = document.createElement('div');
        card.className = 'card-modern';

        // featured (first card)
        if (idx === 0) {
          card.classList.add('featured');
          // special two-column layout inside featured card
          card.innerHTML = `
            <div class="featured-left">
              <span class="court-chip">${j.court}</span>
              <h2 class="card-title-modern">${j.title}</h2>
              <span class="ref-modern"><i class="fas fa-gavel" style="margin-right:5px;"></i>${j.caseRef}</span>
              <p class="desc-modern">${j.description}</p>
            </div>
            <div class="featured-right">
              <div style="background: #f5efe6; padding: 1rem; border-radius: 12px;">
                <p style="font-size:0.9rem; color: var(--text-medium);"><i class="fas fa-quote-right" style="color: var(--accent-light); margin-right:5px;"></i> Landmark precedent: right to make representation includes linguistic access.</p>
              </div>
              <div class="btn-group" style="margin-top: 1rem;">
                <a href="#" class="btn-solid"><i class="fas fa-file-lines"></i> ${j.btn1.text}</a>
                <a href="#" class="btn-outline"><i class="fas fa-scale-balanced"></i> ${j.btn2.text}</a>
              </div>
              <div class="meta-row" style="margin-top:1rem;">
                <span><i class="fas fa-calendar"></i> 2024</span>
                <span><i class="fas fa-circle" style="color: var(--accent-light); font-size: 0.4rem;"></i> Reported</span>
              </div>
            </div>
          `;
        } else {
          // wide cards (index 4 and 9)
          if (idx === 4 || idx === 9) card.classList.add('wide');

          // standard card layout
          card.innerHTML = `
            <span class="court-chip">${j.court}</span>
            <h2 class="card-title-modern">${j.title}</h2>
            <span class="ref-modern"><i class="fas fa-gavel" style="margin-right:5px;"></i>${j.caseRef}</span>
            <p class="desc-modern">${j.description}</p>
            <div class="btn-group">
              <a href="#" class="btn-solid" style="padding:0.3rem 1rem;"><i class="fas fa-file-lines"></i> ${j.btn1.text}</a>
              <a href="#" class="btn-outline" style="padding:0.3rem 1rem;"><i class="fas fa-scale-balanced"></i> ${j.btn2.text}</a>
            </div>
            <div class="meta-row">
              <span><i class="fas fa-balance-scale-right"></i> India</span>
              <span><i class="fas fa-circle" style="color: var(--accent-light); font-size: 0.4rem;"></i> ${j.court}</span>
            </div>
          `;
        }

        grid.appendChild(card);
      });

      // filter button active toggle (demo)
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
        });
      });
    })();
  </script>
</body>
</html>
