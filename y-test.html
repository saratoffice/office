<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Article Gallery</title>

  <!-- Site components -->
  <script src="assets/Scripts/site-components.js" defer></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────── */
    :root {
      --bg:        #0c0e14;
      --surface:   #13161f;
      --card:      #181b27;
      --card-hov:  #1e2133;
      --border:    rgba(255,255,255,0.06);
      --accent:    #5b7fff;
      --accent2:   #a78bfa;
      --accent3:   #34d399;
      --txt:       #e4e7f0;
      --txt-muted: #7a8099;
      --txt-dim:   #4a5068;
      --radius:    16px;
      --radius-sm: 10px;
      --sans:      'DM Sans', sans-serif;
      --display:   'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ─── PAGE SHELL ─────────────────────────────────── */
    .blogs-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ─── HERO HEADER ────────────────────────────────── */
    .blogs-hero {
      position: relative;
      padding: 5rem 0 3.5rem;
      overflow: hidden;
      text-align: center;
    }

    /* Ambient blobs */
    .blogs-hero::before,
    .blogs-hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .blogs-hero::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(91,127,255,.22), transparent 70%);
      top: -120px; left: 50%;
      transform: translateX(-50%);
    }
    .blogs-hero::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(167,139,250,.18), transparent 70%);
      top: 60px; right: 10%;
    }

    .hero-eyebrow {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(91,127,255,.1);
      border: 1px solid rgba(91,127,255,.25);
      padding: .35rem 1rem;
      border-radius: 30px;
      margin-bottom: 1.4rem;
    }

    .blogs-hero h1 {
      position: relative;
      font-family: var(--display);
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -1.5px;
      color: var(--txt);
      margin-bottom: 1rem;
    }

    .blogs-hero h1 span {
      background: linear-gradient(110deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .blogs-hero p {
      position: relative;
      color: var(--txt-muted);
      font-size: 1.1rem;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ─── FILTER BAR ─────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
    }

    /* Search */
    .search-wrap {
      flex: 2;
      min-width: 220px;
      position: relative;
    }
    .search-wrap i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--txt-dim);
      font-size: .85rem;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: .72rem 1rem .72rem 2.4rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--txt);
      font-family: var(--sans);
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input::placeholder { color: var(--txt-dim); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,127,255,.12);
    }

    /* Category select */
    .cat-wrap {
      position: relative;
      min-width: 170px;
    }
    .cat-wrap i {
      position: absolute;
      right: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--txt-dim);
      font-size: .75rem;
      pointer-events: none;
    }
    .cat-wrap select {
      width: 100%;
      padding: .72rem 2rem .72rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--txt);
      font-family: var(--sans);
      font-size: .9rem;
      cursor: pointer;
      appearance: none;
      transition: border-color .2s;
    }
    .cat-wrap select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Sort pills */
    .sort-pills {
      display: flex;
      gap: .35rem;
      background: var(--card);
      padding: .3rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .sort-pill {
      padding: .48rem .9rem;
      border: none;
      background: transparent;
      color: var(--txt-muted);
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .35rem;
      transition: background .2s, color .2s;
    }
    .sort-pill:hover { color: var(--txt); }
    .sort-pill.active {
      background: var(--accent);
      color: #fff;
    }
    .sort-pill i { font-size: .75rem; }

    /* ─── TAGS CLOUD ─────────────────────────────────── */
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.5rem;
      min-height: 44px;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .36rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      font-size: .78rem;
      font-weight: 500;
      color: var(--txt-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tag-chip i { font-size: .65rem; }
    .tag-chip:hover {
      color: var(--txt);
      border-color: rgba(91,127,255,.4);
      transform: translateY(-1px);
    }
    .tag-chip.active {
      background: rgba(91,127,255,.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── RESULTS BAR ────────────────────────────────── */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
    }
    .results-bar .count {
      font-size: .85rem;
      color: var(--txt-dim);
    }
    .clear-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .82rem;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      padding: .3rem .8rem;
      border-radius: 30px;
      background: rgba(91,127,255,.08);
      border: 1px solid rgba(91,127,255,.2);
      transition: background .2s;
    }
    .clear-btn:hover { background: rgba(91,127,255,.15); }

    /* ─── BLOG GRID ──────────────────────────────────── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.4rem;
    }

    /* ─── BLOG CARD ──────────────────────────────────── */
    .blog-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform .28s cubic-bezier(.22,1,.36,1),
                  box-shadow .28s ease,
                  border-color .28s ease;
      animation: cardIn .45s ease both;
    }
    .blog-card:hover {
      transform: translateY(-7px);
      border-color: rgba(91,127,255,.28);
      box-shadow: 0 24px 48px rgba(0,0,0,.4),
                  0 0 0 1px rgba(91,127,255,.12);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Staggered delay for cards */
    .blog-card:nth-child(1)  { animation-delay: .04s; }
    .blog-card:nth-child(2)  { animation-delay: .08s; }
    .blog-card:nth-child(3)  { animation-delay: .12s; }
    .blog-card:nth-child(4)  { animation-delay: .16s; }
    .blog-card:nth-child(5)  { animation-delay: .20s; }
    .blog-card:nth-child(6)  { animation-delay: .24s; }
    .blog-card:nth-child(7)  { animation-delay: .28s; }
    .blog-card:nth-child(8)  { animation-delay: .32s; }

    /* Card image banner */
    .card-banner {
      height: 148px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Gradient fills per category (via data attr) */
    .card-banner[data-cat="technology"]    { background: linear-gradient(135deg,#1a2060,#3b4ea8); }
    .card-banner[data-cat="legal"]         { background: linear-gradient(135deg,#1d1a40,#5b3fa0); }
    .card-banner[data-cat="technical"]     { background: linear-gradient(135deg,#0d2830,#1a7a70); }
    .card-banner[data-cat="science"]       { background: linear-gradient(135deg,#0f2b1d,#216a42); }
    .card-banner[data-cat="business"]      { background: linear-gradient(135deg,#261808,#8a4a0a); }
    .card-banner[data-cat="lifestyle"]     { background: linear-gradient(135deg,#28101a,#8a2a58); }
    .card-banner[data-cat="health"]        { background: linear-gradient(135deg,#0d1f2d,#1a6a8a); }
    .card-banner[data-cat="design"]        { background: linear-gradient(135deg,#1a0d28,#6a2a9a); }
    .card-banner[data-cat="art"]           { background: linear-gradient(135deg,#200a0a,#8a2020); }
    .card-banner[data-cat="travel"]        { background: linear-gradient(135deg,#041424,#0a4a7a); }
    .card-banner[data-cat="food"]          { background: linear-gradient(135deg,#1a0c00,#7a3a00); }
    .card-banner[data-cat="uncategorized"] { background: linear-gradient(135deg,#15192a,#2a3060); }

    /* Default fallback */
    .card-banner:not([data-cat]) { background: linear-gradient(135deg,#15192a,#2a3060); }

    /* Noise texture overlay */
    .card-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.08'/%3E%3C/svg%3E");
      opacity: .6;
    }

    .card-banner .icon-wrap {
      position: relative;
      width: 56px; height: 56px;
      background: rgba(255,255,255,.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      transition: transform .2s;
    }
    .blog-card:hover .icon-wrap { transform: scale(1.08); }

    .card-badge {
      position: absolute;
      top: .9rem;
      right: .9rem;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .25rem .65rem;
      border-radius: 20px;
    }

    /* Card body */
    .card-body {
      padding: 1.2rem 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: .7rem;
    }

    .card-title {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--txt);
      line-height: 1.4;
      letter-spacing: -.2px;
    }

    .card-excerpt {
      font-size: .84rem;
      color: var(--txt-muted);
      line-height: 1.65;
      flex: 1;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--txt-dim);
      padding-top: .65rem;
      border-top: 1px solid var(--border);
    }
    .card-meta span { display: flex; align-items: center; gap: .3rem; }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
    }
    .card-tag {
      font-size: .68rem;
      padding: .2rem .55rem;
      background: rgba(91,127,255,.1);
      border: 1px solid rgba(91,127,255,.2);
      border-radius: 20px;
      color: var(--accent);
    }

    .card-cta {
      display: flex;
      align-items: center;
      gap: .4rem;
      color: var(--accent);
      font-size: .8rem;
      font-weight: 600;
    }
    .card-cta i {
      transition: transform .2s;
      font-size: .7rem;
    }
    .blog-card:hover .card-cta i { transform: translateX(4px); }

    /* ─── STATES ─────────────────────────────────────── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--txt-muted);
    }
    .state-box i {
      font-size: 2.8rem;
      margin-bottom: 1.2rem;
      display: block;
      color: var(--txt-dim);
    }
    .state-box h3 {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .5rem;
    }
    .state-box p { font-size: .9rem; }

    .loading-spin {
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── PAGINATION ─────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      margin-top: 3.5rem;
    }
    .page-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--txt-muted);
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .page-btn:hover:not([disabled]):not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .page-btn[disabled] { opacity: .35; cursor: not-allowed; }
    .page-btn.wide { width: auto; padding: 0 .9rem; gap: .4rem; font-size: .8rem; }
    .page-dots { color: var(--txt-dim); font-size: .85rem; padding: 0 .2rem; }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 1200px) { .blog-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 900px)  { .blog-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 580px)  {
      .blog-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .sort-pills { width: 100%; }
      .sort-pill { flex: 1; justify-content: center; }
      .blogs-shell { padding: 0 1rem 4rem; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <div class="blogs-shell">

    <!-- Hero -->
    <div class="blogs-hero">
      <div class="hero-eyebrow"><i class="fas fa-book-open"></i> Knowledge Hub</div>
      <h1>The <span>Blog</span> Gallery</h1>
      <p>Discover curated articles, deep-dives, and insights across every topic that matters.</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by title, content, or author…">
      </div>

      <div class="cat-wrap">
        <select id="categorySelect">
          <option value="all">All Categories</option>
        </select>
        <i class="fas fa-chevron-down"></i>
      </div>

      <div class="sort-pills">
        <button class="sort-pill active" data-sort="latest"><i class="fas fa-clock"></i> Latest</button>
        <button class="sort-pill" data-sort="oldest"><i class="fas fa-calendar"></i> Oldest</button>
        <button class="sort-pill" data-sort="popular"><i class="fas fa-fire"></i> Popular</button>
      </div>
    </div>

    <!-- Tags -->
    <div class="tags-row" id="tagsCloud">
      <span class="tag-chip active" data-tag="all"><i class="fas fa-tag"></i> All</span>
    </div>

    <!-- Results bar -->
    <div class="results-bar">
      <span class="count" id="resultsCount">Loading articles…</span>
      <span class="clear-btn" id="clearFilters"><i class="fas fa-times"></i> Clear filters</span>
    </div>

    <!-- Grid -->
    <div class="blog-grid" id="blogGrid">
      <div class="state-box">
        <i class="fas fa-spinner loading-spin"></i>
        <h3>Loading articles…</h3>
        <p>Fetching the latest posts for you</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>

  <footer id="site-footer"></footer>
  <script src="assets/Scripts/gototop.js"></script>

<script>
(function() {
  const POSTS_PER_PAGE = 12;
  const POSTS_DIRECTORY = 'Posts/';

  let allPosts = [], filteredPosts = [];
  let currentPage = 1, currentSort = 'latest';
  let currentCategory = 'all', currentTag = 'all', searchQuery = '';

  const blogGrid        = document.getElementById('blogGrid');
  const paginationDiv   = document.getElementById('pagination');
  const searchInput     = document.getElementById('searchInput');
  const categorySelect  = document.getElementById('categorySelect');
  const sortBtns        = document.querySelectorAll('.sort-pill');
  const tagsCloud       = document.getElementById('tagsCloud');
  const resultsCount    = document.getElementById('resultsCount');
  const clearFiltersBtn = document.getElementById('clearFilters');

  // ── Load manifest ──────────────────────────────────
  async function loadAllPosts() {
    try {
      const res = await fetch('posts-manifest.json');
      if (!res.ok) throw new Error('Manifest not found');
      const manifest = await res.json();
      if (!Array.isArray(manifest) || !manifest.length) return [];
      const posts = await Promise.all(manifest.map(fetchPostMetadata));
      return posts.filter(Boolean);
    } catch (e) {
      console.error('Load error:', e);
      return [];
    }
  }

  async function fetchPostMetadata(filename) {
    try {
      const res = await fetch(POSTS_DIRECTORY + filename);
      if (!res.ok) return null;
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const getMeta = n => { const m = doc.querySelector(`meta[name="${n}"]`); return m ? m.getAttribute('content') : null; };
      const extractExcerpt = () => {
        const ex = getMeta('blog:excerpt');
        if (ex) return ex;
        const p = doc.querySelector('p');
        return p ? p.textContent.substring(0,150) + '…' : 'Read this interesting article…';
      };
      const iconMap = { technology:'fa-microchip',lifestyle:'fa-heart',travel:'fa-plane',food:'fa-utensils',health:'fa-heartbeat',business:'fa-briefcase',design:'fa-pencil-ruler',science:'fa-flask',art:'fa-palette',legal:'fa-gavel',technical:'fa-gear',uncategorized:'fa-newspaper' };
      const category = getMeta('blog:category') || 'uncategorized';
      return {
        id: filename, filename, url: POSTS_DIRECTORY + filename,
        title:    getMeta('blog:title') || filename.replace('.html','').replace(/%20/g,' '),
        excerpt:  extractExcerpt(),
        category,
        tags:     getMeta('blog:tags') ? getMeta('blog:tags').split(',').map(t=>t.trim()) : [],
        author:   getMeta('blog:author') || 'Unknown',
        date:     getMeta('blog:date') || new Date().toISOString().split('T')[0],
        readTime: parseInt(getMeta('blog:readTime')) || Math.floor(Math.random()*10)+3,
        views:    parseInt(getMeta('blog:views')) || Math.floor(Math.random()*5000)+500,
        icon:     getMeta('blog:icon') || iconMap[category] || 'fa-newspaper',
      };
    } catch(e) { return null; }
  }

  // ── Tag icon helper ────────────────────────────────
  function getTagIcon(tag) {
    const map = { 'ec act':'fa-gavel','confiscation':'fa-box','seizure':'fa-handcuffs','legal':'fa-scale-balanced','smart-meter':'fa-microchip','electricity':'fa-bolt','energy':'fa-solar-panel','technology':'fa-code','jute':'fa-leaf','textiles':'fa-tshirt','foodgrains':'fa-wheat' };
    const tl = tag.toLowerCase();
    for (const [k,v] of Object.entries(map)) if (tl.includes(k)) return v;
    return 'fa-tag';
  }

  // ── Populate filters ───────────────────────────────
  function buildFilters(posts) {
    const cats = ['all', ...new Set(posts.map(p=>p.category))];
    categorySelect.innerHTML = cats.map(c => `<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');

    const tagsToRemove = ['detention','commodities','section 6a','section-6a','innovation','sustainability','LDL','VLDL','CoQ10','excel-tips','excel-formulas','petroleum','density','productivity'];
    const tagCount = new Map();
    posts.forEach(p => p.tags.forEach(t => {
      if (!tagsToRemove.some(r => t.toLowerCase() === r.toLowerCase() || t.toLowerCase().includes(r.toLowerCase()))) {
        tagCount.set(t, (tagCount.get(t)||0)+1);
      }
    }));

    const sorted = [...tagCount.entries()].sort((a,b)=>b[1]-a[1]).slice(0,15);

    tagsCloud.innerHTML = `<span class="tag-chip active" data-tag="all"><i class="fas fa-tag"></i> All</span>` +
      sorted.map(([tag,count]) => `<span class="tag-chip" data-tag="${tag}"><i class="fas ${getTagIcon(tag)}"></i> ${tag} <small style="opacity:.6">${count}</small></span>`).join('');

    document.querySelectorAll('.tag-chip').forEach(c => c.addEventListener('click', () => {
      document.querySelectorAll('.tag-chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      currentTag = c.dataset.tag;
      currentPage = 1;
      renderPosts();
    }));
  }

  // ── Filter ─────────────────────────────────────────
  function filterPosts() {
    let f = [...allPosts];
    if (currentCategory !== 'all') f = f.filter(p=>p.category===currentCategory);
    if (currentTag !== 'all') f = f.filter(p=>p.tags.includes(currentTag));
    if (searchQuery) { const q=searchQuery.toLowerCase(); f=f.filter(p=>p.title.toLowerCase().includes(q)||p.excerpt.toLowerCase().includes(q)||p.author.toLowerCase().includes(q)); }
    f.sort((a,b)=>currentSort==='popular'?b.views-a.views:currentSort==='oldest'?new Date(a.date)-new Date(b.date):new Date(b.date)-new Date(a.date));
    return f;
  }

  // ── Render ─────────────────────────────────────────
  function renderPosts() {
    filteredPosts = filterPosts();
    const total = filteredPosts.length;
    const pages = Math.ceil(total / POSTS_PER_PAGE);
    if (currentPage > pages) currentPage = pages||1;
    const start = (currentPage-1)*POSTS_PER_PAGE;
    const slice = filteredPosts.slice(start, start+POSTS_PER_PAGE);

    resultsCount.textContent = total === 0 ? 'No articles found'
      : `Showing ${start+1}–${Math.min(start+POSTS_PER_PAGE,total)} of ${total} articles`;

    if (!slice.length) {
      blogGrid.innerHTML = `<div class="state-box"><i class="fas fa-search"></i><h3>Nothing here</h3><p>Try adjusting your filters or search query</p></div>`;
    } else {
      blogGrid.innerHTML = slice.map(post => `
        <div class="blog-card" onclick="window.location.href='${post.url}'">
          <div class="card-banner" data-cat="${post.category.toLowerCase()}">
            <div class="icon-wrap"><i class="fas ${post.icon}"></i></div>
            <span class="card-badge">${post.category}</span>
          </div>
          <div class="card-body">
            <h3 class="card-title">${post.title}</h3>
            <p class="card-excerpt">${post.excerpt}</p>
            <div class="card-meta">
              <span><i class="fas fa-user"></i> ${post.author}</span>
              <span><i class="fas fa-calendar-alt"></i> ${fmtDate(post.date)}</span>
              <span><i class="fas fa-clock"></i> ${post.readTime}m</span>
            </div>
            ${post.tags.length ? `<div class="card-tags">${post.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
            <div class="card-cta">Read article <i class="fas fa-arrow-right"></i></div>
          </div>
        </div>`).join('');
    }

    renderPagination(pages);
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }

  // ── Pagination ─────────────────────────────────────
  function renderPagination(pages) {
    if (pages <= 1) { paginationDiv.innerHTML=''; return; }
    let h = `<button class="page-btn wide" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i> Prev</button>`;
    for (let i=1; i<=pages; i++) {
      if (i===1||i===pages||(i>=currentPage-2&&i<=currentPage+2)) {
        h += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      } else if (i===currentPage-3||i===currentPage+3) {
        h += `<span class="page-dots">…</span>`;
      }
    }
    h += `<button class="page-btn wide" data-page="${currentPage+1}" ${currentPage===pages?'disabled':''}>Next <i class="fas fa-chevron-right"></i></button>`;
    paginationDiv.innerHTML = h;
    paginationDiv.querySelectorAll('.page-btn[data-page]').forEach(b => {
      b.addEventListener('click', () => {
        if (!b.disabled) { currentPage=parseInt(b.dataset.page); renderPosts(); window.scrollTo({top:0,behavior:'smooth'}); }
      });
    });
  }

  // ── Events ─────────────────────────────────────────
  searchInput.addEventListener('input', e => { searchQuery=e.target.value; currentPage=1; renderPosts(); });
  categorySelect.addEventListener('change', e => { currentCategory=e.target.value; currentPage=1; renderPosts(); });
  sortBtns.forEach(b => b.addEventListener('click', () => {
    sortBtns.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentSort=b.dataset.sort; currentPage=1; renderPosts();
  }));
  clearFiltersBtn.addEventListener('click', () => {
    searchInput.value=''; categorySelect.value='all';
    document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('active'));
    document.querySelector('.tag-chip[data-tag="all"]').classList.add('active');
    searchQuery=''; currentCategory='all'; currentTag='all'; currentPage=1; renderPosts();
  });

  // ── Init ───────────────────────────────────────────
  async function init() {
    blogGrid.innerHTML = `<div class="state-box"><i class="fas fa-spinner loading-spin"></i><h3>Loading articles…</h3><p>Fetching the latest posts for you</p></div>`;
    allPosts = await loadAllPosts();
    if (!allPosts.length) {
      blogGrid.innerHTML = `<div class="state-box"><i class="fas fa-file-alt"></i><h3>No posts found</h3><p>Add HTML files to the Posts/ folder — the GitHub Action will auto-generate the manifest.</p></div>`;
      resultsCount.textContent = '0 articles';
      return;
    }
    buildFilters(allPosts);
    renderPosts();
  }

  init();
})();
</script>
</body>
</html>
